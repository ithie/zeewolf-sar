<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ZEEWOLF: SAR</title>
        <meta
            name="description"
            content="Zeewolf: SAR — ein isometrisches Hubschrauber-Rettungsspiel. Fliege SAR-Einsätze, rette Überlebende und bringe sie sicher nach Hause."
        />
        <meta property="og:title" content="ZEEWOLF: SAR" />
        <meta
            property="og:description"
            content="Isometrisches Hubschrauber-Rettungsspiel. Fliege SAR-Einsätze, rette Überlebende und bringe sie sicher nach Hause."
        />
        <meta property="og:type" content="website" />
    </head>
    <body>
        <div id="audio-mute">
            <svg xmlns="http://www.w3.org/2000/svg" id="audio-mute-inactive" viewBox="0 0 32 32" width="32" height="32">
                <defs>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="1.5" result="blur" />
                        <feMerge>
                            <feMergeNode in="blur" />
                            <feMergeNode in="blur" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                </defs>
                <g filter="url(#glow)">
                    <polygon
                        points="4,11 4,21 9,21 16,27 16,5 9,11"
                        fill="#ff6600"
                        stroke="#ff8800"
                        stroke-width="0.5"
                    />
                    <path
                        d="M19,11 Q23,16 19,21"
                        fill="none"
                        stroke="#ff6600"
                        stroke-width="2"
                        stroke-linecap="round"
                    />
                    <path
                        d="M22,8 Q28,16 22,24"
                        fill="none"
                        stroke="#ff6600"
                        stroke-width="2"
                        stroke-linecap="round"
                        opacity="0.7"
                    />
                </g>
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" id="audio-mute-active" viewBox="0 0 32 32" width="32" height="32">
                <defs>
                    <filter id="glow-red">
                        <feGaussianBlur stdDeviation="1.5" result="blur" />
                        <feMerge>
                            <feMergeNode in="blur" />
                            <feMergeNode in="blur" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                    <filter id="glow-grey">
                        <feGaussianBlur stdDeviation="0.8" result="blur" />
                        <feMerge>
                            <feMergeNode in="blur" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                </defs>
                <polygon
                    points="4,11 4,21 9,21 16,27 16,5 9,11"
                    fill="#444"
                    stroke="#555"
                    stroke-width="0.5"
                    filter="url(#glow-grey)"
                />
                <g filter="url(#glow-red)">
                    <line x1="20" y1="11" x2="28" y2="21" stroke="#ff2200" stroke-width="2.5" stroke-linecap="round" />
                    <line x1="28" y1="11" x2="20" y2="21" stroke="#ff2200" stroke-width="2.5" stroke-linecap="round" />
                </g>
            </svg>
        </div>
        <div id="easter-egg" onclick="launchEasterEgg()"></div>
        <div id="flash-overlay"></div>
        <div id="msg"></div>
        <canvas
            id="menu-particles-canvas"
            style="
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 201;
                pointer-events: none;
                display: none;
            "
        ></canvas>

        <div id="splash" onclick="toMainMenu()">
            <div class="title">ZEEWOLF: SAR</div>
            <div class="subtitle" id="splash-version"></div>
            <canvas id="menu-heli-big"></canvas>
            <p class="start-hint">CLICK TO START SYSTEM</p>
        </div>

        <div id="main-menu">
            <canvas id="main-menu-bg-canvas"></canvas>
            <div class="title">ZEEWOLF: SAR</div>
            <div class="subtitle" style="margin-bottom: 44px">MAIN SYSTEM</div>
            <nav class="menu-nav">
                <div class="menu-item" onclick="toCampaignSelect()">SPIEL STARTEN</div>
                <div class="menu-item" onclick="toHeliInfo()">HELIKOPTER</div>
                <div class="menu-item" onclick="toSettings()">EINSTELLUNGEN</div>
                <div class="menu-item" onclick="toCredits()">CREDITS</div>
            </nav>
        </div>

        <div id="heli-info">
            <div class="title">HANGAR</div>
            <div class="subtitle">TYPENÜBERSICHT</div>
            <div id="heli-info-stage">
                <div id="heli-cards-area"></div>
                <div id="heli-detail-panel"></div>
            </div>
            <div class="back-btn" onclick="toMainMenu()">&#9664; ZURÜCK</div>
        </div>

        <div id="credits-screen">
            <canvas id="credits-canvas"></canvas>
            <div id="credits-inner"></div>
            <div class="back-btn" onclick="toMainMenu()">&#9664; ZURÜCK</div>
        </div>

        <div id="campaign-select"></div>
        <div id="heli-select"></div>
        <div id="crash-screen"></div>
        <div id="mission-success-screen"></div>
        <div id="win-screen"></div>
        <div id="mission-briefing"></div>
        <div id="campaign-complete-screen"></div>
        <div id="campaign-failed-screen"></div>

        <canvas id="gameCanvas"></canvas>
        <div id="debug-toggle"></div>

        <div id="touch-controls">
            <div id="touch-pad-left">
                <div id="touch-winch">
                    <button class="touch-btn touch-winch-btn" data-key="KeyQ">Q ↑</button>
                    <button class="touch-btn touch-winch-btn" data-key="KeyE">E ↓</button>
                </div>
                <div class="joystick" id="joystick-left">
                    <span class="js-n">W</span><span class="js-s">S</span>
                    <span class="js-w">A</span><span class="js-e">D</span>
                    <div class="joystick-knob"></div>
                </div>
            </div>
            <div class="joystick" id="joystick-right">
                <span class="js-n">▲</span><span class="js-s">▼</span>
                <span class="js-w">◀</span><span class="js-e">▶</span>
                <div class="joystick-knob"></div>
            </div>
        </div>

        <!-- Settings Screen -->
        <div id="settings-screen"></div>

        <div id="rankup-overlay"></div>

        <!-- Cookie Banner -->
        <div id="cookie-banner"></div>

        <script type="module" src="/src/game/game.ts"></script>
    </body>
</html>
