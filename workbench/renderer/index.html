<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeewolf Workbench</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #1e1e1e;
      --bg2:         #252526;
      --bg3:         #2d2d2d;
      --bg4:         #3c3c3c;
      --accent:      #0e639c;
      --accent2:     #1177bb;
      --text:        #cccccc;
      --text-dim:    #858585;
      --text-bright: #ffffff;
      --border:      #3c3c3c;
      --tab-active:  #1e1e1e;
      --tab-inactive:#2d2d2d;
      --tree-hover:  #2a2d2e;
      --tree-active: #094771;
      --success:     #4ec9b0;
      --warning:     #ce9178;
      --error:       #f44747;
      --handle:      4px;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      overflow: hidden;
      user-select: none;
    }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 36px;
      padding: 0 10px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #git-branch {
      font-weight: 600;
      color: var(--success);
      min-width: 100px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar-sep { width: 1px; height: 18px; background: var(--border); margin: 0 2px; }

    #toolbar button {
      background: var(--bg4);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 3px 10px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    #toolbar button:hover { background: var(--accent); border-color: var(--accent2); color: #fff; }
    #toolbar button:active { background: var(--accent2); }
    #toolbar button:disabled { opacity: 0.4; cursor: default; }

    #commit-msg {
      flex: 1;
      min-width: 0;
      max-width: 360px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      padding: 3px 8px;
      font-size: 12px;
      outline: none;
    }
    #commit-msg:focus { border-color: var(--accent2); }
    #commit-msg::placeholder { color: var(--text-dim); }

    #git-status {
      flex: 1;
      color: var(--text-dim);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #git-status.ok   { color: var(--success); }
    #git-status.err  { color: var(--error); }

    /* ── Root layout ─────────────────────────────────────────────────────── */
    #root {
      display: flex;
      width: 100%;
      height: calc(100vh - 36px);
      overflow: hidden;
    }

    /* ── Left panel ──────────────────────────────────────────────────────── */
    #left-panel {
      display: flex;
      flex-direction: column;
      width: 55%;
      min-width: 300px;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* ── Tab bar ─────────────────────────────────────────────────────────── */
    #tab-bar {
      display: flex;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab-btn {
      padding: 6px 18px;
      background: var(--tab-inactive);
      color: var(--text-dim);
      border: none;
      border-right: 1px solid var(--border);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: color 0.1s;
    }
    .tab-btn:hover { color: var(--text); background: var(--bg4); }
    .tab-btn.active {
      background: var(--tab-active);
      color: var(--text-bright);
      border-bottom: 2px solid var(--accent2);
    }

    /* ── Tab panes ───────────────────────────────────────────────────────── */
    #tab-content { flex: 1; overflow: hidden; position: relative; }

    .tab-pane { display: none; width: 100%; height: 100%; }
    .tab-pane.active { display: flex; }

    /* Code tab: file-tree + editor side by side */
    #tab-code { flex-direction: row; }

    #file-tree-panel {
      width: 220px;
      min-width: 120px;
      max-width: 420px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      overflow-x: hidden;
      flex-shrink: 0;
    }
    #file-tree-panel::-webkit-scrollbar { width: 6px; }
    #file-tree-panel::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

    .tree-header {
      padding: 6px 10px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .tree-refresh {
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 13px; padding: 0 2px;
    }
    .tree-refresh:hover { color: var(--text); }

    .tree-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 4px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      border-radius: 2px;
    }
    .tree-item:hover { background: var(--tree-hover); }
    .tree-item.active { background: var(--tree-active); color: #fff; }

    .tree-icon { font-size: 12px; flex-shrink: 0; }
    .tree-name { overflow: hidden; text-overflow: ellipsis; font-size: 12px; }
    .tree-children { }

    #editor-container {
      flex: 1;
      min-width: 0;
      height: 100%;
      overflow: hidden;
    }

    /* Tracker tab */
    #tab-tracker { width: 100%; height: 100%; }
    #tab-tracker iframe { width: 100%; height: 100%; border: none; }

    /* Editor tab */
    #tab-editor { flex-direction: column; }
    #editor-body { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* Shared file-nav bar (editor + tracker + models) */
    #editor-nav, #tracker-nav, #models-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 10px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #editor-nav button, #tracker-nav button, #models-nav button {
      background: var(--bg4);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2px 10px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }
    #editor-nav button:hover, #tracker-nav button:hover, #models-nav button:hover { background: var(--accent); border-color: var(--accent2); color: #fff; }
    #editor-current-file, #tracker-current-file, #models-current-file {
      flex: 1;
      font-size: 11px;
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Tracker tab layout */
    #tab-tracker { flex-direction: column; }
    #tab-tracker iframe { flex: 1; border: none; min-height: 0; }

    /* Models tab layout */
    #tab-models { flex-direction: column; }
    #tab-models iframe { flex: 1; border: none; min-height: 0; }

    /* Controls panel */
    #editor-controls {
      width: 280px;
      min-width: 200px;
      flex-shrink: 0;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      font-size: 12px;
    }
    #editor-controls::-webkit-scrollbar { width: 6px; }
    #editor-controls::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

    .ed-section {
      border-bottom: 1px solid var(--border);
      padding: 8px 10px;
    }
    .ed-section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .ed-section label { display: block; margin: 3px 0; color: var(--text); cursor: pointer; }
    .ed-section input[type=text],
    .ed-section input[type=number],
    .ed-section textarea,
    .ed-section select {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 3px 6px;
      font-size: 11px;
      font-family: inherit;
      width: 100%;
      box-sizing: border-box;
    }
    .ed-section textarea { resize: vertical; min-height: 44px; }
    .ed-section input[type=text]:focus,
    .ed-section input[type=number]:focus,
    .ed-section textarea:focus,
    .ed-section select:focus { outline: none; border-color: var(--accent2); }
    .ed-section input[type=range] { width: 100%; cursor: pointer; }

    .ed-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .ed-row label { margin: 0; }
    .ed-row input[type=number] { width: 52px; }

    .ed-radio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
    .ed-radio { cursor: pointer; }

    .ed-mission-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 6px; border-radius: 3px; cursor: pointer;
      border: 1px solid transparent; margin-bottom: 3px;
    }
    .ed-mission-item:hover { background: var(--tree-hover); }
    .ed-mission-item.active { background: var(--tree-active); border-color: var(--accent); color: #fff; }
    .ed-mission-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; }
    .ed-mission-controls { display: flex; gap: 2px; flex-shrink: 0; }
    .ed-mission-controls button, .ed-btn-sm {
      background: var(--bg4); color: var(--text); border: 1px solid var(--border);
      border-radius: 2px; padding: 1px 5px; font-size: 10px; cursor: pointer;
    }
    .ed-mission-controls button:hover, .ed-btn-sm:hover { background: var(--accent2); color: #fff; }
    .ed-mission-controls .ed-del:hover { background: #7a2020; }

    .ed-btn {
      display: block; width: 100%; background: var(--bg4); color: var(--text);
      border: 1px solid var(--border); border-radius: 2px; padding: 4px 8px;
      font-size: 11px; cursor: pointer; text-align: left; margin-top: 4px;
    }
    .ed-btn:hover { background: var(--accent); border-color: var(--accent2); color: #fff; }
    .ed-btn-danger:hover { background: #7a2020 !important; border-color: #a33 !important; }

    .ed-list-row {
      display: flex; align-items: center; gap: 4px; padding: 2px 0;
      font-size: 11px; color: var(--text-dim);
    }
    .ed-list-row span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ed-empty { color: var(--text-dim); font-size: 11px; font-style: italic; }

    /* Canvas iframe pane */
    #editor-canvas-pane { flex: 1; display: flex; flex-direction: column; overflow: auto; }
    #iframe-preview { width: 100%; height: 320px; border: none; border-bottom: 2px solid #333; flex-shrink: 0; }
    #iframe-editor  { width: 100%; flex: 1; border: none; min-width: 640px; min-height: 640px; }

    /* ── Horizontal resize handle (left / right) ─────────────────────────── */
    #resize-h {
      width: var(--handle);
      cursor: col-resize;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.15s;
      z-index: 10;
    }
    #resize-h:hover, #resize-h.dragging { background: var(--accent2); }

    /* ── Right panel ─────────────────────────────────────────────────────── */
    #right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 200px;
      overflow: hidden;
    }

    .view-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .pane-label {
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .view-pane iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #000;
    }

    #game-pane   { height: 60%; }
    #model-pane  { height: 40%; }

    /* ── Vertical resize handle (game / modelviewer) ─────────────────────── */
    #resize-v {
      height: var(--handle);
      cursor: row-resize;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.15s;
      z-index: 10;
    }
    #resize-v:hover, #resize-v.dragging { background: var(--accent2); }

    /* ── Auto-save indicator ─────────────────────────────────────────────── */
    #autosave-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: transparent;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #autosave-dot.dirty   { background: var(--warning); }
    #autosave-dot.saving  { background: var(--accent2); }
    #autosave-dot.saved   { background: var(--success); }

    /* ── Coverage badges in file tree ───────────────────────────────────── */
    .tree-cov {
      flex-shrink: 0;
      margin-left: auto;
      font-size: 10px;
      font-family: 'Fira Code', Consolas, monospace;
      padding: 0 4px;
      border-radius: 2px;
      opacity: 0.9;
    }
    .cov-hi  { color: #4ec9b0; }
    .cov-mid { color: #ce9178; }
    .cov-lo  { color: #f44747; }

    /* Monaco glyph margin coverage ──────────────────────────────────────── */
    .cov-glyph-hit  { background: rgba(78,201,176,0.75); width: 3px !important; margin-left: 4px; border-radius: 1px; }
    .cov-glyph-miss { background: rgba(244,71,71,0.85);  width: 3px !important; margin-left: 4px; border-radius: 1px; }

    /* ── Tests tab ───────────────────────────────────────────────────────── */
    #tab-tests { flex-direction: column; overflow: hidden; }

    #tests-toolbar {
      display: flex; align-items: center; gap: 8px;
      height: 36px; padding: 0 10px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #tests-toolbar button {
      background: var(--bg4); color: var(--text);
      border: 1px solid var(--border); border-radius: 3px;
      padding: 3px 12px; font-size: 12px; cursor: pointer;
    }
    #tests-toolbar button:hover { background: var(--accent); border-color: var(--accent2); color: #fff; }
    #tests-toolbar button:disabled { opacity: 0.4; cursor: default; }
    #tests-status { font-size: 12px; color: var(--text-dim); }
    #tests-status.ok  { color: var(--success); }
    #tests-status.err { color: var(--error); }

    #tests-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

    #tests-results {
      flex: 1; overflow-y: auto; min-height: 0;
      padding-bottom: 4px;
    }
    #tests-results::-webkit-scrollbar { width: 6px; }
    #tests-results::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

    #tests-coverage {
      height: 210px; border-top: 2px solid var(--border);
      overflow-y: auto; flex-shrink: 0;
    }
    #tests-coverage::-webkit-scrollbar { width: 6px; }
    #tests-coverage::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

    .tests-cov-header {
      position: sticky; top: 0;
      padding: 4px 10px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-dim); background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }

    .cov-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .cov-table td { padding: 2px 10px; }
    .cov-table tr:hover { background: var(--tree-hover); }
    .cov-file { color: var(--text); font-family: 'Fira Code', Consolas, monospace; overflow: hidden; text-overflow: ellipsis; max-width: 260px; }
    .cov-pct  { font-family: monospace; font-size: 11px; text-align: right; white-space: nowrap; }
    .cov-bar-cell { width: 80px; padding-right: 8px; }
    .cov-bar { height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
    .cov-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

    .test-file-row {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px; cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .test-file-row:hover { background: var(--tree-hover); }
    .test-file-toggle { font-size: 10px; color: var(--text-dim); flex-shrink: 0; }
    .test-file-icon { flex-shrink: 0; }
    .test-file-name { flex: 1; font-size: 12px; font-family: 'Fira Code', Consolas, monospace; overflow: hidden; text-overflow: ellipsis; }
    .test-file-meta { font-size: 11px; color: var(--text-dim); flex-shrink: 0; white-space: nowrap; }

    .test-cases { background: rgba(0,0,0,0.15); }
    .test-describe {
      padding: 3px 10px 1px 32px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-dim);
    }
    .test-case-row {
      display: flex; align-items: baseline; gap: 6px;
      padding: 2px 10px 2px 40px; font-size: 11px; color: var(--text-dim);
    }
    .test-passed { color: #4ec9b0; }
    .test-failed  { color: #f44747; }
    .test-skipped { color: #858585; }
    .test-err-msg {
      padding: 3px 10px 4px 52px;
      font-size: 11px; color: #f44747;
      font-family: 'Fira Code', Consolas, monospace;
      white-space: pre-wrap; word-break: break-word;
    }
    .test-empty { padding: 20px 10px; font-size: 12px; color: var(--text-dim); font-style: italic; }

    /* ── Overlay blocker during resize ──────────────────────────────────── */
    #iframe-blocker {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      cursor: inherit;
    }
    #iframe-blocker.active { display: block; }
  </style>

  <!-- Monaco AMD loader (served locally from port 3001) -->
  <script>
    var require = { paths: { 'vs': 'http://localhost:3001/monaco' } };
  </script>
  <script src="http://localhost:3001/monaco/loader.js"></script>
</head>
<body>

  <!-- Toolbar -->
  <div id="toolbar">
    <span id="git-branch">⎇ …</span>
    <div class="toolbar-sep"></div>
    <button id="btn-pull">↓ Pull</button>
    <input id="commit-msg" type="text" placeholder="Commit message…" autocomplete="off" spellcheck="false">
    <button id="btn-commit">✓ Commit</button>
    <button id="btn-push">↑ Push</button>
    <div class="toolbar-sep"></div>
    <div id="autosave-dot" title="Auto-save status"></div>
    <span id="git-status"></span>
  </div>

  <!-- Iframe overlay to prevent drag-capture by iframes -->
  <div id="iframe-blocker"></div>

  <!-- Root layout -->
  <div id="root">

    <!-- Left panel -->
    <div id="left-panel">

      <div id="tab-bar">
        <button class="tab-btn active" data-tab="code">Code</button>
        <button class="tab-btn" data-tab="tracker">Tracker</button>
        <button class="tab-btn" data-tab="editor">Editor</button>
        <button class="tab-btn" data-tab="models">Modelle</button>
        <button class="tab-btn" data-tab="tests">Tests</button>
      </div>

      <div id="tab-content">

        <!-- Code tab -->
        <div id="tab-code" class="tab-pane active">
          <div id="file-tree-panel">
            <div class="tree-header">
              Explorer
              <button class="tree-refresh" id="btn-refresh-tree" title="Refresh">↺</button>
            </div>
            <div id="file-tree"></div>
          </div>
          <div id="editor-container"></div>
        </div>

        <!-- Tracker tab -->
        <div id="tab-tracker" class="tab-pane">
          <div id="tracker-nav">
            <button id="btn-tr-new">Neu</button>
            <button id="btn-tr-open">Öffnen…</button>
            <button id="btn-tr-save">Speichern</button>
            <button id="btn-tr-saveas">Speichern unter…</button>
            <span id="tracker-current-file">— kein Song —</span>
          </div>
          <iframe src="http://localhost:5173/src/tracker.html" id="iframe-tracker" sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>
        </div>

        <!-- Editor tab -->
        <div id="tab-editor" class="tab-pane">
          <div id="editor-nav">
            <button id="btn-ed-new">Neu</button>
            <button id="btn-ed-open">Öffnen…</button>
            <button id="btn-ed-save">Speichern</button>
            <button id="btn-ed-saveas">Speichern unter…</button>
            <span id="editor-current-file">— keine Datei —</span>
          </div>
          <div id="editor-body">
            <div id="editor-controls"><div class="ed-section"><div class="ed-empty">Lade Editor…</div></div></div>
            <div id="editor-canvas-pane">
              <iframe src="http://localhost:5173/src/editor-preview.html" id="iframe-preview"
                sandbox="allow-scripts allow-same-origin"></iframe>
              <iframe src="http://localhost:5173/src/editor.html" id="iframe-editor"
                sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>
            </div>
          </div>
        </div>

        <!-- Models tab -->
        <div id="tab-models" class="tab-pane">
          <div id="models-nav">
            <button id="btn-mo-new">Neu</button>
            <button id="btn-mo-open">Öffnen…</button>
            <button id="btn-mo-save">Speichern</button>
            <button id="btn-mo-saveas">Speichern unter…</button>
            <span id="models-current-file">— kein Modell —</span>
          </div>
          <iframe src="http://localhost:5173/src/modeleditor.html" id="iframe-models"
            sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>
        </div>

        <!-- Tests tab -->
        <div id="tab-tests" class="tab-pane">
          <div id="tests-toolbar">
            <button id="btn-run-tests">▶ Tests ausführen</button>
            <span id="tests-status">— noch nicht ausgeführt —</span>
          </div>
          <div id="tests-body">
            <div id="tests-results"><div class="test-empty">Tests ausführen um Ergebnisse zu sehen.</div></div>
            <div id="tests-coverage"><div class="tests-cov-header">Coverage</div><div class="test-empty">—</div></div>
          </div>
        </div>

      </div>
    </div>

    <!-- Horizontal resize handle -->
    <div id="resize-h"></div>

    <!-- Right panel -->
    <div id="right-panel">

      <div id="game-pane" class="view-pane">
        <div class="pane-label">Game</div>
        <iframe src="http://localhost:5173/" id="iframe-game"></iframe>
      </div>

      <!-- Vertical resize handle -->
      <div id="resize-v"></div>

      <div id="model-pane" class="view-pane">
        <div class="pane-label">Model Viewer</div>
        <iframe src="http://localhost:5173/src/modelviewer.html" id="iframe-model"></iframe>
      </div>

    </div>
  </div>

  <script>
  // ── Globals ──────────────────────────────────────────────────────────────
  const wb = window.workbench;
  let editor = null;
  let currentFilePath = null;
  let isDirty = false;
  let autoSaveTimer = null;
  let coverageDecorationIds = [];

  // ── Auto-save dot ─────────────────────────────────────────────────────────
  const setDot = state => {
    document.getElementById('autosave-dot').className = state;
  };

  // ── Git status display ────────────────────────────────────────────────────
  let statusTimer = null;
  const showStatus = (msg, type = '') => {
    const el = document.getElementById('git-status');
    el.textContent = msg;
    el.className = type;
    clearTimeout(statusTimer);
    if (msg) statusTimer = setTimeout(() => { el.textContent = ''; el.className = ''; }, 6000);
  };

  const setButtonsBusy = busy => {
    ['btn-pull', 'btn-commit', 'btn-push'].forEach(id => {
      document.getElementById(id).disabled = busy;
    });
  };

  // ── Git toolbar ───────────────────────────────────────────────────────────
  const refreshBranch = async () => {
    try {
      const branch = await wb.git.getBranch();
      document.getElementById('git-branch').textContent = '⎇ ' + branch;
    } catch (e) {
      document.getElementById('git-branch').textContent = '⎇ ?';
    }
  };

  document.getElementById('btn-pull').addEventListener('click', async () => {
    setButtonsBusy(true);
    showStatus('Pulling…');
    try {
      const out = await wb.git.pull();
      showStatus(out || 'Already up to date.', 'ok');
      await refreshBranch();
    } catch (e) {
      showStatus(String(e), 'err');
    }
    setButtonsBusy(false);
  });

  document.getElementById('btn-commit').addEventListener('click', async () => {
    const msg = document.getElementById('commit-msg').value.trim();
    if (!msg) { showStatus('Enter a commit message first.', 'err'); return; }
    await saveCurrentFile();
    setButtonsBusy(true);
    showStatus('Committing…');
    try {
      const out = await wb.git.commit(msg);
      showStatus(out, 'ok');
      document.getElementById('commit-msg').value = '';
    } catch (e) {
      showStatus(String(e), 'err');
    }
    setButtonsBusy(false);
  });

  document.getElementById('btn-push').addEventListener('click', async () => {
    setButtonsBusy(true);
    showStatus('Pushing…');
    try {
      const out = await wb.git.push();
      showStatus(out || 'Pushed.', 'ok');
    } catch (e) {
      showStatus(String(e), 'err');
    }
    setButtonsBusy(false);
  });

  // ── File save ─────────────────────────────────────────────────────────────
  const saveCurrentFile = async () => {
    if (!currentFilePath || !editor || !isDirty) return;
    setDot('saving');
    try {
      await wb.writeFile(currentFilePath, editor.getValue());
      isDirty = false;
      setDot('saved');
      setTimeout(() => setDot(''), 1500);
    } catch (e) {
      showStatus('Save failed: ' + e, 'err');
      setDot('');
    }
  };

  const scheduleAutoSave = () => {
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => saveCurrentFile(), 2000);
  };

  // ── Language detection ────────────────────────────────────────────────────
  const LANG_MAP = {
    ts: 'typescript', tsx: 'typescript', js: 'javascript', jsx: 'javascript',
    html: 'html', css: 'css', json: 'json', md: 'markdown',
    txt: 'plaintext', mjs: 'javascript', cjs: 'javascript',
  };

  const langForPath = filePath => LANG_MAP[filePath.split('.').pop() || ''] || 'plaintext';

  // ── Open file ─────────────────────────────────────────────────────────────
  const openFile = async filePath => {
    if (editor && currentFilePath === filePath) return;
    await saveCurrentFile();

    // Highlight active item
    document.querySelectorAll('.tree-item').forEach(el => {
      el.classList.toggle('active', el.dataset.path === filePath);
    });

    try {
      const content = await wb.readFile(filePath);
      currentFilePath = filePath;
      const model = monaco.editor.createModel(
        content,
        langForPath(filePath),
        monaco.Uri.file(filePath)
      );
      // Dispose old model if different
      const old = editor.getModel();
      editor.setModel(model);
      if (old && old !== model) old.dispose();
      isDirty = false;
      setDot('');
      coverageDecorationIds = [];
      applyEditorCoverage(filePath);
    } catch (e) {
      showStatus('Could not open ' + filePath + ': ' + e, 'err');
    }
  }

  // ── File tree ─────────────────────────────────────────────────────────────
  const buildTree = async (container, dirPath, depth) => {
    let entries;
    try {
      entries = await wb.readDir(dirPath);
    } catch (e) {
      return;
    }

    for (const entry of entries) {
      const fullPath = dirPath ? dirPath + '/' + entry.name : entry.name;
      const item = document.createElement('div');
      item.className = 'tree-item';
      item.dataset.path = fullPath;
      item.style.paddingLeft = (8 + depth * 14) + 'px';

      const icon = document.createElement('span');
      icon.className = 'tree-icon';

      const name = document.createElement('span');
      name.className = 'tree-name';
      name.textContent = entry.name;

      item.appendChild(icon);
      item.appendChild(name);
      const cov = entry.isDir ? getFolderCoverage(fullPath) : getFileCoverage(fullPath);
      if (cov !== null) {
        const badge = document.createElement('span');
        badge.className = 'tree-cov ' + covClass(cov);
        badge.textContent = cov + '%';
        item.appendChild(badge);
      }
      container.appendChild(item);

      if (entry.isDir) {
        icon.textContent = '▶';
        const children = document.createElement('div');
        children.className = 'tree-children';
        children.style.display = 'none';
        container.appendChild(children);

        item.addEventListener('click', async (e) => {
          e.stopPropagation();
          const expanded = children.style.display !== 'none';
          if (expanded) {
            children.style.display = 'none';
            icon.textContent = '▶';
          } else {
            if (!children.hasChildNodes()) {
              await buildTree(children, fullPath, depth + 1);
            }
            children.style.display = '';
            icon.textContent = '▼';
          }
        });
      } else {
        icon.textContent = '·';
        item.addEventListener('click', (e) => {
          e.stopPropagation();
          openFile(fullPath);
        });
      }
    }
  }

  const refreshTree = async () => {
    const tree = document.getElementById('file-tree');
    tree.innerHTML = '';
    await buildTree(tree, '', 0);
  };

  document.getElementById('btn-refresh-tree').addEventListener('click', refreshTree);

  // ── Tab switching ─────────────────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const tab = btn.dataset.tab;

      // Auto-save before leaving Code tab
      if (document.querySelector('.tab-btn.active').dataset.tab === 'code') {
        await saveCurrentFile();
      }

      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');

      if (tab === 'code' && editor) {
        editor.layout();
      }
    });
  });

  // ── Horizontal resize (left / right panels) ───────────────────────────────
  (() => {
    const handle  = document.getElementById('resize-h');
    const left    = document.getElementById('left-panel');
    const root    = document.getElementById('root');
    const blocker = document.getElementById('iframe-blocker');
    let dragging = false, startX = 0, startW = 0;

    handle.addEventListener('mousedown', e => {
      dragging = true;
      startX = e.clientX;
      startW = left.offsetWidth;
      handle.classList.add('dragging');
      blocker.classList.add('active');
      blocker.style.cursor = 'col-resize';
      e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const newW = Math.max(300, Math.min(root.offsetWidth - 300, startW + (e.clientX - startX)));
      left.style.width = newW + 'px';
      if (editor) editor.layout();
    });

    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      handle.classList.remove('dragging');
      blocker.classList.remove('active');
    });
  })();

  // ── Vertical resize (game / modelviewer) ──────────────────────────────────
  (() => {
    const handle  = document.getElementById('resize-v');
    const gamePan = document.getElementById('game-pane');
    const modPan  = document.getElementById('model-pane');
    const right   = document.getElementById('right-panel');
    const blocker = document.getElementById('iframe-blocker');
    let dragging = false, startY = 0, startH = 0;

    handle.addEventListener('mousedown', e => {
      dragging = true;
      startY = e.clientY;
      startH = gamePan.offsetHeight;
      handle.classList.add('dragging');
      blocker.classList.add('active');
      blocker.style.cursor = 'row-resize';
      e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const totalH = right.offsetHeight;
      const handleH = handle.offsetHeight;
      const newH = Math.max(80, Math.min(totalH - handleH - 80, startH + (e.clientY - startY)));
      gamePan.style.height = newH + 'px';
      modPan.style.height  = (totalH - handleH - newH) + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      handle.classList.remove('dragging');
      blocker.classList.remove('active');
    });
  })();

  // ── Monaco init ───────────────────────────────────────────────────────────
  require(['vs/editor/editor.main'], () => {

    // TypeScript compiler options matching the project tsconfig
    monaco.languages.typescript.typescriptDefaults.setCompilerOptions({
      target:                     monaco.languages.typescript.ScriptTarget.ES2022,
      module:                     monaco.languages.typescript.ModuleKind.ESNext,
      moduleResolution:           monaco.languages.typescript.ModuleResolutionKind.Bundler,
      strict:                     true,
      noUnusedLocals:             true,
      noUnusedParameters:         true,
      noFallthroughCasesInSwitch: true,
      esModuleInterop:            true,
      allowImportingTsExtensions: true,
      isolatedModules:            true,
      allowJs:                    true,
      checkJs:                    false,
    });

    editor = monaco.editor.create(document.getElementById('editor-container'), {
      theme:              'vs-dark',
      fontSize:           13,
      fontFamily:         "'Fira Code', 'Cascadia Code', Consolas, 'Courier New', monospace",
      fontLigatures:      true,
      lineNumbers:        'on',
      glyphMargin:        true,
      minimap:            { enabled: true, scale: 1 },
      scrollBeyondLastLine: false,
      automaticLayout:    true,
      tabSize:            4,
      insertSpaces:       true,
      wordWrap:           'off',
      renderWhitespace:   'selection',
      smoothScrolling:    true,
      cursorBlinking:     'smooth',
      bracketPairColorization: { enabled: true },
    });

    // Mark dirty on change → schedule auto-save
    editor.onDidChangeModelContent(() => {
      if (!isDirty) { isDirty = true; setDot('dirty'); }
      scheduleAutoSave();
    });

    // Ctrl+S / Cmd+S → immediate save
    editor.addCommand(
      monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS,
      () => saveCurrentFile()
    );

    // Init: load file tree and git branch
    refreshBranch();
    refreshTree();
  });

  // ── Campaign editor ───────────────────────────────────────────────────────
  const edIframe    = document.getElementById('iframe-editor');
  const edFileLabel = document.getElementById('editor-current-file');
  let edCurrentFile = null;

  const edSetFile = name => {
    edCurrentFile = name;
    edFileLabel.textContent = name ? name.replace(/\.json$/, '') : '— keine Datei —';
  };

  const edImport = content => {
    const w = edIframe.contentWindow;
    if (w && w.editorImport) w.editorImport(content);
  };

  const edExport = () => {
    const w = edIframe.contentWindow;
    return (w && w.editorExport) ? w.editorExport() : null;
  };

  const edDoSave = async filename => {
    const json = edExport();
    if (!json) return;
    await wb.saveCampaignFile(filename, json);
    edSetFile(filename);
  };

  document.getElementById('btn-ed-new').addEventListener('click', () => {
    edSetFile(null);
    edImport('{"campaignTitle":"Neue Kampagne","campaignSublines":[],"levels":[]}');
  });

  document.getElementById('btn-ed-open').addEventListener('click', async () => {
    const result = await wb.showOpenDialog();
    if (result.cancelled) return;
    edSetFile(result.filename);
    edImport(result.content);
  });

  document.getElementById('btn-ed-save').addEventListener('click', async () => {
    if (!edCurrentFile) {
      const result = await wb.showSaveDialog();
      if (result.cancelled) return;
      await edDoSave(result.filename);
    } else {
      await edDoSave(edCurrentFile);
    }
  });

  document.getElementById('btn-ed-saveas').addEventListener('click', async () => {
    const result = await wb.showSaveDialog(edCurrentFile);
    if (result.cancelled) return;
    await edDoSave(result.filename);
  });

  // ── Tracker ───────────────────────────────────────────────────────────────
  const trIframe    = document.getElementById('iframe-tracker');
  const trFileLabel = document.getElementById('tracker-current-file');
  let trCurrentPath = null;

  const trSetFile = (filename, relativePath) => {
    trCurrentPath = relativePath || null;
    trFileLabel.textContent = filename || '— kein Song —';
  };

  const trImport = content => {
    const w = trIframe.contentWindow;
    if (w && w.trackerImport) w.trackerImport(content);
  };

  const trExport = () => {
    const w = trIframe.contentWindow;
    return (w && w.trackerExport) ? w.trackerExport() : null;
  };

  const trDoSave = async relativePath => {
    const json = trExport();
    if (!json) return;
    await wb.writeFile(relativePath, json);
  };

  document.getElementById('btn-tr-new').addEventListener('click', () => {
    trSetFile(null, null);
    trImport('{"bpm":"110","activeData":{},"config":{}}');
  });

  document.getElementById('btn-tr-open').addEventListener('click', async () => {
    const result = await wb.showOpenSongDialog();
    if (result.cancelled) return;
    trImport(result.content);
    trSetFile(result.filename, result.relativePath);
  });

  document.getElementById('btn-tr-save').addEventListener('click', async () => {
    if (!trCurrentPath) {
      const result = await wb.showSaveSongDialog();
      if (result.cancelled) return;
      trSetFile(result.filename, result.relativePath);
    }
    await trDoSave(trCurrentPath);
  });

  document.getElementById('btn-tr-saveas').addEventListener('click', async () => {
    const defaultName = trCurrentPath ? trCurrentPath.split('/').pop() : undefined;
    const result = await wb.showSaveSongDialog(defaultName);
    if (result.cancelled) return;
    trSetFile(result.filename, result.relativePath);
    await trDoSave(result.relativePath);
  });

  // ── Model editor ─────────────────────────────────────────────────────────
  const moIframe    = document.getElementById('iframe-models');
  const moFileLabel = document.getElementById('models-current-file');
  let moCurrentFile = null;   // basename
  let moCurrentPath = null;   // absolute path (for save-model-file)

  const moSetFile = (filename, filePath) => {
    moCurrentFile = filename || null;
    moCurrentPath = filePath || null;
    moFileLabel.textContent = filename || '— kein Modell —';
  };

  const moExport = () => {
    const w = moIframe.contentWindow;
    return (w && w.modelEditorExport) ? w.modelEditorExport() : null;
  };

  const moImport = content => {
    const w = moIframe.contentWindow;
    if (w && w.modelEditorImport) w.modelEditorImport(content);
  };

  const moDoSave = async filePath => {
    const json = moExport();
    if (!json || !filePath) return;
    await wb.saveModelFile(filePath, json);
    const w = moIframe.contentWindow;
    if (w && w.modelEditorGetState) w.modelEditorGetState().dirty = false;
  };

  document.getElementById('btn-mo-new').addEventListener('click', () => {
    moSetFile(null, null);
    moImport('{"id":"new_model","label":"New Model","static":true,"movementType":"none","pivot":[0,0,0],"faces":[],"collisionBoxes":[]}');
  });

  document.getElementById('btn-mo-open').addEventListener('click', async () => {
    const result = await wb.showOpenModelDialog();
    if (result.cancelled) return;
    moImport(result.content);
    moSetFile(result.filename, result.filePath || null);
  });

  document.getElementById('btn-mo-save').addEventListener('click', async () => {
    if (!moCurrentPath) {
      const result = await wb.showSaveModelDialog(moCurrentFile || undefined);
      if (result.cancelled) return;
      moSetFile(result.filename, result.filePath);
    }
    await moDoSave(moCurrentPath);
  });

  document.getElementById('btn-mo-saveas').addEventListener('click', async () => {
    const result = await wb.showSaveModelDialog(moCurrentFile || undefined);
    if (result.cancelled) return;
    moSetFile(result.filename, result.filePath);
    await moDoSave(result.filePath);
  });

  // ── Tests / Coverage ─────────────────────────────────────────────────────
  let coverageData = null;
  let coverageRoot = null;

  const covClass = pct => pct >= 80 ? 'cov-hi' : pct >= 50 ? 'cov-mid' : 'cov-lo';

  const getFileCoverage = relPath => {
    if (!coverageData || !coverageRoot) return null;
    const d = coverageData[coverageRoot + '/' + relPath];
    if (!d) return null;
    const stmts = Object.values(d.s);
    if (!stmts.length) return null;
    return Math.round(stmts.filter(n => n > 0).length / stmts.length * 100);
  };

  const getFolderCoverage = relPath => {
    if (!coverageData || !coverageRoot) return null;
    const prefix = coverageRoot + '/' + relPath + '/';
    let total = 0, covered = 0;
    for (const [absPath, d] of Object.entries(coverageData)) {
      if (!absPath.startsWith(prefix)) continue;
      const stmts = Object.values(d.s);
      total += stmts.length;
      covered += stmts.filter(n => n > 0).length;
    }
    return total ? Math.round(covered / total * 100) : null;
  };

  const applyCoverageToTree = () => {
    document.querySelectorAll('.tree-item').forEach(item => {
      const relPath = item.dataset.path;
      if (!relPath) return;
      item.querySelector('.tree-cov')?.remove();
      const isDir = item.nextElementSibling?.classList.contains('tree-children');
      const pct = isDir ? getFolderCoverage(relPath) : getFileCoverage(relPath);
      if (pct !== null) {
        const badge = document.createElement('span');
        badge.className = 'tree-cov ' + covClass(pct);
        badge.textContent = pct + '%';
        item.appendChild(badge);
      }
    });
  };

  const applyEditorCoverage = filePath => {
    if (!editor) return;
    const clearDecos = () => {
      if (coverageDecorationIds.length) coverageDecorationIds = editor.deltaDecorations(coverageDecorationIds, []);
    };
    if (!coverageData || !coverageRoot) { clearDecos(); return; }
    const d = coverageData[coverageRoot + '/' + filePath];
    if (!d) { clearDecos(); return; }
    const lineMap = {};
    for (const [id, count] of Object.entries(d.s)) {
      const range = d.statementMap[id];
      if (!range) continue;
      for (let l = range.start.line; l <= range.end.line; l++) {
        if (!(l in lineMap)) lineMap[l] = count > 0;
        else if (count === 0) lineMap[l] = false;
      }
    }
    const decorations = Object.entries(lineMap).map(([line, hit]) => ({
      range: new monaco.Range(+line, 1, +line, 1),
      options: {
        glyphMarginClassName: hit ? 'cov-glyph-hit' : 'cov-glyph-miss',
        overviewRulerColor: hit ? '#4ec9b050' : '#f4474760',
        overviewRulerLane: monaco.editor.OverviewRulerLane.Left,
      },
    }));
    coverageDecorationIds = editor.deltaDecorations(coverageDecorationIds, decorations);
  };

  const renderTestResults = data => {
    const el = document.getElementById('tests-results');
    const statusEl = document.getElementById('tests-status');
    if (!data || !data.testResults) {
      el.innerHTML = '<div class="test-empty">Test-Ausführung fehlgeschlagen oder keine Daten.</div>';
      statusEl.textContent = '✗ Fehler'; statusEl.className = 'err';
      return;
    }
    const passed = data.numPassedTests || 0;
    const failed = data.numFailedTests || 0;
    const dur = (data.endTime && data.startTime) ? (data.endTime - data.startTime) : 0;
    if (failed > 0) {
      statusEl.textContent = `✗ ${failed} fehlgeschlagen  ·  ${passed} bestanden  ·  ${dur}ms`;
      statusEl.className = 'err';
    } else {
      statusEl.textContent = `✓ ${passed} bestanden  ·  ${dur}ms`;
      statusEl.className = 'ok';
    }
    let html = '';
    for (const suite of data.testResults) {
      const relPath = coverageRoot && suite.testFilePath.startsWith(coverageRoot)
        ? suite.testFilePath.slice(coverageRoot.length + 1)
        : suite.testFilePath;
      const ok = suite.status === 'passed';
      const count = (suite.assertionResults || []).length;
      const sdur = suite.endTime - suite.startTime;
      const rowId = 'tr-' + Math.random().toString(36).slice(2);
      html += `<div class="test-file-row" onclick="const c=document.getElementById('${rowId}');c.style.display=c.style.display==='none'?'':'none';this.querySelector('.test-file-toggle').textContent=c.style.display==='none'?'▶':'▼'">`;
      html += `<span class="test-file-toggle">▼</span>`;
      html += `<span class="${ok ? 'test-passed' : 'test-failed'}">${ok ? '✓' : '✗'}</span>`;
      html += `<span class="test-file-name">${relPath}</span>`;
      html += `<span class="test-file-meta">${count} tests&nbsp;&nbsp;${sdur}ms</span>`;
      html += `</div>`;
      html += `<div class="test-cases" id="${rowId}">`;
      const byDescribe = {};
      for (const t of (suite.assertionResults || [])) {
        const key = (t.ancestorTitles || []).join(' › ') || '';
        if (!byDescribe[key]) byDescribe[key] = [];
        byDescribe[key].push(t);
      }
      for (const [desc, tests] of Object.entries(byDescribe)) {
        if (desc) html += `<div class="test-describe">${desc}</div>`;
        for (const t of tests) {
          const icon = t.status === 'passed' ? '✓' : t.status === 'failed' ? '✗' : '⊘';
          const cls = t.status === 'passed' ? 'test-passed' : t.status === 'failed' ? 'test-failed' : 'test-skipped';
          html += `<div class="test-case-row"><span class="${cls}">${icon}</span><span>${t.title}</span></div>`;
          if (t.failureMessages?.length) {
            for (const msg of t.failureMessages) {
              html += `<div class="test-err-msg">${msg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').slice(0, 400)}</div>`;
            }
          }
        }
      }
      html += `</div>`;
    }
    el.innerHTML = html;
  };

  const renderCoverageSummary = (data, root) => {
    const el = document.getElementById('tests-coverage');
    if (!data || !root) {
      el.innerHTML = '<div class="tests-cov-header">Coverage</div><div class="test-empty">Keine Daten.</div>';
      return;
    }
    let html = '<div class="tests-cov-header">Coverage</div><table class="cov-table">';
    const entries = Object.entries(data)
      .map(([absPath, d]) => {
        const relPath = absPath.startsWith(root + '/') ? absPath.slice(root.length + 1) : absPath;
        const stmts = Object.values(d.s);
        const stmtPct = stmts.length ? Math.round(stmts.filter(n => n > 0).length / stmts.length * 100) : 100;
        const funcs = Object.values(d.f || {});
        const funcPct = funcs.length ? Math.round(funcs.filter(n => n > 0).length / funcs.length * 100) : 100;
        return { relPath, stmtPct, funcPct };
      })
      .sort((a, b) => a.relPath.localeCompare(b.relPath));
    for (const { relPath, stmtPct, funcPct } of entries) {
      const sc = covClass(stmtPct);
      const barColor = stmtPct >= 80 ? '#4ec9b0' : stmtPct >= 50 ? '#ce9178' : '#f44747';
      html += `<tr>
        <td class="cov-file">${relPath}</td>
        <td class="cov-bar-cell"><div class="cov-bar"><div class="cov-bar-fill" style="width:${stmtPct}%;background:${barColor}"></div></div></td>
        <td class="cov-pct ${sc}">${stmtPct}%</td>
        <td class="cov-pct ${covClass(funcPct)}" style="color:var(--text-dim);font-size:10px">fn:${funcPct}%</td>
      </tr>`;
    }
    html += '</table>';
    el.innerHTML = html;
  };

  document.getElementById('btn-run-tests').addEventListener('click', async () => {
    const btn = document.getElementById('btn-run-tests');
    const statusEl = document.getElementById('tests-status');
    btn.disabled = true;
    statusEl.textContent = '⏳ Läuft…';
    statusEl.className = '';
    document.getElementById('tests-results').innerHTML = '<div class="test-empty">Tests laufen…</div>';
    try {
      const result = await wb.runTests();
      coverageData = result.coverage;
      coverageRoot = result.projectRoot;
      renderTestResults(result.testResults);
      renderCoverageSummary(result.coverage, result.projectRoot);
      applyCoverageToTree();
      if (currentFilePath) applyEditorCoverage(currentFilePath);
    } catch (e) {
      statusEl.textContent = '✗ ' + String(e); statusEl.className = 'err';
    }
    btn.disabled = false;
  });

  // ── Editor controls panel rendering ──────────────────────────────────────
  const edDispatch = (action, data) => {
    const w = edIframe.contentWindow;
    if (w && w.editorDispatch) {
      w.editorDispatch(action, data);
      setTimeout(edRefreshPanel, 80);
    }
  };

  const edH = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  const edRefreshPanel = () => {
    const controls = document.getElementById('editor-controls');
    if (controls && controls.contains(document.activeElement)) return;
    const w = edIframe.contentWindow;
    if (!w || !w.editorGetState) return;
    edRenderPanel(w.editorGetState());
  };

  const ED_TOOLS = [
    { v:'move',       l:'✋ Drag & Pan' },
    { v:'terrain',    l:'⛰️ Berge' },
    { v:'flatten',    l:'🧽 Einebnen' },
    { v:'pad',        l:'🚁 Landepad' },
    { v:'lighthouse', l:'🗼 Turm' },
    { v:'carrier',    l:'🚢 Träger' },
    { v:'boat',       l:'⛵ Boot' },
    { v:'person',     l:'🟡 Person' },
    { v:'crate',      l:'🟠 Crate' },
    { v:'foliage',    l:'🌲 Bäume' },
  ];
  const OBJ_ICONS = { pad:'🟩', carrier:'🚢', boat:'⛵', lighthouse:'🔦' };

  const edRenderPanel = st => {
    const controls = document.getElementById('editor-controls');
    if (!st) { controls.innerHTML = '<div class="ed-section"><div class="ed-empty">Lade Editor…</div></div>'; return; }

    const cm = st.currentMission;

    controls.innerHTML = `
      <div class="ed-section">
        <div class="ed-section-title">Kampagne</div>
        <label style="font-size:10px;color:var(--text-dim)">Titel</label>
        <input type="text" value="${edH(st.campaignTitle)}"
          oninput="edDispatch('set-campaign-title',{value:this.value})">
        <label style="font-size:10px;color:var(--text-dim);margin-top:4px">Sublines (1 pro Zeile)</label>
        <textarea rows="2" oninput="edDispatch('set-campaign-sublines',{value:this.value})">${edH(st.campaignSublines)}</textarea>
      </div>

      <div class="ed-section">
        <div class="ed-section-title">Missionen</div>
        ${st.missions.map(m => `
          <div class="ed-mission-item${m.active?' active':''}" onclick="edDispatch('select-mission',{idx:${m.idx}})">
            <span>${m.idx+1}. ${edH(m.headline.substring(0,20))}</span>
            <div class="ed-mission-controls">
              <button onclick="event.stopPropagation();edDispatch('move-mission',{idx:${m.idx},dir:-1})">↑</button>
              <button onclick="event.stopPropagation();edDispatch('move-mission',{idx:${m.idx},dir:1})">↓</button>
              <button class="ed-del" onclick="event.stopPropagation();edDispatch('delete-mission',{idx:${m.idx}})">✕</button>
            </div>
          </div>`).join('')}
        <button class="ed-btn" onclick="edDispatch('add-mission')">+ Mission hinzufügen</button>
        <button class="ed-btn" onclick="edDispatch('copy-mission')">📋 Duplizieren</button>
      </div>

      <div class="ed-section">
        <div class="ed-section-title">Werkzeuge</div>
        <div class="ed-radio-grid">
          ${ED_TOOLS.map(t=>`<label class="ed-radio">
            <input type="radio" name="ed-tool" value="${t.v}" ${st.tool===t.v?'checked':''}
              onchange="edDispatch('set-tool',{tool:'${t.v}'})"> ${t.l}
          </label>`).join('')}
        </div>
        ${st.tool==='foliage'?`<div style="margin-top:6px">
          <div class="ed-row" style="margin-bottom:4px">
            <label style="color:var(--text-dim)">Typ</label>
            <select style="flex:1" onchange="edDispatch('set-foliage-type',{value:this.value})">
              ${['pine','oak','bush','dead'].map(t=>`<option value="${t}" ${st.foliageType===t?'selected':''}>${{pine:'🌲 Nadel',oak:'🌳 Laub',bush:'🌿 Busch',dead:'🪵 Kahl'}[t]}</option>`).join('')}
            </select>
          </div>
          <label style="color:var(--text-dim)">Scale: ${st.foliageScale}</label>
          <input type="range" min="0.5" max="2.0" step="0.1" value="${st.foliageScale}"
            oninput="edDispatch('set-foliage-scale',{value:this.value})">
        </div>`:''}
      </div>

      <div class="ed-section">
        <div class="ed-section-title">Pinsel</div>
        ${[{v:'0',l:'1px'},{v:'1.5',l:'3 (Normal)'},{v:'5.0',l:'10 (Groß)'},{v:'15.0',l:'30 (Massiv)'}].map(b=>`
          <label class="ed-radio"><input type="radio" name="ed-brush" value="${b.v}"
            ${!st.isCustomBrush && st.brushRadius==b.v?'checked':''}
            onchange="edDispatch('set-brush',{value:'${b.v}'})"> ${b.l}</label>`).join('')}
        <div class="ed-row" style="margin-top:4px">
          <label class="ed-radio"><input type="radio" name="ed-brush" value="custom"
            ${st.isCustomBrush?'checked':''}
            onchange="edDispatch('set-brush',{value:document.getElementById('ed-custom-brush').value})"> Frei:</label>
          <input type="number" id="ed-custom-brush" value="${edH(st.customBrushValue)}"
            min="1" max="50" style="width:50px"
            oninput="if(document.querySelector('input[name=ed-brush][value=custom]').checked) edDispatch('set-brush',{value:this.value})">
        </div>
      </div>

      <div class="ed-section">
        <div class="ed-section-title">Karte</div>
        <div class="ed-row">
          <label style="color:var(--text-dim)">Größe</label>
          <input type="number" id="ed-map-size" value="${cm?cm.gridSize:100}" min="40" max="400" step="10" style="width:60px">
          <button class="ed-btn-sm" onclick="edDispatch('resize-map',{size:document.getElementById('ed-map-size').value})">Resize</button>
        </div>
        <div class="ed-row" style="margin-top:6px">
          <label style="color:var(--text-dim)">Zoom</label>
          <button class="ed-btn-sm" onclick="edDispatch('zoom-in')">+</button>
          <button class="ed-btn-sm" onclick="edDispatch('zoom-out')">−</button>
        </div>
      </div>

      ${cm ? `
      <div class="ed-section">
        <div class="ed-section-title">Mission: ${edH(cm.headline)}</div>
        <label style="font-size:10px;color:var(--text-dim)">Name</label>
        <input type="text" value="${edH(cm.headline)}" oninput="edDispatch('set-headline',{value:this.value})">
        <label style="font-size:10px;color:var(--text-dim);margin-top:4px">Briefing</label>
        <textarea rows="3" oninput="edDispatch('set-briefing',{value:this.value})">${edH(cm.briefing)}</textarea>
        <div style="margin-top:6px">
          <label><input type="checkbox" ${cm.rain?'checked':''} onchange="edDispatch('set-rain',{value:this.checked})"> 🌧️ Regen / Sturm</label>
          <label><input type="checkbox" ${cm.night?'checked':''} onchange="edDispatch('set-night',{value:this.checked})"> 🌙 Nacht</label>
        </div>
        <div class="ed-row" style="margin-top:6px">
          <label style="color:var(--text-dim)">Wind °</label>
          <input type="number" value="${cm.windDir}" min="0" max="359" style="width:52px" oninput="edDispatch('set-wind-dir',{value:this.value})">
          <label style="color:var(--text-dim)">Stärke</label>
          <input type="number" value="${cm.windStr}" step="0.1" min="0" style="width:52px" oninput="edDispatch('set-wind-str',{value:this.value})">
        </div>
        <label style="margin-top:4px"><input type="checkbox" ${cm.windVar?'checked':''} onchange="edDispatch('set-wind-var',{value:this.checked})"> Dyn. Windvarianz</label>
        <div class="ed-row" style="margin-top:6px">
          <label style="color:var(--text-dim)">NPC-Helis</label>
          <input type="number" value="${cm.npcHeliCount}" min="0" max="3" style="width:40px" oninput="edDispatch('set-npc-count',{value:this.value})">
          <select onchange="edDispatch('set-npc-type',{value:this.value})" style="flex:1">
            ${['random','dolphin','jayhawk','chinook'].map(t=>`<option value="${t}" ${cm.npcHeliType===t||(!cm.npcHeliType&&t==='random')?'selected':''}>${{random:'Zufällig',dolphin:'Dolphin',jayhawk:'Jayhawk',chinook:'Chinook'}[t]}</option>`).join('')}
          </select>
        </div>
      </div>

      <div class="ed-section">
        <div class="ed-section-title">Objekte</div>
        ${cm.objects.length ? cm.objects.map(o=>`
          <div class="ed-list-row">
            <span>${OBJ_ICONS[o.type]||'?'} ${o.type} @ (${o.x}, ${o.y})</span>
            <button class="ed-btn-sm ed-del" onclick="edDispatch('delete-object',{idx:${o.idx}})">✕</button>
          </div>`).join('') : '<div class="ed-empty">Keine Objekte</div>'}
      </div>

      <div class="ed-section">
        <div class="ed-section-title">Ziele</div>
        ${cm.objectives.length ? cm.objectives.map(o=>`
          <div class="ed-list-row">
            <span>${o.type==='rescue_all' ? '🚁 Alle retten' : `🎯 Landen: ${o.target}`}</span>
            <button class="ed-btn-sm ed-del" onclick="edDispatch('delete-objective',{idx:${o.idx}})">✕</button>
          </div>`).join('') : '<div class="ed-empty">Keine Ziele</div>'}
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">
          <button class="ed-btn" onclick="edDispatch('add-objective',{type:'rescue_all'})">+ Alle retten</button>
          <button class="ed-btn" onclick="edDispatch('add-objective',{type:'land_at',target:'pad'})">+ Landen: Pad</button>
          <button class="ed-btn" onclick="edDispatch('add-objective',{type:'land_at',target:'carrier'})">+ Landen: Carrier</button>
        </div>
      </div>

      <div class="ed-section">
        <div class="ed-section-title">Payloads</div>
        ${cm.payloads.length ? cm.payloads.map(p=>`
          <div class="ed-list-row">
            <span>${p.type==='person'?'🟡':'🟠'} ${p.type} @ (${p.x}, ${p.y})</span>
            <label style="font-size:10px;color:#8af;white-space:nowrap">
              <input type="checkbox" ${p.npcTarget?'checked':''} onchange="edDispatch('set-payload-npc',{idx:${p.idx},value:this.checked})"> NPC
            </label>
            <button class="ed-btn-sm ed-del" onclick="edDispatch('delete-payload',{idx:${p.idx}})">✕</button>
          </div>`).join('') : '<div class="ed-empty">Keine Payloads</div>'}
      </div>

      <div class="ed-section">
        <div class="ed-section-title">Beflockung <span style="font-weight:400">(${cm.foliageCount})</span></div>
        ${cm.foliageCount ? `<div style="font-size:10px;color:var(--text-dim);margin-bottom:4px">${edH(cm.foliageSummary)}</div>
          <button class="ed-btn ed-btn-danger" onclick="edDispatch('clear-foliage')">Alle löschen</button>`
          : '<div class="ed-empty">Keine Bäume</div>'}
      </div>
      ` : ''}
    `;
  }

  // Listen for state changes from editor iframe
  window.addEventListener('message', (e) => {
    if (e.data?.type === 'editor-state-changed') edRefreshPanel();
  });

  // Refresh when editor iframe finishes loading
  edIframe.addEventListener('load', () => {
    // Module needs a moment to init
    setTimeout(edRefreshPanel, 500);
  });

  // Refresh when Editor tab is clicked
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.tab === 'editor') setTimeout(edRefreshPanel, 100);
    });
  });
  </script>
</body>
</html>
