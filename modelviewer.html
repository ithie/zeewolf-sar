<!doctype html>
<html>
    <head>
        <title>ZEEWOLF Model Viewer v2</title>
        <style>
            body {
                background: #050505;
                color: #5f5;
                font-family: monospace;
                margin: 0;
                overflow: hidden;
                user-select: none;
            }
            #viewerCanvas {
                display: block;
                cursor: grab;
            }
            #viewerCanvas:active {
                cursor: grabbing;
            }
            #ui {
                position: absolute;
                top: 20px;
                left: 20px;
                pointer-events: none;
                background: rgba(0, 20, 10, 0.8);
                padding: 15px;
                border: 1px solid #3a3;
                border-radius: 4px;
                box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
            }
            h2 {
                margin-top: 0;
                color: #ff6600;
            }
        </style>
    </head>
    <body>
        <div id="ui">
            <h2>SAR MODEL VIEWER</h2>
            <p>• Drag to pan camera</p>
            <p>• Click MiniMap to teleport</p>
            <p>• C — toggle collision boxes</p>
        </div>
        <canvas id="viewerCanvas"></canvas>

        <script type="module">
            import {
                HANGAR_DEF, LIGHTHOUSE_DEF, SAILBOAT_DEF,
                JAYHAWK_DEF, DOLPHIN_DEF, CHINOOK_DEF, GLIDER_DEF,
                CARRIER_HULL_DEF, CARRIER_TOWER_DEF,
                FUEL_TRUCK_CHASSIS_DEF, FUEL_TRUCK_TANK_DEF, FUEL_TRUCK_CAB_DEF,
            } from '/src/game/defs.ts';
            import { createSceneRenderer } from '/src/game/scene-renderer.ts';

            const canvas = document.getElementById('viewerCanvas');
            const ctx = canvas.getContext('2d');
            const tileW = 64,
                tileH = 32,
                stepH = 25;

            // Camera & Input handling
            let cam = { x: -600, y: -100 };
            let isDragging = false;
            let lastMouse = { x: 0, y: 0 };
            let showCollision = true;

            window.addEventListener('keydown', e => {
                if (e.key === 'c' || e.key === 'C') showCollision = !showCollision;
            });

            // World setup for the minimap
            const WORLD = { minX: -50, maxX: 80, minY: -10, maxY: 65 };
            const MAP_SIZE = 180;
            const MAP_MARGIN = 20;

            // Models Configuration
            const MODELS = [
                { id: 'lighthouse', type: 'def', x: -35, y: 0, color: '#ff0', label: 'LIGHTHOUSE' },
                { id: 'hangar', type: 'building', x: -15, y: 0, color: '#aaa', label: 'HANGAR' },
                { id: 'dolphin', type: 'heli', x: 5, y: 0, color: '#f60', label: 'MH-65 DOLPHIN' },
                { id: 'jayhawk', type: 'heli', x: 25, y: 0, color: '#d50', label: 'MH-60T JAYHAWK' },
                { id: 'chinook', type: 'heli', x: 45, y: 0, color: '#c40', label: 'CH-47 CHINOOK' },
                { id: 'carrier', type: 'ship', x: -15, y: 25, color: '#445', label: 'CARRIER' },
                { id: 'sailboat', type: 'def', x: 5, y: 25, color: '#fff', label: 'SAILBOAT' },
                { id: 'survivor', type: 'misc', x: 25, y: 25, color: '#aaa', label: 'SURVIVOR' },
                { id: 'rescuer', type: 'misc', x: 45, y: 25, color: '#f60', label: 'RETTER' },
                { id: 'tree_pine', type: 'foliage', x: -35, y: 50, color: '#1a4a1a', label: 'PINE' },
                { id: 'tree_oak', type: 'foliage', x: -20, y: 50, color: '#2a5a10', label: 'OAK' },
                { id: 'tree_bush', type: 'foliage', x: -8, y: 50, color: '#1a4a0a', label: 'BUSH' },
                { id: 'tree_dead', type: 'foliage', x: 4, y: 50, color: '#8a6a4a', label: 'DEAD TREE' },
                { id: 'fuel_truck', type: 'vehicle', x: 20, y: 50, color: '#4a7a4a', label: 'FUEL TRUCK' },
                { id: 'glider', type: 'aircraft', x: 65, y: 0, color: '#eee', label: 'ASK-21 GLIDER' },
            ];

            canvas.addEventListener('mousedown', e => {
                let mx = e.clientX,
                    my = e.clientY;
                let mapX = canvas.width - MAP_SIZE - MAP_MARGIN;
                let mapY = canvas.height - MAP_SIZE - MAP_MARGIN;

                // Check if clicked inside MiniMap
                if (mx >= mapX && mx <= mapX + MAP_SIZE && my >= mapY && my <= mapY + MAP_SIZE) {
                    let normX = (mx - mapX) / MAP_SIZE;
                    let normY = (my - mapY) / MAP_SIZE;

                    let targetWorldX = WORLD.minX + normX * (WORLD.maxX - WORLD.minX);
                    let targetWorldY = WORLD.minY + normY * (WORLD.maxY - WORLD.minY);

                    // Center camera on world coordinates
                    cam.x = (targetWorldX - targetWorldY) * (tileW / 2);
                    cam.y = (targetWorldX + targetWorldY) * (tileH / 2);
                } else {
                    isDragging = true;
                    lastMouse = { x: mx, y: my };
                }
            });

            window.addEventListener('mouseup', () => (isDragging = false));
            window.addEventListener('mousemove', e => {
                let mapX = canvas.width - MAP_SIZE - MAP_MARGIN;
                let mapY = canvas.height - MAP_SIZE - MAP_MARGIN;
                if (e.clientX >= mapX && e.clientY >= mapY) {
                    canvas.style.cursor = 'crosshair';
                } else {
                    canvas.style.cursor = isDragging ? 'grabbing' : 'grab';
                }

                if (isDragging) {
                    cam.x -= e.clientX - lastMouse.x;
                    cam.y -= e.clientY - lastMouse.y;
                    lastMouse = { x: e.clientX, y: e.clientY };
                }
            });

            window.onresize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            window.onresize();

            function getGround(fx, fy) {
                return 0;
            }

            function iso(vx, vy, h, cx, cy) {
                return {
                    x: canvas.width / 2 + (vx - vy) * (tileW / 2) - cx,
                    y: canvas.height / 2 + (vx + vy) * (tileH / 2) - h * stepH - cy,
                };
            }

            const SceneRenderer = createSceneRenderer(ctx, iso);

            function drawFace(points, color, strokeColor, zOffset, cX, cY) {
                ctx.fillStyle = color;
                ctx.beginPath();
                let first = iso(points[0].x, points[0].y, points[0].z + zOffset, cX, cY);
                ctx.moveTo(first.x, first.y);
                for (let i = 1; i < points.length; i++) {
                    let p = iso(points[i].x, points[i].y, points[i].z + zOffset, cX, cY);
                    ctx.lineTo(p.x, p.y);
                }
                ctx.closePath();
                ctx.fill();
                if (strokeColor) {
                    ctx.strokeStyle = strokeColor;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }

            // Draw a platform frame with text
            function drawFrame(x, y, radius, label, angle, cX, cY) {
                function rot(rx, ry) {
                    return {
                        x: x + rx * Math.cos(angle) - ry * Math.sin(angle),
                        y: y + rx * Math.sin(angle) + ry * Math.cos(angle),
                        z: 0,
                    };
                }
                let p1 = rot(-radius, -radius),
                    p2 = rot(radius, -radius),
                    p3 = rot(radius, radius),
                    p4 = rot(-radius, radius);

                // Platform
                drawFace([p1, p2, p3, p4], 'rgba(0, 40, 20, 0.4)', null, -0.05, cX, cY);

                // Label
                let centerIso = iso(x, y, 0, cX, cY);
                ctx.fillStyle = '#5f5';
                ctx.font = 'bold 16px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(label, centerIso.x, centerIso.y + radius * tileH + 10);
            }

            // Math helper for rotation
            function rotate2D(cx, cy, x, y, angle) {
                let s = Math.sin(angle),
                    c = Math.cos(angle);
                x -= cx;
                y -= cy;
                return { x: x * c - y * s + cx, y: x * s + y * c + cy };
            }

            // --- CARRIER ---
            function drawHeliColored(type, hX, hY, hZ, hAngle, camX, camY) {
                drawHeli(type, hX, hY, hZ, hAngle, 0, 0, 0, camX, camY, false, '#556b2f', '#3a4a1f');
            }

            // Standalone tractor renderer — called via drawFn so it depth-sorts with tower in Pass 2.
            function drawTractor(objX, objY, angle, cx, cy, tx, ty, tAngle, bodyCol, bodyColSide, bodyColDark, cabCol, cabColSide, cabColTop) {
                const deckZ = 4.2;
                const cosA = Math.cos(angle), sinA = Math.sin(angle);
                const H = (p, z) => ({ x: p.x, y: p.y, z });
                function face(pts, col, stroke) { drawFace(pts, col, stroke || null, 0, cx, cy); }
                const bodyL = 1.0, bodyW = 0.72, bodyH = 0.15;
                const isFireTractor = cabColTop === '#eeeeee';
                const cabH = isFireTractor ? 0.22 : bodyH + 0.22;
                const cabL = isFireTractor ? bodyL * 0.75 : bodyL;
                const dZ = deckZ + 0.01, wW = 0.15, wH = 0.25;
                const cosT = Math.cos(tAngle + angle), sinT = Math.sin(tAngle + angle);
                function vt(lx, ly) { return (lx * cosT - ly * sinT) + (lx * sinT + ly * cosT) > 0; }
                const ox = objX + tx * cosA - ty * sinA;
                const oy = objY + tx * sinA + ty * cosA;
                function rr(rx, ry) { return { x: ox + rx * cosT - ry * sinT, y: oy + rx * sinT + ry * cosT }; }
                if (isFireTractor) {
                    const b1=rr(0,0),b2=rr(bodyL,0),b3=rr(bodyL,bodyW),b4=rr(0,bodyW);
                    face([H(b1,dZ),H(b2,dZ),H(b3,dZ),H(b4,dZ)],bodyCol);
                    if (vt(0,-1)) face([H(b1,dZ),H(b2,dZ),H(b2,dZ+bodyH),H(b1,dZ+bodyH)],bodyColSide);
                    if (vt(1, 0)) face([H(b2,dZ),H(b3,dZ),H(b3,dZ+bodyH),H(b2,dZ+bodyH)],bodyColDark);
                    if (vt(0, 1)) face([H(b3,dZ),H(b4,dZ),H(b4,dZ+bodyH),H(b3,dZ+bodyH)],bodyColSide);
                    if (vt(-1,0)) face([H(b4,dZ),H(b1,dZ),H(b1,dZ+bodyH),H(b4,dZ+bodyH)],bodyColDark);
                    face([H(b1,dZ+bodyH),H(b2,dZ+bodyH),H(b3,dZ+bodyH),H(b4,dZ+bodyH)],bodyColSide);
                    const eqZ=dZ+bodyH,eqW=0.2,eqL=0.25,eqH=0.18,eqX=bodyL-eqW-0.02;
                    const eq1=rr(eqX,bodyW*0.1),eq2=rr(eqX+eqW,bodyW*0.1),eq3=rr(eqX+eqW,bodyW*0.1+eqL),eq4=rr(eqX,bodyW*0.1+eqL);
                    face([H(eq1,eqZ),H(eq2,eqZ),H(eq3,eqZ),H(eq4,eqZ)],'#aa0000');
                    if (vt(0,-1)) face([H(eq1,eqZ),H(eq2,eqZ),H(eq2,eqZ+eqH),H(eq1,eqZ+eqH)],'#ee0000');
                    if (vt(1, 0)) face([H(eq2,eqZ),H(eq3,eqZ),H(eq3,eqZ+eqH),H(eq2,eqZ+eqH)],'#880000');
                    if (vt(0, 1)) face([H(eq3,eqZ),H(eq4,eqZ),H(eq4,eqZ+eqH),H(eq3,eqZ+eqH)],'#aa0000');
                    if (vt(-1,0)) face([H(eq4,eqZ),H(eq1,eqZ),H(eq1,eqZ+eqH),H(eq4,eqZ+eqH)],'#880000');
                    face([H(eq1,eqZ+eqH),H(eq2,eqZ+eqH),H(eq3,eqZ+eqH),H(eq4,eqZ+eqH)],'#cc0000');
                }
                const cZ = isFireTractor ? dZ+bodyH : dZ;
                const cc1=rr(0,0),cc2=rr(cabL,0),cc3=rr(cabL,bodyW),cc4=rr(0,bodyW);
                face([H(cc1,cZ),H(cc2,cZ),H(cc3,cZ),H(cc4,cZ)],cabCol);
                if (vt(0,-1)) face([H(cc1,cZ),H(cc2,cZ),H(cc2,cZ+cabH),H(cc1,cZ+cabH)],cabColSide);
                if (vt(1, 0)) face([H(cc2,cZ),H(cc3,cZ),H(cc3,cZ+cabH),H(cc2,cZ+cabH)],bodyColDark);
                if (vt(0, 1)) face([H(cc3,cZ),H(cc4,cZ),H(cc4,cZ+cabH),H(cc3,cZ+cabH)],cabCol);
                if (vt(-1,0)) face([H(cc4,cZ),H(cc1,cZ),H(cc1,cZ+cabH),H(cc4,cZ+cabH)],bodyColDark);
                face([H(cc1,cZ+cabH),H(cc2,cZ+cabH),H(cc3,cZ+cabH),H(cc4,cZ+cabH)],cabColTop);
                [0.15, bodyL - 0.15].forEach(ax => {
                    if (vt(0,-1)) { const w1=rr(ax-wW*0.5,0),w2=rr(ax+wW*0.5,0); face([H(w1,dZ),H(w2,dZ),H(w2,dZ+wH),H(w1,dZ+wH)],'#222'); }
                    if (vt(0, 1)) { const w1=rr(ax-wW*0.5,bodyW),w2=rr(ax+wW*0.5,bodyW); face([H(w1,dZ),H(w2,dZ),H(w2,dZ+wH),H(w1,dZ+wH)],'#222'); }
                });
            }

            // Antenna and radar — drawn after SceneRenderer.flush() (always on top, no depth conflict)
            function drawCarrierDetails(objX, objY, angle, cx, cy) {
                const deckZ = 4.2, ix = 2.6, iy = 1.0, iw = 1.5, il = 4.5, ih = 2.5;
                const cosA = Math.cos(angle), sinA = Math.sin(angle);
                function r(rx, ry) { return { x: objX + rx * cosA - ry * sinA, y: objY + rx * sinA + ry * cosA }; }

                // Antenna
                const antB = r(ix + iw * 0.5, iy + il * 0.25);
                const a0 = iso(antB.x, antB.y, deckZ + ih, cx, cy);
                const a1 = iso(antB.x, antB.y, deckZ + ih + 0.6, cx, cy);
                ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(a0.x, a0.y); ctx.lineTo(a1.x, a1.y); ctx.stroke();

                // Radar
                const rBase = r(ix + iw * 0.5, iy + il * 0.5);
                const rZ = deckZ + ih + 0.18;
                const rHub = iso(rBase.x, rBase.y, rZ, cx, cy);
                const rm0 = iso(rBase.x, rBase.y, deckZ + ih, cx, cy);
                ctx.strokeStyle = '#888'; ctx.lineWidth = 1.2;
                ctx.beginPath(); ctx.moveTo(rm0.x, rm0.y); ctx.lineTo(rHub.x, rHub.y); ctx.stroke();
                const rA = Date.now() * 0.002, rL = 0.22;
                const rt  = iso(rBase.x + Math.cos(rA) * rL, rBase.y + Math.sin(rA) * rL, rZ, cx, cy);
                const rtl = iso(rBase.x - Math.cos(rA) * rL, rBase.y - Math.sin(rA) * rL, rZ, cx, cy);
                ctx.strokeStyle = '#ccc'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(rtl.x, rtl.y); ctx.lineTo(rt.x, rt.y); ctx.stroke();
                ctx.fillStyle = '#aaa'; ctx.beginPath(); ctx.arc(rHub.x, rHub.y, 2, 0, Math.PI * 2); ctx.fill();
            }

            // --- LIGHTHOUSE BEAM (Special Object — drawn after LIGHTHOUSE_DEF flush) ---
            function drawLighthouseBeam(lhX, lhY, time, cx, cy) {
                const beamAngle = time;
                const beamEnd = { x: lhX + Math.cos(beamAngle) * 20, y: lhY + Math.sin(beamAngle) * 20 };
                const tL = iso(lhX, lhY, 8.1, cx, cy);
                const bE1 = iso(beamEnd.x + Math.cos(beamAngle + 1.5) * 5, beamEnd.y + Math.sin(beamAngle + 1.5) * 5, 0, cx, cy);
                const bE2 = iso(beamEnd.x + Math.cos(beamAngle - 1.5) * 5, beamEnd.y + Math.sin(beamAngle - 1.5) * 5, 0, cx, cy);
                ctx.fillStyle = 'rgba(255, 255, 100, 0.15)';
                ctx.beginPath();
                ctx.moveTo(tL.x, tL.y);
                ctx.lineTo(bE1.x, bE1.y);
                ctx.lineTo(bE2.x, bE2.y);
                ctx.fill();
            }

            // --- HELICOPTERS ---
            function drawHeli(
                type,
                hX,
                hY,
                hZ,
                hAngle,
                hTilt,
                hRoll,
                hRotor,
                camX,
                camY,
                isShadow = false,
                colorFill = '#ff6600',
                colorStroke = '#dd3300'
            ) {
                const targetCtx = ctx;
                const cosA = Math.cos(hAngle),
                    sinA = Math.sin(hAngle);
                let s = type === 'dolphin' ? 0.7 : 1.0;
                let fillColor = colorFill,
                    strokeColor = colorStroke;

                function p(lx, ly, lz) {
                    lx *= s;
                    ly *= s;
                    lz *= s;
                    lz += ly * hRoll * 0.5 + lx * hTilt * 0.5;
                    let rx = lx * cosA - ly * sinA + hX;
                    let ry = lx * sinA + ly * cosA + hY;
                    let rz = hZ + lz;
                    if (isShadow) {
                        rz = hZ; // shadow on deck surface
                    }
                    return iso(rx, ry, rz, camX, camY);
                }

                targetCtx.lineJoin = 'round';
                targetCtx.lineCap = 'round';

                if (type === 'dolphin') {
                    if (isShadow) {
                        targetCtx.fillStyle = `rgba(0,0,0,${Math.max(0, 0.4 - hZ * 0.08)})`;
                        let sN = p(1.2, 0, 0),
                            sT = p(-1.8, 0, 0),
                            sL = p(0, 0.4, 0),
                            sR = p(0, -0.4, 0);
                        targetCtx.beginPath();
                        targetCtx.moveTo(sN.x, sN.y);
                        targetCtx.lineTo(sR.x, sR.y);
                        targetCtx.lineTo(sT.x, sT.y);
                        targetCtx.lineTo(sL.x, sL.y);
                        targetCtx.fill();
                        return;
                    }
                    targetCtx.fillStyle = fillColor;
                    targetCtx.strokeStyle = strokeColor;
                    targetCtx.lineWidth = 1;
                    let nose = p(1.4, 0, 0.2),
                        tailBase = p(-0.8, 0, 0.5),
                        lSide = p(0, 0.4, 0.4),
                        rSide = p(0, -0.4, 0.4);
                    targetCtx.beginPath();
                    targetCtx.moveTo(nose.x, nose.y);
                    targetCtx.lineTo(rSide.x, rSide.y);
                    targetCtx.lineTo(tailBase.x, tailBase.y);
                    targetCtx.lineTo(lSide.x, lSide.y);
                    targetCtx.closePath();
                    targetCtx.fill();

                    targetCtx.fillStyle = '#112';
                    targetCtx.beginPath();
                    targetCtx.moveTo(p(1.2, 0, 0.25).x, p(1.2, 0, 0.25).y);
                    targetCtx.lineTo(p(0.3, -0.3, 0.6).x, p(0.3, -0.3, 0.6).y);
                    targetCtx.lineTo(p(0.3, 0.3, 0.6).x, p(0.3, 0.3, 0.6).y);
                    targetCtx.fill();

                    let tTop = p(-1.8, 0, 1.2),
                        tBack = p(-2.0, 0, 0.4);
                    targetCtx.fillStyle = fillColor;
                    targetCtx.beginPath();
                    targetCtx.moveTo(tailBase.x, tailBase.y);
                    targetCtx.lineTo(tTop.x, tTop.y);
                    targetCtx.lineTo(tBack.x, tBack.y);
                    targetCtx.fill();

                    // Fenestron
                    const fenCenter = p(-1.7, 0.01, 0.82);
                    const fenR = 5.5 * s;
                    targetCtx.fillStyle = '#1a1a1a';
                    targetCtx.beginPath();
                    targetCtx.arc(fenCenter.x, fenCenter.y, fenR, 0, Math.PI * 2);
                    targetCtx.fill();
                    targetCtx.strokeStyle = 'rgba(210,235,255,0.7)';
                    targetCtx.lineWidth = 1.2 * s;
                    targetCtx.lineCap = 'round';
                    for (let i = 0; i < 8; i++) {
                        const a = hRotor * 2.0 + i * (Math.PI / 4);
                        const bx1 = fenCenter.x + Math.cos(a) * fenR * 0.25;
                        const by1 = fenCenter.y + Math.sin(a) * fenR * 0.25;
                        const bx2 = fenCenter.x + Math.cos(a) * fenR * 0.88;
                        const by2 = fenCenter.y + Math.sin(a) * fenR * 0.88;
                        targetCtx.beginPath();
                        targetCtx.moveTo(bx1, by1);
                        targetCtx.lineTo(bx2, by2);
                        targetCtx.stroke();
                    }
                    targetCtx.fillStyle = '#444';
                    targetCtx.beginPath();
                    targetCtx.arc(fenCenter.x, fenCenter.y, 1.8 * s, 0, Math.PI * 2);
                    targetCtx.fill();
                    targetCtx.strokeStyle = fillColor;
                    targetCtx.lineWidth = 1.5 * s;
                    targetCtx.beginPath();
                    targetCtx.arc(fenCenter.x, fenCenter.y, fenR, 0, Math.PI * 2);
                    targetCtx.stroke();
                    // Main rotor
                    targetCtx.strokeStyle = 'rgba(220, 245, 255, 0.5)';
                    targetCtx.lineWidth = 2;
                    let hub = p(0, 0, 0.7);
                    for (let i = 0; i < 4; i++) {
                        let a = hRotor + i * (Math.PI / 2);
                        let end = p(Math.cos(a) * 1.8, Math.sin(a) * 1.8, 0.8);
                        targetCtx.beginPath();
                        targetCtx.moveTo(hub.x, hub.y);
                        targetCtx.lineTo(end.x, end.y);
                        targetCtx.stroke();
                    }
                } else if (type === 'jayhawk') {
                    if (isShadow) {
                        targetCtx.fillStyle = `rgba(0,0,0,${Math.max(0, 0.4 - hZ * 0.08)})`;
                        let sN = p(1.3, 0, 0),
                            sT = p(-2.8, 0, 0),
                            sL = p(0, 0.5, 0),
                            sR = p(0, -0.5, 0);
                        targetCtx.beginPath();
                        targetCtx.moveTo(sN.x, sN.y);
                        targetCtx.lineTo(sR.x, sR.y);
                        targetCtx.lineTo(sT.x, sT.y);
                        targetCtx.lineTo(sL.x, sL.y);
                        targetCtx.fill();
                        return;
                    }
                    targetCtx.fillStyle = '#111';
                    targetCtx.lineWidth = 4 * s;
                    targetCtx.strokeStyle = '#222';
                    targetCtx.beginPath();
                    targetCtx.moveTo(p(-2.4, 0.6, 0.3).x, p(-2.4, 0.6, 0.3).y);
                    targetCtx.lineTo(p(-2.4, -0.6, 0.3).x, p(-2.4, -0.6, 0.3).y);
                    targetCtx.stroke();

                    targetCtx.fillStyle = fillColor;
                    targetCtx.strokeStyle = strokeColor;
                    targetCtx.lineWidth = 1;
                    targetCtx.beginPath();
                    targetCtx.moveTo(p(1.3, 0, 0.3).x, p(1.3, 0, 0.3).y);
                    targetCtx.lineTo(p(0.4, -0.45, 0.4).x, p(0.4, -0.45, 0.4).y);
                    targetCtx.lineTo(p(-1.0, -0.45, 0.4).x, p(-1.0, -0.45, 0.4).y);
                    targetCtx.lineTo(p(-1.1, 0, 0.6).x, p(-1.1, 0, 0.6).y);
                    targetCtx.lineTo(p(-1.0, 0.45, 0.4).x, p(-1.0, 0.45, 0.4).y);
                    targetCtx.lineTo(p(0.4, 0.45, 0.4).x, p(0.4, 0.45, 0.4).y);
                    targetCtx.fill();
                    targetCtx.stroke();

                    targetCtx.fillStyle = '#111';
                    targetCtx.beginPath();
                    targetCtx.moveTo(p(0.3, 0.47, 0.35).x, p(0.3, 0.47, 0.35).y);
                    targetCtx.lineTo(p(-0.6, 0.47, 0.35).x, p(-0.6, 0.47, 0.35).y);
                    targetCtx.lineTo(p(-0.6, 0.3, 0.6).x, p(-0.6, 0.3, 0.6).y);
                    targetCtx.lineTo(p(0.3, 0.3, 0.6).x, p(0.3, 0.3, 0.6).y);
                    targetCtx.fill();
                    targetCtx.beginPath();
                    targetCtx.moveTo(p(0.3, -0.47, 0.35).x, p(0.3, -0.47, 0.35).y);
                    targetCtx.lineTo(p(-0.6, -0.47, 0.35).x, p(-0.6, -0.47, 0.35).y);
                    targetCtx.lineTo(p(-0.6, -0.3, 0.6).x, p(-0.6, -0.3, 0.6).y);
                    targetCtx.lineTo(p(0.3, -0.3, 0.6).x, p(0.3, -0.3, 0.6).y);
                    targetCtx.fill();

                    targetCtx.beginPath();
                    targetCtx.moveTo(p(1.3, 0, 0.3).x, p(1.3, 0, 0.3).y);
                    targetCtx.lineTo(p(0.6, 0.4, 0.6).x, p(0.6, 0.4, 0.6).y);
                    targetCtx.lineTo(p(0.6, -0.4, 0.6).x, p(0.6, -0.4, 0.6).y);
                    targetCtx.fill();

                    targetCtx.fillStyle = fillColor;
                    targetCtx.lineWidth = 6 * s;
                    targetCtx.strokeStyle = fillColor;
                    targetCtx.beginPath();
                    targetCtx.moveTo(p(-1.1, 0, 0.6).x, p(-1.1, 0, 0.6).y);
                    targetCtx.lineTo(p(-2.4, 0, 0.6).x, p(-2.4, 0, 0.6).y);
                    targetCtx.stroke();
                    targetCtx.lineWidth = 1;
                    targetCtx.beginPath();
                    targetCtx.moveTo(p(-2.4, 0, 0.6).x, p(-2.4, 0, 0.6).y);
                    targetCtx.lineTo(p(-2.9, 0, 1.3).x, p(-2.9, 0, 1.3).y);
                    targetCtx.lineTo(p(-3.0, 0, 0.6).x, p(-3.0, 0, 0.6).y);
                    targetCtx.fill();

                    // Tail rotor
                    targetCtx.strokeStyle = 'rgba(220,245,255,0.55)';
                    targetCtx.lineWidth = 2 * s;
                    targetCtx.lineCap = 'round';
                    const trHub = p(-2.95, 0.08, 0.95);
                    for (let i = 0; i < 4; i++) {
                        const a = hRotor * 1.5 + i * (Math.PI / 2);
                        const trEnd = p(-2.95 + Math.sin(a) * 0.55, 0.08, 0.95 + Math.cos(a) * 0.55);
                        targetCtx.beginPath();
                        targetCtx.moveTo(trHub.x, trHub.y);
                        targetCtx.lineTo(trEnd.x, trEnd.y);
                        targetCtx.stroke();
                    }
                    // Main rotor
                    targetCtx.strokeStyle = 'rgba(220, 245, 255, 0.5)';
                    targetCtx.lineWidth = 3 * s;
                    let hub = p(0, 0, 0.8);
                    for (let i = 0; i < 4; i++) {
                        let a = hRotor + i * (Math.PI / 2);
                        let end = p(Math.cos(a) * 2.6, Math.sin(a) * 2.6, 0.85);
                        targetCtx.beginPath();
                        targetCtx.moveTo(hub.x, hub.y);
                        targetCtx.lineTo(end.x, end.y);
                        targetCtx.stroke();
                    }
                } else if (type === 'chinook') {
                    if (isShadow) {
                        targetCtx.fillStyle = `rgba(0,0,0,${Math.max(0, 0.4 - hZ * 0.08)})`;
                        let sN = p(2.5, 0, 0),
                            sT = p(-2.8, 0, 0),
                            sL = p(0, 0.8, 0),
                            sR = p(0, -0.8, 0);
                        targetCtx.beginPath();
                        targetCtx.moveTo(sN.x, sN.y);
                        targetCtx.lineTo(sR.x, sR.y);
                        targetCtx.lineTo(sT.x, sT.y);
                        targetCtx.lineTo(sL.x, sL.y);
                        targetCtx.fill();
                        return;
                    }
                    const wf = (lx, ly, lz) => ({
                        x: lx * s * cosA - ly * s * sinA + hX,
                        y: lx * s * sinA + ly * s * cosA + hY,
                        z: hZ + (lz * s + ly * s * hRoll * 0.5 + lx * s * hTilt * 0.5),
                    });

                    let rB1 = wf(1.8, 0.3, 0.15),
                        rB2 = wf(1.8, -0.3, 0.15),
                        rB3 = wf(-2.0, -0.3, 0.15),
                        rB4 = wf(-2.0, 0.3, 0.15);
                    let rM1 = wf(1.8, 0.6, 0.5),
                        rM2 = wf(1.8, -0.6, 0.5),
                        rM3 = wf(-2.0, -0.6, 0.5),
                        rM4 = wf(-2.0, 0.6, 0.5);
                    let rT1 = wf(1.8, 0.3, 0.85),
                        rT2 = wf(1.8, -0.3, 0.85),
                        rT3 = wf(-2.0, -0.3, 0.85),
                        rT4 = wf(-2.0, 0.3, 0.85);
                    let tailTop = wf(-2.6, 0, 1.1),
                        tailLow = wf(-2.6, 0, 0.4);

                    drawFace([rB1, rB2, rB3, rB4], '#d50', null, 0, camX, camY);
                    drawFace([rB1, rM1, rM4, rB4], '#f60', null, 0, camX, camY);
                    drawFace([rM1, rT1, rT4, rM4], '#ff7711', null, 0, camX, camY);
                    drawFace([rB2, rM2, rM3, rB3], '#c40', null, 0, camX, camY);
                    drawFace([rM2, rT2, rT3, rM3], '#d50', null, 0, camX, camY);
                    drawFace([rT1, rT2, rT3, rT4], '#f60', '#d50', 0, camX, camY);
                    drawFace([rT4, rT3, tailTop], '#f60', '#d50', 0, camX, camY);
                    drawFace([rM4, rT4, tailTop, tailLow], '#ff7711', null, 0, camX, camY);
                    drawFace([rM3, rT3, tailTop, tailLow], '#d50', null, 0, camX, camY);

                    let nTip = wf(2.8, 0, 0.45);
                    drawFace([nTip, rM2, rT2, rT1, rM1], fillColor, strokeColor, 0, camX, camY);

                    // FIX: Cockpit Fenster für den Chinook
                    drawFace([wf(2.6, 0, 0.5), wf(2.2, -0.35, 0.6), wf(2.2, 0.35, 0.6)], '#111', null, 0, camX, camY);
                    drawFace(
                        [wf(1.5, 0.31, 0.6), wf(1.0, 0.31, 0.6), wf(1.0, 0.31, 0.75), wf(1.5, 0.31, 0.75)],
                        '#111',
                        null,
                        0,
                        camX,
                        camY
                    );
                    drawFace(
                        [wf(1.5, -0.31, 0.6), wf(1.0, -0.31, 0.6), wf(1.0, -0.31, 0.75), wf(1.5, -0.31, 0.75)],
                        '#111',
                        null,
                        0,
                        camX,
                        camY
                    );

                    let vT = wf(1.5, 0, 1.15);
                    drawFace([wf(1.8, 0.3, 0.85), wf(1.8, -0.3, 0.85), vT], '#f60', '#d50', 0, camX, camY);
                    drawFace([wf(1.8, -0.3, 0.85), wf(1.2, -0.3, 0.85), vT], '#d50', '#d50', 0, camX, camY);
                    drawFace([wf(1.2, -0.3, 0.85), wf(1.2, 0.3, 0.85), vT], '#f60', '#d50', 0, camX, camY);
                    drawFace([wf(1.2, 0.3, 0.85), wf(1.8, 0.3, 0.85), vT], '#ff7711', '#d50', 0, camX, camY);

                    let hTop = wf(-2.3, 0, 1.8);
                    drawFace([wf(-1.9, 0.3, 1.0), wf(-1.9, -0.3, 1.0), hTop], '#f60', '#d50', 0, camX, camY);
                    drawFace([wf(-1.9, -0.3, 1.0), wf(-2.5, -0.15, 1.1), hTop], '#d50', '#d50', 0, camX, camY);
                    drawFace([wf(-2.5, -0.15, 1.1), wf(-2.5, 0.15, 1.1), hTop], '#c40', '#d50', 0, camX, camY);
                    drawFace([wf(-2.5, 0.15, 1.1), wf(-1.9, 0.3, 1.0), hTop], '#ff7711', '#d50', 0, camX, camY);

                    targetCtx.strokeStyle = 'rgba(220, 245, 255, 0.6)';
                    targetCtx.lineWidth = 3 * s;
                    let rF = p(1.5, 0, 1.15);
                    for (let i = 0; i < 3; i++) {
                        let a = hRotor + i * ((Math.PI * 2) / 3);
                        let end = p(1.5 + Math.cos(a) * 3.4, Math.sin(a) * 3.4, 1.15);
                        targetCtx.beginPath();
                        targetCtx.moveTo(rF.x, rF.y);
                        targetCtx.lineTo(end.x, end.y);
                        targetCtx.stroke();
                    }
                    let rR = p(-2.3, 0, 1.8);
                    for (let i = 0; i < 3; i++) {
                        let a = -hRotor + i * ((Math.PI * 2) / 3);
                        let end = p(-2.3 + Math.cos(a) * 3.4, Math.sin(a) * 3.4, 1.8);
                        targetCtx.beginPath();
                        targetCtx.moveTo(rR.x, rR.y);
                        targetCtx.lineTo(end.x, end.y);
                        targetCtx.stroke();
                    }
                }
            }

            function drawJayhawkRotors(hX, hY, hZ, hAngle, hRotor, camX, camY) {
                const cosA = Math.cos(hAngle), sinA = Math.sin(hAngle);
                function p(lx, ly, lz) {
                    return iso(lx * cosA - ly * sinA + hX, lx * sinA + ly * cosA + hY, hZ + lz, camX, camY);
                }
                ctx.lineCap = 'round';
                // Main rotor
                ctx.strokeStyle = 'rgba(220, 245, 255, 0.5)';
                ctx.lineWidth = 3;
                const hub = p(0, 0, 0.8);
                for (let i = 0; i < 4; i++) {
                    const a = hRotor + i * (Math.PI / 2);
                    const end = p(Math.cos(a) * 2.6, Math.sin(a) * 2.6, 0.85);
                    ctx.beginPath(); ctx.moveTo(hub.x, hub.y); ctx.lineTo(end.x, end.y); ctx.stroke();
                }
                // Tail rotor
                ctx.strokeStyle = 'rgba(220, 245, 255, 0.55)';
                ctx.lineWidth = 2;
                const trHub = p(-2.95, 0.08, 0.95);
                for (let i = 0; i < 4; i++) {
                    const a = hRotor * 1.5 + i * (Math.PI / 2);
                    const trEnd = p(-2.95 + Math.sin(a) * 0.55, 0.08, 0.95 + Math.cos(a) * 0.55);
                    ctx.beginPath(); ctx.moveTo(trHub.x, trHub.y); ctx.lineTo(trEnd.x, trEnd.y); ctx.stroke();
                }
            }

            function drawDolphinRotors(hX, hY, hZ, hAngle, hRotor, camX, camY) {
                const s = 0.7;
                const cosA = Math.cos(hAngle), sinA = Math.sin(hAngle);
                function p(lx, ly, lz) {
                    lx *= s; ly *= s; lz *= s;
                    return iso(lx * cosA - ly * sinA + hX, lx * sinA + ly * cosA + hY, hZ + lz, camX, camY);
                }
                // Fenestron
                const fenCenter = p(-1.7, 0.01, 0.82);
                const fenR = 5.5 * s;
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath(); ctx.arc(fenCenter.x, fenCenter.y, fenR, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = 'rgba(210,235,255,0.7)';
                ctx.lineWidth = 1.2 * s;
                ctx.lineCap = 'round';
                for (let i = 0; i < 8; i++) {
                    const a = hRotor * 2.0 + i * (Math.PI / 4);
                    ctx.beginPath();
                    ctx.moveTo(fenCenter.x + Math.cos(a) * fenR * 0.25, fenCenter.y + Math.sin(a) * fenR * 0.25);
                    ctx.lineTo(fenCenter.x + Math.cos(a) * fenR * 0.88, fenCenter.y + Math.sin(a) * fenR * 0.88);
                    ctx.stroke();
                }
                ctx.fillStyle = '#444';
                ctx.beginPath(); ctx.arc(fenCenter.x, fenCenter.y, 1.8 * s, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#ff6600';
                ctx.lineWidth = 1.5 * s;
                ctx.beginPath(); ctx.arc(fenCenter.x, fenCenter.y, fenR, 0, Math.PI * 2); ctx.stroke();
                // Main rotor
                ctx.strokeStyle = 'rgba(220, 245, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                const hub = p(0, 0, 0.7);
                for (let i = 0; i < 4; i++) {
                    const a = hRotor + i * (Math.PI / 2);
                    const end = p(Math.cos(a) * 1.8, Math.sin(a) * 1.8, 0.8);
                    ctx.beginPath(); ctx.moveTo(hub.x, hub.y); ctx.lineTo(end.x, end.y); ctx.stroke();
                }
            }

            function drawChinookRotors(hX, hY, hZ, hAngle, hRotor, camX, camY) {
                const cosA = Math.cos(hAngle), sinA = Math.sin(hAngle);
                function p(lx, ly, lz) {
                    return iso(lx * cosA - ly * sinA + hX, lx * sinA + ly * cosA + hY, hZ + lz, camX, camY);
                }
                ctx.lineCap = 'round';
                ctx.lineWidth = 3;
                ctx.strokeStyle = 'rgba(220, 245, 255, 0.6)';
                // Front rotor (3-blade)
                const rF = p(1.5, 0, 1.15);
                for (let i = 0; i < 3; i++) {
                    const a = hRotor + i * ((Math.PI * 2) / 3);
                    const end = p(1.5 + Math.cos(a) * 3.4, Math.sin(a) * 3.4, 1.15);
                    ctx.beginPath(); ctx.moveTo(rF.x, rF.y); ctx.lineTo(end.x, end.y); ctx.stroke();
                }
                // Rear rotor (3-blade, counter-rotating)
                const rR = p(-2.3, 0, 1.8);
                for (let i = 0; i < 3; i++) {
                    const a = -hRotor + i * ((Math.PI * 2) / 3);
                    const end = p(-2.3 + Math.cos(a) * 3.4, Math.sin(a) * 3.4, 1.8);

            // --- PERSON (Flat Billboard, Zivile Farben) ---
            function drawPerson(pX, pY, pZ, angle, isWaving, cx, cy, outfit) {
                let base = iso(pX, pY, pZ, cx, cy);
                const scale = 1.0;
                const headR = 2.5 * scale,
                    torsoW = 5 * scale,
                    torsoH = 7 * scale;
                const legW = 2 * scale,
                    legH = 6 * scale;
                const isRescuer = outfit === 'rescuer';
                const colorShirt = isRescuer ? '#ff6600' : '#5a786e';
                const colorPants = isRescuer ? '#ff6600' : '#3b4a6b';
                const colorArm = isRescuer ? '#ff6600' : '#f2d0a4';
                const colorSkin = '#f2d0a4';
                let drawX = base.x,
                    drawY = base.y;
                ctx.fillStyle = colorPants;
                ctx.fillRect(drawX - torsoW / 2, drawY - legH, legW, legH);
                ctx.fillRect(drawX + torsoW / 2 - legW, drawY - legH, legW, legH);
                let torsoY = drawY - legH - torsoH;
                ctx.fillStyle = colorShirt;
                ctx.fillRect(drawX - torsoW / 2, torsoY, torsoW, torsoH);
                let headY = torsoY - headR + 1;
                ctx.fillStyle = isRescuer ? '#ffffff' : colorSkin;
                ctx.beginPath();
                ctx.arc(drawX, headY, headR, 0, Math.PI * 2);
                ctx.fill();
                if (isRescuer) {
                    ctx.strokeStyle = '#111';
                    ctx.lineWidth = 1.2;
                    ctx.beginPath();
                    ctx.arc(drawX, headY, headR, Math.PI * 0.9, Math.PI * 0.1, false);
                    ctx.stroke();
                }
                if (isWaving) {
                    const waveOffset = Math.sin(Date.now() * 0.015) * 3;
                    const shoulderX = drawX + torsoW / 2,
                        shoulderY = torsoY + 2;
                    ctx.strokeStyle = colorArm;
                    ctx.lineWidth = 1.5;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(shoulderX, shoulderY);
                    ctx.lineTo(shoulderX + 4 + waveOffset, shoulderY - 5);
                    ctx.stroke();
                }
            }

            // Draw the MiniMap UI
            function drawMiniMap() {
                let mapX = canvas.width - MAP_SIZE - MAP_MARGIN;
                let mapY = canvas.height - MAP_SIZE - MAP_MARGIN;

                // Map Background
                ctx.fillStyle = 'rgba(0, 20, 10, 0.8)';
                ctx.fillRect(mapX, mapY, MAP_SIZE, MAP_SIZE);
                ctx.strokeStyle = '#3a3';
                ctx.lineWidth = 2;
                ctx.strokeRect(mapX, mapY, MAP_SIZE, MAP_SIZE);

                // Helper to map world to screen
                const worldToMap = (wx, wy) => {
                    let normX = (wx - WORLD.minX) / (WORLD.maxX - WORLD.minX);
                    let normY = (wy - WORLD.minY) / (WORLD.maxY - WORLD.minY);
                    return { x: mapX + normX * MAP_SIZE, y: mapY + normY * MAP_SIZE };
                };

                // Draw Models on Map
                MODELS.forEach(m => {
                    let mp = worldToMap(m.x, m.y);
                    ctx.fillStyle = m.color;
                    ctx.beginPath();
                    ctx.arc(mp.x, mp.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Draw Camera Viewport indicator
                // Cam looks at inverse iso formula: wx = cam.x/tileW + cam.y/tileH, wy = cam.y/tileH - cam.x/tileW
                let wcx = cam.x / tileW + cam.y / tileH;
                let wcy = cam.y / tileH - cam.x / tileW;

                let cmp = worldToMap(wcx, wcy);
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 1;
                ctx.strokeRect(cmp.x - 10, cmp.y - 10, 20, 20);

                // Map Header
                ctx.fillStyle = '#5f5';
                ctx.font = '12px monospace';
                ctx.textAlign = 'left';
                ctx.fillText('MINIMAP', mapX + 5, mapY - 5);
            }

            // --- COLLISION BOX ---
            // Draws an axis-aligned bounding box in isometric space.
            // oxMin/oxMax: local X extents (forward/back)
            // oyMin/oyMax: local Y extents (left/right)
            // ozMin/ozMax: local Z extents (bottom/top)
            // angle: rotation of the object around Z (for oriented boxes)
            function drawCollisionBox(cx, cy, wX, wY, angle, oxMin, oxMax, oyMin, oyMax, ozMin, ozMax) {
                const cosA = Math.cos(angle),
                    sinA = Math.sin(angle);
                function wp(lx, ly, lz) {
                    return {
                        x: wX + lx * cosA - ly * sinA,
                        y: wY + lx * sinA + ly * cosA,
                        z: lz,
                    };
                }
                // 8 corners of the box in local space
                const corners = [
                    wp(oxMin, oyMin, ozMin),
                    wp(oxMax, oyMin, ozMin),
                    wp(oxMax, oyMax, ozMin),
                    wp(oxMin, oyMax, ozMin),
                    wp(oxMin, oyMin, ozMax),
                    wp(oxMax, oyMin, ozMax),
                    wp(oxMax, oyMax, ozMax),
                    wp(oxMin, oyMax, ozMax),
                ];
                const sc = corners.map(p => iso(p.x, p.y, p.z, cx, cy));

                // 12 edges of the AABB
                const edges = [
                    [0, 1],
                    [1, 2],
                    [2, 3],
                    [3, 0], // bottom face
                    [4, 5],
                    [5, 6],
                    [6, 7],
                    [7, 4], // top face
                    [0, 4],
                    [1, 5],
                    [2, 6],
                    [3, 7], // verticals
                ];

                ctx.save();
                ctx.strokeStyle = 'rgba(0, 255, 100, 0.85)';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([4, 3]);
                ctx.shadowColor = '#00ff66';
                ctx.shadowBlur = 4;
                edges.forEach(([a, b]) => {
                    ctx.beginPath();
                    ctx.moveTo(sc[a].x, sc[a].y);
                    ctx.lineTo(sc[b].x, sc[b].y);
                    ctx.stroke();
                });
                ctx.setLineDash([]);
                ctx.restore();
            }

            // --- TREES ---
            // Shared wind sim for viewer
            const viewerWind = { x: 0.00008, y: 0.00004, phase: 0, angle: Math.PI * 0.75 };

            function drawTree(tX, tY, cx, cy, scale = 1.0, gz = 0, type = 'pine') {
                if (gz < 0.05) gz = 0.05;
                const z0 = gz;
                const trunkH = 0.5 * scale;
                const trunkR = 0.08 * scale;
                const windStrength = Math.hypot(viewerWind.x, viewerWind.y);
                const swayPhase = viewerWind.phase + tX * 0.3 + tY * 0.17;
                const swayX = Math.cos(swayPhase) * windStrength * 18 * scale;
                const swayY = Math.sin(swayPhase) * windStrength * 10 * scale;
                if (type !== 'bush') {
                    ctx.fillStyle = type === 'dead' ? '#7a5a3a' : '#5a3a1a';
                    for (let i = 0; i <= 6; i++) {
                        const cz = z0 + i * (trunkH / 6);
                        const p = iso(tX, tY, cz, cx, cy);
                        ctx.beginPath();
                        ctx.ellipse(p.x, p.y, (trunkR * tileW) / 2, (trunkR * tileH) / 2, 0, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                if (type === 'pine') {
                    const layers = [
                        {
                            zBase: z0 + trunkH * 0.3,
                            zTop: z0 + trunkH * 0.3 + 1.4 * scale,
                            rBase: 0.9 * scale,
                            color: '#1a4a1a',
                            shadow: '#0f2f0f',
                            sway: 0.3,
                        },
                        {
                            zBase: z0 + trunkH * 0.3 + 0.7 * scale,
                            zTop: z0 + trunkH * 0.3 + 1.9 * scale,
                            rBase: 0.65 * scale,
                            color: '#1e5a1e',
                            shadow: '#133513',
                            sway: 0.65,
                        },
                        {
                            zBase: z0 + trunkH * 0.3 + 1.3 * scale,
                            zTop: z0 + trunkH * 0.3 + 2.3 * scale,
                            rBase: 0.4 * scale,
                            color: '#246024',
                            shadow: '#163a16',
                            sway: 1.0,
                        },
                    ];
                    layers.forEach(l => {
                        for (let i = 10; i >= 0; i--) {
                            const t = i / 10;
                            const cz = l.zBase + t * (l.zTop - l.zBase);
                            const r = l.rBase * (1 - t);
                            if (r <= 0) continue;
                            const p = iso(tX, tY, cz, cx, cy);
                            const ox = swayX * l.sway * (1 - t * 0.5);
                            const oy = swayY * l.sway * (1 - t * 0.5);
                            ctx.fillStyle = l.shadow;
                            ctx.beginPath();
                            ctx.ellipse(
                                p.x + ox + 2,
                                p.y + oy + 1,
                                (r * tileW) / 2,
                                (r * tileH) / 2,
                                0,
                                0,
                                Math.PI * 2
                            );
                            ctx.fill();
                            ctx.fillStyle = l.color;
                            ctx.beginPath();
                            ctx.ellipse(p.x + ox, p.y + oy, (r * tileW) / 2, (r * tileH) / 2, 0, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    });
                } else if (type === 'oak') {
                    const crownZ = z0 + trunkH + 0.5 * scale;
                    const crownR = 0.75 * scale;
                    const sw = swayX * 0.8,
                        sh = swayY * 0.8;
                    [
                        { dx: 0, dz: 0, r: crownR, col: '#2a5a10', scol: '#1a3a08' },
                        { dx: -0.25 * scale, dz: 0.3 * scale, r: crownR * 0.75, col: '#336614', scol: '#1e4a0a' },
                        { dx: 0.3 * scale, dz: 0.2 * scale, r: crownR * 0.7, col: '#2e6012', scol: '#1c4208' },
                        { dx: -0.1 * scale, dz: 0.6 * scale, r: crownR * 0.55, col: '#3a7018', scol: '#234a0e' },
                        { dx: 0.15 * scale, dz: 0.55 * scale, r: crownR * 0.5, col: '#4a8020', scol: '#2a5010' },
                    ].forEach(blob => {
                        const p = iso(tX + blob.dx * 0.3, tY, crownZ + blob.dz, cx, cy);
                        const ox = sw + blob.dx * 10,
                            oy = sh;
                        ctx.fillStyle = blob.scol;
                        ctx.beginPath();
                        ctx.ellipse(
                            p.x + ox + 3,
                            p.y + oy + 2,
                            (blob.r * tileW) / 2,
                            (blob.r * tileH) / 2,
                            0,
                            0,
                            Math.PI * 2
                        );
                        ctx.fill();
                        ctx.fillStyle = blob.col;
                        ctx.beginPath();
                        ctx.ellipse(p.x + ox, p.y + oy, (blob.r * tileW) / 2, (blob.r * tileH) / 2, 0, 0, Math.PI * 2);
                        ctx.fill();
                    });
                } else if (type === 'bush') {
                    const bz = z0 + 0.15 * scale;
                    [
                        { dx: 0, r: 0.65 * scale, col: '#1a4a0a', dz: 0 },
                        { dx: -0.2 * scale, r: 0.5 * scale, col: '#2a6014', dz: 0.1 },
                        { dx: 0.25 * scale, r: 0.45 * scale, col: '#266010', dz: 0.08 },
                        { dx: 0, r: 0.38 * scale, col: '#347018', dz: 0.2 },
                    ].forEach(blob => {
                        const p = iso(tX + blob.dx * 0.4, tY, bz + blob.dz * scale, cx, cy);
                        const ox = swayX * 0.4,
                            oy = swayY * 0.4;
                        ctx.fillStyle = blob.col;
                        ctx.beginPath();
                        ctx.ellipse(
                            p.x + ox,
                            p.y + oy,
                            ((blob.r * tileW) / 2) * 1.3,
                            (blob.r * tileH) / 2,
                            0,
                            0,
                            Math.PI * 2
                        );
                        ctx.fill();
                    });
                } else if (type === 'dead') {
                    const topZ = z0 + trunkH + 0.9 * scale;
                    const ptop = iso(tX, tY, topZ, cx, cy);
                    const pbase = iso(tX, tY, z0 + trunkH, cx, cy);
                    ctx.strokeStyle = '#8a6a4a';
                    ctx.lineWidth = Math.max(1.5, tileW * 0.06 * scale);
                    ctx.beginPath();
                    ctx.moveTo(pbase.x, pbase.y);
                    ctx.lineTo(ptop.x, ptop.y);
                    ctx.stroke();
                    ctx.lineWidth = Math.max(0.8, tileW * 0.03 * scale);
                    ctx.strokeStyle = '#7a5a3a';
                    [
                        { ax: -0.35, az: 0.45, bx: -0.6, bz: 0.65 },
                        { ax: 0.3, az: 0.5, bx: 0.55, bz: 0.68 },
                        { ax: -0.2, az: 0.72, bx: -0.38, bz: 0.88 },
                        { ax: 0.22, az: 0.75, bx: 0.4, bz: 0.9 },
                        { ax: 0, az: 0.85, bx: -0.15, bz: 1.0 },
                    ].forEach(br => {
                        const pa = iso(tX + br.ax * 0.3 * scale, tY, z0 + trunkH + br.az * scale, cx, cy);
                        const pb = iso(tX + br.bx * 0.35 * scale, tY, z0 + trunkH + br.bz * scale, cx, cy);
                        const sw2 = swayX * 0.5 * (br.bz - 0.3);
                        ctx.beginPath();
                        ctx.moveTo(pa.x, pa.y);
                        ctx.lineTo(pb.x + sw2, pb.y);
                        ctx.stroke();
                    });
                }
            }

            // --- WINDSOCK ---
            function setLightsOnDeck(lights, blink, cx, cy, z) {
                lights.forEach(l => {
                    let p = iso(l.x, l.y, z + 0.05, cx, cy);
                    ctx.fillStyle = blink ? '#f00' : '#500';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, blink ? 3 : 2.5, 0, 7);
                    ctx.fill();
                });
            }

            // --- FUEL TRUCK ---
            function drawFuelTruck(tX, tY, angle, cx, cy, armExtend = 0) {
                const cosA = Math.cos(angle), sinA = Math.sin(angle);
                const tkDepth  = tX + tY + 0.825 * (cosA + sinA);
                const cabDepth = tX + tY + 1.85  * (cosA + sinA);
                const chDepth  = Math.min(tkDepth, cabDepth) - 0.01;
                const pivotWX = tX + 0.3 * cosA;
                const pivotWY = tY + 0.3 * sinA;
                SceneRenderer.add(FUEL_TRUCK_CHASSIS_DEF, { x: tX, y: tY, z: 0, angle, depth: chDepth });
                SceneRenderer.add(FUEL_TRUCK_TANK_DEF,    { x: tX, y: tY, z: 0, angle, depth: tkDepth });
                SceneRenderer.add(FUEL_TRUCK_CAB_DEF, {
                    x: tX, y: tY, z: 0, angle, depth: cabDepth,
                    drawFn: (camX, camY) => {
                        if (armExtend <= 0) return;
                        const pivotZ = 0.98;
                        const pivotIso = iso(pivotWX, pivotWY, pivotZ, camX, camY);
                        // Elbow: extends rearward (-x direction) with slight arc
                        const elbowWX = pivotWX - cosA * 0.65 * armExtend;
                        const elbowWY = pivotWY - sinA * 0.65 * armExtend;
                        const elbowZ = pivotZ + 0.2 * Math.sin(armExtend * Math.PI * 0.7);
                        const elbowIso = iso(elbowWX, elbowWY, elbowZ, camX, camY);
                        // Tip: extends further rearward, drops down
                        const tipWX = elbowWX - cosA * 0.5 * armExtend;
                        const tipWY = elbowWY - sinA * 0.5 * armExtend;
                        const tipZ = elbowZ - 0.6 * armExtend;
                        const tipIso = iso(tipWX, tipWY, tipZ, camX, camY);
                        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                        ctx.strokeStyle = '#777'; ctx.lineWidth = 4;
                        ctx.beginPath(); ctx.moveTo(pivotIso.x, pivotIso.y); ctx.lineTo(elbowIso.x, elbowIso.y); ctx.stroke();
                        ctx.strokeStyle = '#aaa'; ctx.lineWidth = 3;
                        ctx.beginPath(); ctx.moveTo(elbowIso.x, elbowIso.y); ctx.lineTo(tipIso.x, tipIso.y); ctx.stroke();
                        ctx.fillStyle = '#555'; ctx.beginPath(); ctx.arc(elbowIso.x, elbowIso.y, 3, 0, Math.PI * 2); ctx.fill();
                        ctx.fillStyle = '#444'; ctx.beginPath(); ctx.arc(tipIso.x, tipIso.y, 4, 0, Math.PI * 2); ctx.fill();
                    },
                });
                SceneRenderer.flush(cx, cy);
            }

            // Render loop
            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const time = Date.now() * 0.002;
                const spin = time * 0.2; // Slow rotation speed
                SceneRenderer.debugCollision = showCollision;

                MODELS.forEach(m => {
                    let angle = m.type === 'building' && m.id === 'lighthouse' ? 0 : spin;
                    let radius =
                        m.type === 'ship'
                            ? 9
                            : m.type === 'heli' && m.id === 'chinook'
                              ? 4.5
                              : m.type === 'aircraft'
                                ? 5.0
                                : m.type === 'vehicle'
                                  ? 3.5
                                  : m.type === 'foliage'
                                    ? 2.5
                                    : 3.5;

                    // Platform Frame
                    drawFrame(m.x, m.y, radius, m.label, angle, cam.x, cam.y);

                    // Shadows
                    if (m.type === 'heli') {
                        drawHeli(m.id, m.x, m.y, 2, angle, 0, 0, time * 6, cam.x, cam.y, true);
                    }
                });

                // Static / Rotating Objects
                SceneRenderer.add(LIGHTHOUSE_DEF, { x: -35, y: 0, z: 0, angle: 0 });
                SceneRenderer.flush(cam.x, cam.y);
                drawLighthouseBeam(-35, 0, time, cam.x, cam.y);
                SceneRenderer.add(HANGAR_DEF, { x: -15, y: 0, z: 0, angle: spin });
                SceneRenderer.flush(cam.x, cam.y);
                const carrierAngle = spin + Math.PI / 2; // CARRIER_DEF uses +Y=stern; offset aligns bow to +X
                const carrierX = -15,
                    carrierY = 25;
                const cosCA = Math.cos(carrierAngle),
                    sinCA = Math.sin(carrierAngle);
                function rCarrier(rx, ry) {
                    return { x: carrierX + rx * cosCA - ry * sinCA, y: carrierY + rx * sinCA + ry * cosCA };
                }
                const parked = [
                    { type: 'jayhawk', xRel: -2.5, yRel: -7.0, angle: Math.PI * 0.19 },
                    { type: 'jayhawk', xRel: -2.7, yRel: -1.5, angle: Math.PI * 0.15 },
                    { type: 'dolphin', xRel:  2.5, yRel: -7.0, angle: Math.PI * 0.55 },
                ];

                // Tower depth = max depth of any tower corner (closest face wins).
                // Using the centroid would place the tower too far back when tractors sit
                // at lower local-y (bow side) but have higher world x+y at some angles.
                // Local tower corners: (2.6,1.0), (4.1,1.0), (4.1,5.5), (2.6,5.5)
                const towerDepth = Math.max(
                    ...[
                        [2.6, 1.0], [4.1, 1.0], [4.1, 5.5], [2.6, 5.5],
                    ].map(([lx, ly]) => {
                        const wx = carrierX + lx * cosCA - ly * sinCA;
                        const wy = carrierY + lx * sinCA + ly * cosCA;
                        return wx + wy;
                    })
                );

                // Pass 1: Hull — always drawn first, always below everything on the deck.
                SceneRenderer.add(CARRIER_HULL_DEF, { x: carrierX, y: carrierY, z: 0, angle: carrierAngle });
                SceneRenderer.flush(cam.x, cam.y);

                // Pass 2: Helis + Tractors + Tower — all depth-sorted against each other.
                // Everything is guaranteed above the hull (Pass 1 already flushed).
                // Tower uses its actual world centroid as depth so it sorts correctly vs. deck objects.
                parked.forEach(h => {
                    const pos = rCarrier(h.xRel, h.yRel);
                    const totalAng = h.angle + carrierAngle;
                    SceneRenderer.add(null, {
                        x: pos.x, y: pos.y, z: 0, angle: totalAng,
                        drawFn: (cx, cy) => {
                            drawHeli(h.type, pos.x, pos.y, 4.2, totalAng, 0, 0, 0, cx, cy, true);
                            drawHeliColored(h.type, pos.x, pos.y, 4.3, totalAng, cx, cy);
                            if (showCollision) {
                                const heliBox =
                                    h.type === 'dolphin'
                                        ? { x1: -1.8*0.7, x2: 1.8*0.7, y1: -0.4*0.7, y2: 0.4*0.7, z2: 0.8*0.7 }
                                        : { x1: -3.0, x2: 1.3, y1: -0.5, y2: 0.5, z2: 1.3 };
                                drawCollisionBox(cx, cy, pos.x, pos.y, totalAng,
                                    heliBox.x1, heliBox.x2, heliBox.y1, heliBox.y2,
                                    4.3, 4.3 + heliBox.z2);
                            }
                        },
                    });
                });
                // Tractors as drawFn instances — depth-sorted against helis and tower.
                const ix = 2.6, iy = 1.0;
                const tractors = [
                    { tx: ix+0.1, ty: iy-1.2, ta: 0,    bc:'#9a7a00',bs:'#c8a000',bd:'#8a6c00',cc:'#b09000',cs:'#e0b800',ct:'#caa800' },
                    { tx: ix+0.1, ty: iy-2.4, ta: 0,    bc:'#9a7a00',bs:'#c8a000',bd:'#8a6c00',cc:'#b09000',cs:'#e0b800',ct:'#caa800' },
                    { tx: ix+0.1, ty: iy-3.8, ta: 0.25, bc:'#888888',bs:'#dddddd',bd:'#666666',cc:'#aaaaaa',cs:'#ffffff',ct:'#eeeeee' },
                ];
                tractors.forEach(t => {
                    const wx = carrierX + (t.tx + 0.5) * cosCA - (t.ty + 0.35) * sinCA;
                    const wy = carrierY + (t.tx + 0.5) * sinCA + (t.ty + 0.35) * cosCA;
                    SceneRenderer.add(null, {
                        x: wx, y: wy, z: 0,
                        drawFn: (cx, cy) => drawTractor(carrierX, carrierY, carrierAngle, cx, cy,
                            t.tx, t.ty, t.ta, t.bc, t.bs, t.bd, t.cc, t.cs, t.ct),
                    });
                });
                SceneRenderer.add(CARRIER_TOWER_DEF, { x: carrierX, y: carrierY, z: 0, angle: carrierAngle, depth: towerDepth });
                // Antenna + radar sit on top of the tower — drawn after it.
                SceneRenderer.add(null, { x: carrierX, y: carrierY, z: 0, depth: towerDepth + 0.01,
                    drawFn: (cx, cy) => drawCarrierDetails(carrierX, carrierY, carrierAngle, cx, cy) });
                SceneRenderer.flush(cam.x, cam.y);

                // Helicopters
                const rotorAngle = time * 6;
                SceneRenderer.add(DOLPHIN_DEF, { x: 5, y: 0, z: 2, angle: spin,
                    drawFn: (cx, cy) => drawDolphinRotors(5, 0, 2, spin, rotorAngle, cx, cy) });
                SceneRenderer.flush(cam.x, cam.y);

                SceneRenderer.add(JAYHAWK_DEF, { x: 25, y: 0, z: 2, angle: spin,
                    drawFn: (cx, cy) => drawJayhawkRotors(25, 0, 2, spin, rotorAngle, cx, cy) });
                SceneRenderer.flush(cam.x, cam.y);

                SceneRenderer.add(CHINOOK_DEF, { x: 45, y: 0, z: 2, angle: spin,
                    drawFn: (cx, cy) => drawChinookRotors(45, 0, 2, spin, rotorAngle, cx, cy) });
                SceneRenderer.flush(cam.x, cam.y);

                SceneRenderer.add(GLIDER_DEF, { x: 65, y: 0, z: 2, angle: spin });
                SceneRenderer.flush(cam.x, cam.y);

                SceneRenderer.add(SAILBOAT_DEF, { x: 5, y: 25, z: 0, angle: spin });
                SceneRenderer.flush(cam.x, cam.y);

                drawPerson(25, 25, 0, spin, true, cam.x, cam.y, 'survivor');
                drawPerson(45, 25, 0, spin, true, cam.x, cam.y, 'rescuer');
                if (showCollision) {
                    // Person: small upright box, roughly ±0.15 x/y, height ~0.7 (in world units ~stepH based)
                    drawCollisionBox(cam.x, cam.y, 25, 25, 0, -0.2, 0.2, -0.2, 0.2, 0, 0.65);
                    drawCollisionBox(cam.x, cam.y, 45, 25, 0, -0.2, 0.2, -0.2, 0.2, 0, 0.65);
                }

                // --- ROW 3: Foliage & Vehicles ---
                viewerWind.phase += 0.008;

                drawTree(-35, 50, cam.x, cam.y, 1.2, 0.1, 'pine');
                drawTree(-20, 50, cam.x, cam.y, 1.0, 0.1, 'oak');
                drawTree(-8, 50, cam.x, cam.y, 1.0, 0.1, 'bush');
                drawTree(4, 50, cam.x, cam.y, 1.0, 0.1, 'dead');

                // Fuel Truck (legacy) — slowly rotating, arm partially extended
                const armAnim = (Math.sin(time * 0.4) + 1) / 2; // 0..1
                drawFuelTruck(20, 50, spin, cam.x, cam.y, armAnim);
                if (showCollision) {
                    drawCollisionBox(cam.x, cam.y, 20, 50, spin, 0, 2.2, -0.45, 0.45, 0, 0.9);
                }

                drawMiniMap();

                requestAnimationFrame(render);
            }

            render();
        </script>
    </body>
</html>
