<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <title>ZEEWOLF ZSynth Composer v4.0</title>
        <style>
            :root {
                --bg: #1e1e1e;
                --panel: #252526;
                --border: #3e3e42;
                --text: #cccccc;
                --drum-on: #4a90d9;
                --synth-on: #e8a838;
                --grid-off: #2d2d30;
                --active-step: rgba(255,255,255,0.15);
            }
            body {
                background: var(--bg);
                color: var(--text);
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                font-size: 12px;
                margin: 0;
                padding-bottom: 50px;
                display: flex;
                flex-direction: column;
                align-items: center;
                user-select: none;
            }
            .btn-container {
                position: sticky;
                top: 0;
                background: var(--panel);
                padding: 8px 12px;
                z-index: 1000;
                border-bottom: 1px solid var(--border);
                width: 100%;
                box-sizing: border-box;
                display: flex;
                justify-content: flex-start;
                align-items: center;
                gap: 6px;
                flex-wrap: wrap;
            }
            .sequencer-scroll {
                width: 98%;
                overflow-x: auto;
                margin-top: 12px;
                border: 1px solid var(--border);
                border-radius: 4px;
            }
            .track-container {
                background: var(--panel);
                border-bottom: 1px solid var(--border);
                padding: 8px;
                min-width: 2550px;
                display: flex;
            }
            .track-controls {
                width: 150px;
                flex-shrink: 0;
                position: sticky;
                left: 0;
                background: var(--panel);
                z-index: 10;
                padding-right: 10px;
                border-right: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                gap: 4px;
                font-size: 11px;
            }
            /* ── Drum grid (unchanged single-row toggle) ── */
            .drum-grid {
                display: grid;
                grid-template-columns: repeat(64, 52px);
                gap: 2px;
                padding-left: 10px;
                align-items: center;
            }
            .cell {
                height: 22px;
                background: var(--grid-off);
                border: 1px solid #111;
                border-radius: 2px;
                cursor: pointer;
            }
            .cell.active-drum { background: var(--drum-on); }
            .cell.playing {
                outline: 2px solid rgba(255,255,255,0.6);
                outline-offset: -2px;
            }
            .cell:nth-child(16n + 2) { border-left: 3px solid #555; }
            .cell:nth-child(4n + 2)  { border-left: 2px solid #3a3a3a; }
            .label {
                font-size: 10px;
                text-align: right;
                padding-right: 8px;
                line-height: 22px;
                color: #888;
            }

            /* ── Synth grid (one row of note selects) ── */
            .synth-grid {
                display: flex;
                gap: 2px;
                padding-left: 10px;
                align-items: center;
            }
            .step-note {
                width: 52px;
                font-size: 11px;
                flex-shrink: 0;
            }
            .step-note.has-note {
                background-color: rgba(232, 168, 56, 0.18);
                color: var(--synth-on);
                font-weight: bold;
            }
            .step-note.playing {
                outline: 2px solid rgba(255,255,255,0.6);
                outline-offset: -1px;
            }
            /* Beat dividers via nth-child */
            .step-note:nth-child(4n+1) { border-left: 2px solid #444; }
            .step-note:nth-child(16n+1) { border-left: 3px solid #666; }
            .vol-slider {
                width: 60px;
                vertical-align: middle;
            }
            textarea {
                background: var(--panel);
                color: var(--text);
                border: 1px solid var(--border);
                width: 95%;
                height: 150px;
                margin-top: 20px;
                font-size: 11px;
                padding: 10px;
                box-sizing: border-box;
                border-radius: 4px;
            }
            #step-display {
                font-variant-numeric: tabular-nums;
                color: var(--text);
                opacity: 0.7;
                font-size: 11px;
                min-width: 60px;
            }
        </style>
    </head>
    <body>
        <div class="btn-container">
            <button id="btn-play">▶ Play</button>
            <button id="btn-stop">■ Stop</button>
            <button id="btn-export" style="display:none">Export</button>
            <button id="btn-import" style="display:none">Import</button>
            <label style="display:flex;align-items:center;gap:4px">BPM <input type="number" id="bpm" value="110" style="width:55px" /></label>
            <span id="step-display">Step 1</span>
        </div>

        <div id="sequencer-root" class="sequencer-scroll"></div>

        <textarea id="io-field" placeholder="JSON hier einfügen..." style="display:none"></textarea>

        <script>
        window.trackerImport = function(content) {
            document.getElementById('io-field').value = content;
            document.getElementById('btn-import').click();
        };
        window.trackerExport = function() {
            document.getElementById('btn-export').click();
            return document.getElementById('io-field').value;
        };
        </script>
        <script type="module" src="/src/workbench/renderer/tracker/main.ts"></script>
    </body>
</html>
