<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ZEEWOLF - Campaign Builder & 3D Editor</title>
        <link rel="stylesheet" href="/src/workbench/renderer/editor/style.css" />
        <style>
            /* Canvas-only layout — all controls live in the Electron workbench panel */
            body {
                background: #181818;
                margin: 0;
                padding: 16px;
                box-sizing: border-box;
            }
            .workspace {
                display: flex;
                align-items: flex-start;
            }
            .canvas-container {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
        </style>
    </head>
    <body>
        <!-- ── Canvases ─────────────────────────────────────────────────────── -->
        <div class="workspace">
            <div class="canvas-container">
                <div class="canvas-header header-2d">
                    <span>2D Editor & Tactical Map</span>
                    <span class="canvas-hint">Klick auf Pad/Träger/Wind für Details</span>
                </div>
                <div class="editor-wrapper">
                    <canvas id="editorCanvas" width="600" height="600"></canvas>

                    <div id="ui_wind" class="floating-ui" style="left: 90px; top: 15px">
                        <span class="close-btn" id="close-wind">✖</span>
                        <strong style="color: cyan">💨 WIND VECTOR</strong><br />
                        Direction:
                        <input type="number" id="m_wind_dir" value="45" min="0" max="359" style="width: 50px" /><br />
                        Force: &nbsp;&nbsp;&nbsp;&nbsp;<input
                            type="number"
                            id="m_wind_str"
                            value="1.0"
                            step="0.1"
                            min="0"
                            max="10"
                            style="width: 50px"
                        /><br />
                        <label><input type="checkbox" id="m_wind_var" /> Dynamic Variance</label>
                    </div>

                    <div id="ui_carrier" class="floating-ui">
                        <span class="close-btn" id="close-carrier">✖</span>
                        <strong style="color: #88aaff">🚢 CARRIER OPS</strong><br />
                        <button id="btn_spawn_carrier" style="width: 100%; margin: 5px 0">Set Start Point</button>
                        Angle (°):
                        <input
                            type="number"
                            id="m_carrier_angle"
                            value="0"
                            min="0"
                            max="359"
                            style="width: 45px"
                        /><br />
                        Speed (kn):
                        <input type="number" id="m_carrier_speed" value="0" step="0.5" style="width: 45px" /><br />
                        Path:
                        <select id="m_carrier_path" style="width: 80px">
                            <option value="static">Static</option>
                            <option value="straight">Straight</option>
                            <option value="circle">Circle</option></select
                        ><br />
                        Radius: <input type="number" id="m_carrier_radius" value="40" step="5" style="width: 45px" />
                    </div>

                    <div id="ui_submarine" class="floating-ui">
                        <span class="close-btn" id="close-submarine">✖</span>
                        <strong style="color: #aaa">🤿 SUBMARINE</strong><br />
                        Angle (°):
                        <input
                            type="number"
                            id="m_submarine_angle"
                            value="0"
                            min="0"
                            max="359"
                            style="width: 45px"
                        /><br />
                        Speed (kn):
                        <input type="number" id="m_submarine_speed" value="3" step="0.5" style="width: 45px" /><br />
                        Path:
                        <select id="m_submarine_path" style="width: 80px">
                            <option value="static">Static</option>
                            <option value="straight">Straight</option>
                            <option value="circle">Circle</option></select
                        ><br />
                        Radius: <input type="number" id="m_submarine_radius" value="20" step="5" style="width: 45px" />
                    </div>

                    <div id="ui_boat" class="floating-ui">
                        <span class="close-btn" id="close-boat">✖</span>
                        <strong style="color: #4af">⛵ BOAT OPS</strong><br />
                        Angle (°):
                        <input type="number" id="m_boat_angle" value="0" min="0" max="359" style="width: 45px" /><br />
                        Speed (kn):
                        <input type="number" id="m_boat_speed" value="3" step="0.5" style="width: 45px" /><br />
                        Path:
                        <select id="m_boat_path" style="width: 80px">
                            <option value="static">Static</option>
                            <option value="straight">Straight</option>
                            <option value="circle">Circle</option></select
                        ><br />
                        Radius: <input type="number" id="m_boat_radius" value="20" step="5" style="width: 45px" />
                    </div>

                    <div id="ui_pad" class="floating-ui">
                        <span class="close-btn" id="close-pad">✖</span>
                        <strong style="color: #5f5">🚁 BASE PAD</strong><br />
                        <button id="btn_spawn_pad" style="width: 100%; margin: 5px 0">Set Start Point</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── State inputs: required by the TypeScript module, not displayed ─ -->
        <!-- These serve as the module's internal state storage,               -->
        <!-- controlled by the Electron workbench panel via editorDispatch().  -->
        <div id="editor-state" hidden>
            <!-- Tool selection -->
            <input type="radio" name="tool" value="move" />
            <input type="radio" name="tool" value="terrain" checked />
            <input type="radio" name="tool" value="flatten" />
            <input type="radio" name="tool" value="pad" />
            <input type="radio" name="tool" value="lighthouse" />
            <input type="radio" name="tool" value="carrier" />
            <input type="radio" name="tool" value="boat" />
            <input type="radio" name="tool" value="submarine" />
            <input type="radio" name="tool" value="person" />
            <input type="radio" name="tool" value="crate" />
            <input type="radio" name="tool" value="foliage" />

            <!-- Brush size -->
            <input type="radio" name="brush" value="0" />
            <input type="radio" name="brush" value="1.5" checked />
            <input type="radio" name="brush" value="5.0" />
            <input type="radio" name="brush" value="15.0" />
            <input type="radio" name="brush" value="custom" />
            <input type="number" id="m_custom_brush" value="8" min="1" max="50" />

            <!-- Foliage controls (read directly by paint() at paint-time) -->
            <select id="foliage-type">
                <option value="pine" selected>pine</option>
                <option value="oak">oak</option>
                <option value="bush">bush</option>
                <option value="dead">dead</option>
            </select>
            <input type="range" id="foliage-scale" min="0.5" max="2.0" step="0.1" value="1.0" />
            <span id="foliage-scale-val">1.0</span>
            <div id="foliage-type-bar"></div>

            <!-- Map / zoom -->
            <input type="number" id="m_grid_size" value="100" step="10" min="40" max="400" />
            <button id="btn-resize-map">Resize</button>
            <button id="btn-zoom-in">+</button>
            <button id="btn-zoom-out">-</button>

            <!-- Mission data – localised (de/en pairs, synced via syncToData / loadMission) -->
            <input type="text" id="m_headline_de" value="Phase 1" />
            <input type="text" id="m_headline_en" value="" />
            <textarea id="m_sublines_de"></textarea>
            <textarea id="m_sublines_en"></textarea>
            <textarea id="m_briefing_de"></textarea>
            <textarea id="m_briefing_en"></textarea>
            <input type="checkbox" id="m_rain" />
            <input type="checkbox" id="m_night" />
            <input type="number" id="m_npc_heli_count" value="0" min="0" max="3" />
            <select id="m_npc_heli_type">
                <option value="random">Zufällig</option>
                <option value="dolphin">Dolphin</option>
                <option value="coasthawk">Coast-Hawk</option>
                <option value="atlas">Atlas</option>
            </select>

            <!-- Campaign metadata – localised (de/en pairs, read by export) -->
            <input type="text" id="c_title_de" value="OPERATION ZEEWOLF" />
            <input type="text" id="c_title_en" value="" />
            <textarea id="c_sublines_de">
Sichere den Archipel.
Viel Glück, Pilot.</textarea
            >
            <textarea id="c_sublines_en"></textarea>
            <select id="c_type">
                <option value="ZEEWOLF_CAMPAIGN">Kampagne</option>
                <option value="tutorial">Tutorial</option>
                <option value="free-flight">Free Flight</option>
            </select>
            <select id="c_music_briefing">
                <option value="">— kein Song —</option>
                <option value="main">main</option>
                <option value="tutorial">tutorial</option>
                <option value="final">final</option>
            </select>
            <select id="c_music_ingame">
                <option value="">— kein Song —</option>
                <option value="main">main</option>
                <option value="tutorial">tutorial</option>
                <option value="final">final</option>
            </select>

            <!-- Mission / object / payload lists (rendered into by module, not displayed) -->
            <div id="mission-list"></div>
            <div id="payload-list"></div>
            <div id="object-list"></div>
            <div id="foliage-list"></div>
            <span id="foliage-count"></span>

            <!-- Mission management buttons (called programmatically) -->
            <button id="btn-add-mission">Add</button>
            <button id="btn-copy-mission">Copy</button>
            <button id="btn-clear-foliage">Clear foliage</button>

            <!-- Export / import bridge (used by editorExport / editorImport) -->
            <button id="btn-export-campaign">Export</button>
            <button id="btn-import-campaign">Import</button>
            <textarea id="output"></textarea>
        </div>

        <!-- ── Workbench bridge ────────────────────────────────────────────── -->
        <script>
            window.editorExport = function () {
                const origAlert = window.alert;
                window.alert = () => {};
                document.getElementById('btn-export-campaign').click();
                window.alert = origAlert;
                return document.getElementById('output').value || null;
            };

            window.editorGetPreviewMission = function () {
                const ed = window.__editor;
                if (!ed) return null;
                const m = ed.getCurrentMission();
                if (!m) return null;
                const { compressTerrain, compressFoliage, decompressFoliage } = window.__editorUtils || {};
                const terrain = compressTerrain
                    ? typeof m.terrain === 'string'
                        ? m.terrain
                        : compressTerrain(m.terrain)
                    : m.terrain;
                const foliage = compressFoliage
                    ? compressFoliage(typeof m.foliage === 'string' ? decompressFoliage(m.foliage) : m.foliage || [])
                    : m.foliage || [];
                return {
                    headline: m.headline || '',
                    sublines: m.sublines || [],
                    briefing: m.briefing || '',
                    gridSize: m.gridSize,
                    terrain,
                    foliage,
                    objects: m.objects || [],
                    payloads: m.payloads || [],
                    objectives: m.objectives || [],
                    spawnObject: m.spawnObject || 'pad',
                    rain: !!m.rain,
                    night: !!m.night,
                    windDir: m.windDir || 0,
                    windStr: m.windStr || 0,
                    windVar: !!m.windVar,
                    campaignType: 'ZEEWOLF_CAMPAIGN',
                };
            };

            window.editorImport = function (content) {
                document.getElementById('output').value = content;
                document.getElementById('btn-import-campaign').click();
            };

            window.editorGetState = function () {
                const ed = window.__editor;
                if (!ed) return null;
                const m = ed.getCurrentMission();
                const s = ed.state;
                const foliageArr = m && m.foliage ? m.foliage : [];
                const foliageCounts = {};
                const foliageIcons = { pine: '🌲', oak: '🌳', bush: '🌿', dead: '🪵' };
                foliageArr.forEach(function (f) {
                    foliageCounts[f.type] = (foliageCounts[f.type] || 0) + 1;
                });
                const foliageSummary = Object.entries(foliageCounts)
                    .map(function ([t, n]) {
                        return (foliageIcons[t] || '🌲') + ' ' + t + ': ' + n;
                    })
                    .join(' | ');
                return {
                    campaignTitle: {
                        de: document.getElementById('c_title_de').value,
                        en: document.getElementById('c_title_en').value,
                    },
                    campaignSublines: {
                        de: document.getElementById('c_sublines_de').value,
                        en: document.getElementById('c_sublines_en').value,
                    },
                    campaignType: document.getElementById('c_type').value,
                    musicBriefing: document.getElementById('c_music_briefing').value,
                    musicIngame: document.getElementById('c_music_ingame').value,
                    missions: s.campaign.map(function (mis, i) {
                        return { idx: i, headline: mis.headline, active: i === s.curIdx };
                    }),
                    tool: s.currentTool,
                    brushRadius: s.brushRadius,
                    isCustomBrush: s.isCustomBrush,
                    customBrushValue: document.getElementById('m_custom_brush').value,
                    foliageType: document.getElementById('foliage-type').value,
                    foliageScale: document.getElementById('foliage-scale').value,
                    currentMission: m
                        ? {
                              headline: m.headline,
                              sublines: m.sublines || [],
                              briefing: m.briefing || '',
                              gridSize: m.gridSize,
                              rain: m.rain,
                              night: m.night,
                              windDir: m.windDir,
                              windStr: m.windStr,
                              windVar: m.windVar,
                              npcHeliCount: m.npcHeliCount || 0,
                              npcHeliType: m.npcHeliType || 'random',
                              objectives: (m.objectives || []).map(function (o, i) {
                                  return Object.assign({ idx: i }, o);
                              }),
                              objects: (m.objects || []).map(function (o, i) {
                                  return { idx: i, type: o.type, x: o.x, y: o.y };
                              }),
                              payloads: (m.payloads || []).map(function (p, i) {
                                  return { idx: i, type: p.type, x: p.x, y: p.y, npcTarget: !!p.npcTarget };
                              }),
                              foliageCount: foliageArr.length,
                              foliageSummary: foliageSummary,
                          }
                        : null,
                };
            };

            window.editorDispatch = function (action, data) {
                const ed = window.__editor;
                if (!ed) return;
                const m = ed.getCurrentMission();
                const get = function (id) {
                    return document.getElementById(id);
                };
                const set = function (id, v) {
                    const el = get(id);
                    if (el) el.value = v;
                };
                const chk = function (id, v) {
                    const el = get(id);
                    if (el) el.checked = v;
                };
                const clk = function (id) {
                    const el = get(id);
                    if (el) el.click();
                };
                const fire = function (id, ev) {
                    const el = get(id);
                    if (el) el.dispatchEvent(new Event(ev));
                };

                switch (action) {
                    case 'set-campaign-title':
                        set('c_title_' + (data.lang || 'de'), data.value);
                        break;
                    case 'set-campaign-sublines':
                        set('c_sublines_' + (data.lang || 'de'), data.value);
                        break;
                    case 'set-campaign-type':
                        set('c_type', data.value);
                        break;
                    case 'set-campaign-music-briefing':
                        set('c_music_briefing', data.value);
                        break;
                    case 'set-campaign-music-ingame':
                        set('c_music_ingame', data.value);
                        break;

                    case 'select-mission':
                        ed.loadMission(data.idx);
                        break;
                    case 'add-mission':
                        clk('btn-add-mission');
                        break;
                    case 'copy-mission':
                        clk('btn-copy-mission');
                        break;
                    case 'delete-mission':
                        if (ed.state.campaign.length <= 1) return;
                        if (confirm('Mission wirklich löschen?')) {
                            ed.state.campaign.splice(data.idx, 1);
                            ed.loadMission(Math.max(0, data.idx - 1));
                        }
                        break;
                    case 'move-mission': {
                        const arr = ed.state.campaign;
                        const ni = data.idx + data.dir;
                        if (ni < 0 || ni >= arr.length) return;
                        const tmp = arr[data.idx];
                        arr[data.idx] = arr[ni];
                        arr[ni] = tmp;
                        ed.loadMission(ni);
                        break;
                    }
                    case 'set-tool': {
                        const r = document.querySelector('input[name="tool"][value="' + data.tool + '"]');
                        if (r) {
                            r.checked = true;
                            r.dispatchEvent(new Event('change'));
                        }
                        break;
                    }
                    case 'set-brush': {
                        const r = document.querySelector('input[name="brush"][value="' + data.value + '"]');
                        if (r) {
                            r.checked = true;
                            r.dispatchEvent(new Event('change'));
                        } else {
                            const cr = document.querySelector('input[name="brush"][value="custom"]');
                            if (cr) {
                                cr.checked = true;
                                cr.dispatchEvent(new Event('change'));
                            }
                            set('m_custom_brush', data.value);
                            fire('m_custom_brush', 'input');
                        }
                        break;
                    }
                    case 'set-foliage-type':
                        set('foliage-type', data.value);
                        break;
                    case 'set-foliage-scale':
                        set('foliage-scale', data.value);
                        const fsv = get('foliage-scale-val');
                        if (fsv) fsv.innerText = data.value;
                        break;
                    case 'resize-map':
                        set('m_grid_size', data.size);
                        clk('btn-resize-map');
                        break;
                    case 'zoom-in':
                        clk('btn-zoom-in');
                        break;
                    case 'zoom-out':
                        clk('btn-zoom-out');
                        break;

                    case 'set-headline': {
                        const l = data.lang || 'de';
                        set('m_headline_' + l, data.value);
                        fire('m_headline_' + l, 'input');
                        break;
                    }
                    case 'set-sublines': {
                        const l = data.lang || 'de';
                        set('m_sublines_' + l, data.value);
                        fire('m_sublines_' + l, 'input');
                        break;
                    }
                    case 'set-briefing': {
                        const l = data.lang || 'de';
                        set('m_briefing_' + l, data.value);
                        fire('m_briefing_' + l, 'input');
                        break;
                    }
                    case 'set-rain':
                        chk('m_rain', data.value);
                        fire('m_rain', 'input');
                        break;
                    case 'set-night':
                        chk('m_night', data.value);
                        fire('m_night', 'input');
                        break;
                    case 'set-wind-dir':
                        set('m_wind_dir', data.value);
                        fire('m_wind_dir', 'input');
                        break;
                    case 'set-wind-str':
                        set('m_wind_str', data.value);
                        fire('m_wind_str', 'input');
                        break;
                    case 'set-wind-var':
                        chk('m_wind_var', data.value);
                        fire('m_wind_var', 'input');
                        break;
                    case 'set-npc-count':
                        set('m_npc_heli_count', data.value);
                        fire('m_npc_heli_count', 'input');
                        break;
                    case 'set-npc-type':
                        set('m_npc_heli_type', data.value);
                        fire('m_npc_heli_type', 'input');
                        break;

                    case 'add-objective':
                        if (m) {
                            if (!m.objectives) m.objectives = [];
                            var newObj = { type: data.type };
                            if (data.target) newObj.target = data.target;
                            m.objectives.push(newObj);
                            ed.syncToData();
                        }
                        break;
                    case 'delete-objective':
                        if (m && m.objectives) {
                            m.objectives.splice(data.idx, 1);
                            ed.syncToData();
                        }
                        break;

                    case 'delete-payload':
                        if (m && m.payloads) {
                            m.payloads.splice(data.idx, 1);
                            ed.renderPayloadList();
                        }
                        break;
                    case 'set-payload-npc':
                        if (m && m.payloads && m.payloads[data.idx]) m.payloads[data.idx].npcTarget = data.value;
                        break;
                    case 'delete-object':
                        if (m) {
                            m.objects.splice(data.idx, 1);
                            ed.renderObjectList();
                        }
                        break;
                    case 'clear-foliage':
                        clk('btn-clear-foliage');
                        break;
                }
            };
        </script>

        <script type="module" src="/src/workbench/renderer/editor/main.ts"></script>
    </body>
</html>
