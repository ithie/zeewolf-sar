<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <title>ZEEWOLF – Sound Lab</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --bg: #0d0d0d;
                --bg2: #161616;
                --bg3: #1e1e1e;
                --bg4: #2a2a2a;
                --border: #333;
                --accent: #ff6600;
                --text: #ccc;
                --dim: #666;
            }
            html,
            body {
                width: 100%;
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-family: 'Courier New', monospace;
                font-size: 12px;
                overflow: hidden;
            }
            #root {
                display: flex;
                height: 100%;
            }

            #panel {
                width: 300px;
                flex-shrink: 0;
                background: var(--bg2);
                border-right: 1px solid var(--border);
                overflow-y: auto;
                padding: 12px 10px;
                display: flex;
                flex-direction: column;
                gap: 14px;
            }
            #panel::-webkit-scrollbar {
                width: 5px;
            }
            #panel::-webkit-scrollbar-thumb {
                background: var(--bg4);
                border-radius: 3px;
            }

            .module {
                border: 1px solid var(--border);
                border-radius: 3px;
                overflow: hidden;
            }
            .mod-header {
                display: flex;
                align-items: center;
                gap: 8px;
                background: var(--bg3);
                padding: 7px 10px;
                border-bottom: 1px solid var(--border);
            }
            .mod-title {
                flex: 1;
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 0.1em;
                text-transform: uppercase;
            }
            .mod-body {
                padding: 8px 10px;
                display: flex;
                flex-direction: column;
                gap: 6px;
            }

            .row {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .row label {
                width: 130px;
                flex-shrink: 0;
                color: var(--dim);
                font-size: 11px;
            }
            .row .val {
                width: 42px;
                text-align: right;
                font-size: 11px;
            }

            input[type='range'] {
                flex: 1;
                appearance: none;
                height: 3px;
                background: var(--bg4);
                border-radius: 2px;
                cursor: pointer;
                outline: none;
            }
            input[type='range']::-webkit-slider-thumb {
                appearance: none;
                width: 12px;
                height: 12px;
                border-radius: 50%;
                background: var(--accent);
                cursor: pointer;
            }
            select {
                flex: 1;
                background: var(--bg3);
                color: var(--text);
                border: 1px solid var(--border);
                border-radius: 2px;
                padding: 3px 6px;
                font-size: 11px;
                font-family: inherit;
                outline: none;
            }

            .btn-play {
                padding: 4px 10px;
                font-size: 11px;
                font-family: inherit;
                font-weight: 700;
                letter-spacing: 0.08em;
                background: var(--bg4);
                color: var(--dim);
                border: 1px solid var(--border);
                border-radius: 2px;
                cursor: pointer;
            }
            .btn-play:hover {
                border-color: var(--accent);
                color: var(--text);
            }
            .btn-play.on {
                background: #3a1a00;
                color: var(--accent);
                border-color: var(--accent);
            }

            #vis-area {
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .vis-label {
                font-size: 10px;
                color: var(--dim);
                letter-spacing: 0.08em;
                padding: 6px 10px 2px;
                text-transform: uppercase;
            }
            canvas {
                display: block;
                background: var(--bg3);
                width: 100%;
            }
            #status-bar {
                font-size: 10px;
                color: var(--dim);
                padding: 5px 10px;
                border-top: 1px solid var(--border);
            }
        </style>
    </head>
    <body>
        <div id="root">
            <div id="panel">
                <div class="module">
                    <div class="mod-header">
                        <span class="mod-title">Rotor</span>
                        <button class="btn-play" id="btn-rotor">▶ PLAY</button>
                    </div>
                    <div class="mod-body">
                        <div class="row">
                            <label>Heli-Typ</label>
                            <select id="sel-type">
                                <option value="dolphin">Dolphin (4 Blatt)</option>
                                <option value="coasthawk">Coast-Hawk (4 Blatt)</option>
                                <option value="atlas">Atlas (3 Blatt × 2)</option>
                            </select>
                        </div>
                        <div class="row">
                            <label>Throttle</label>
                            <input type="range" id="sl-throttle" min="0" max="1" step="0.01" value="0.5" />
                            <span class="val" id="vl-throttle">50%</span>
                        </div>
                        <div class="row">
                            <label>RPM-Grundwert</label>
                            <input type="range" id="sl-rpm" min="60" max="500" step="1" value="220" />
                            <span class="val" id="vl-rpm">220</span>
                        </div>
                        <div class="row">
                            <label>Puls-Schärfe</label>
                            <input type="range" id="sl-clip" min="0.05" max="1" step="0.01" value="0.35" />
                            <span class="val" id="vl-clip">0.35</span>
                        </div>
                        <div class="row">
                            <label>Filter Cutoff (Hz)</label>
                            <input type="range" id="sl-cut" min="40" max="600" step="1" value="120" />
                            <span class="val" id="vl-cut">120</span>
                        </div>
                        <div class="row">
                            <label>Filter Q</label>
                            <input type="range" id="sl-q" min="0.5" max="12" step="0.1" value="2.5" />
                            <span class="val" id="vl-q">2.5</span>
                        </div>
                        <div class="row">
                            <label>Throttle → Pitch</label>
                            <input type="range" id="sl-pitchdepth" min="0" max="2" step="0.05" value="0.6" />
                            <span class="val" id="vl-pitchdepth">0.60</span>
                        </div>
                        <div class="row">
                            <label>Throttle → Vol</label>
                            <input type="range" id="sl-voldepth" min="0" max="1" step="0.01" value="0.7" />
                            <span class="val" id="vl-voldepth">0.70</span>
                        </div>
                    </div>
                </div>

                <div class="module">
                    <div class="mod-header">
                        <span class="mod-title">Wind</span>
                        <button class="btn-play" id="btn-wind">▶ PLAY</button>
                    </div>
                    <div class="mod-body">
                        <div class="row">
                            <label>Windstärke</label>
                            <input type="range" id="sl-wind" min="0" max="1" step="0.01" value="0.5" />
                            <span class="val" id="vl-wind">0.50</span>
                        </div>
                        <div class="row">
                            <label>Böen-Tiefe</label>
                            <input type="range" id="sl-gust" min="0" max="1" step="0.01" value="0.55" />
                            <span class="val" id="vl-gust">0.55</span>
                        </div>
                        <div class="row">
                            <label>Böen-Rate (Hz)</label>
                            <input type="range" id="sl-gustrate" min="0.02" max="0.6" step="0.01" value="0.12" />
                            <span class="val" id="vl-gustrate">0.12</span>
                        </div>
                        <div class="row">
                            <label>Cutoff (Hz)</label>
                            <input type="range" id="sl-windcut" min="60" max="600" step="5" value="200" />
                            <span class="val" id="vl-windcut">200</span>
                        </div>
                    </div>
                </div>

                <div class="module">
                    <div class="mod-header">
                        <span class="mod-title">Vögel</span>
                        <button class="btn-play" id="btn-birds">▶ PLAY</button>
                    </div>
                    <div class="mod-body">
                        <div class="row">
                            <label>Chirp-Rate (/ s)</label>
                            <input type="range" id="sl-birdrate" min="0.1" max="4" step="0.1" value="0.8" />
                            <span class="val" id="vl-birdrate">0.8</span>
                        </div>
                        <div class="row">
                            <label>Tonlage (Hz)</label>
                            <input type="range" id="sl-birdpitch" min="1200" max="5000" step="50" value="2800" />
                            <span class="val" id="vl-birdpitch">2800</span>
                        </div>
                        <div class="row">
                            <label>Möwen-Modus</label>
                            <input
                                type="checkbox"
                                id="chk-gull"
                                style="width: auto; flex: none; accent-color: var(--accent)"
                                checked
                            />
                        </div>
                    </div>
                </div>
            </div>

            <div id="vis-area">
                <div class="vis-label">Wellenform</div>
                <canvas id="cv-wave"></canvas>
                <div class="vis-label">Spektrum</div>
                <canvas id="cv-freq"></canvas>
                <div id="status-bar">— gestoppt —</div>
            </div>
        </div>
        <script>
            'use strict';

            // ── Ein einziger AudioContext für alles ───────────────────────────────────────
            let actx = null;
            let analyser = null;
            let masterOut = null; // analyser → destination

            const ensureCtx = () => {
                if (actx) return;
                actx = new AudioContext();
                analyser = actx.createAnalyser();
                analyser.fftSize = 2048;
                analyser.smoothingTimeConstant = 0.8;
                analyser.connect(actx.destination);
            };

            const getVal = id => parseFloat(document.getElementById(id).value);

            // ── Rotor ─────────────────────────────────────────────────────────────────────
            const BLADES = { dolphin: 4, coasthawk: 4, atlas: 3 };
            let rotorNodes = null;

            const buildCurve = clip => {
                const n = 256,
                    curve = new Float32Array(n);
                for (let i = 0; i < n; i++) {
                    const x = (i * 2) / (n - 1) - 1;
                    curve[i] = Math.max(-1, Math.min(1, x * (1 + clip * 8)));
                }
                return curve;
            };

            const getBpf = () => {
                const blades = BLADES[document.getElementById('sel-type').value] ?? 4;
                const rpm = getVal('sl-rpm'),
                    throttle = getVal('sl-throttle'),
                    pd = getVal('sl-pitchdepth');
                return ((rpm * (1 - pd * 0.4 + pd * 0.4 * throttle * 2)) / 60) * blades;
            };

            const startRotor = () => {
                ensureCtx();
                const gain = actx.createGain();
                gain.gain.value = 0.15 + getVal('sl-voldepth') * getVal('sl-throttle') * 0.85;
                gain.connect(analyser);

                const osc = actx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.value = getBpf();

                const shaper = actx.createWaveShaper();
                shaper.curve = buildCurve(getVal('sl-clip'));
                shaper.oversample = '4x';

                const filt = actx.createBiquadFilter();
                filt.type = 'bandpass';
                filt.frequency.value = getVal('sl-cut');
                filt.Q.value = getVal('sl-q');

                const rGain = actx.createGain();
                rGain.gain.value = 0.85;

                osc.connect(shaper);
                shaper.connect(filt);
                filt.connect(rGain);
                rGain.connect(gain);

                osc.start();
                rotorNodes = { osc, shaper, filt, rGain, gain };
            };

            const stopRotor = () => {
                if (!rotorNodes) return;
                try {
                    rotorNodes.osc.stop();
                } catch (_) {}
                rotorNodes.gain.disconnect();
                rotorNodes = null;
            };

            const applyRotor = () => {
                if (!rotorNodes) return;
                const t = actx.currentTime;
                const bpf = getBpf();
                rotorNodes.osc.frequency.setTargetAtTime(bpf, t, 0.05);
                rotorNodes.filt.frequency.setTargetAtTime(getVal('sl-cut'), t, 0.02);
                rotorNodes.filt.Q.value = getVal('sl-q');
                rotorNodes.shaper.curve = buildCurve(getVal('sl-clip'));
                rotorNodes.gain.gain.setTargetAtTime(
                    0.15 + getVal('sl-voldepth') * getVal('sl-throttle') * 0.85,
                    t,
                    0.04
                );
                document.getElementById('status-bar').textContent =
                    `ROTOR  ·  BPF ${bpf.toFixed(1)} Hz  ·  Throttle ${Math.round(getVal('sl-throttle') * 100)}%`;
            };

            // ── Wind ──────────────────────────────────────────────────────────────────────
            let windNodes = null;

            const startWind = () => {
                ensureCtx();
                const gain = actx.createGain();
                gain.gain.value = getVal('sl-wind') * 0.45;
                gain.connect(analyser);

                const buf = actx.createBuffer(1, actx.sampleRate * 2, actx.sampleRate);
                const d = buf.getChannelData(0);
                for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;

                const src = actx.createBufferSource();
                src.buffer = buf;
                src.loop = true;

                const filt = actx.createBiquadFilter();
                filt.type = 'lowpass';
                filt.frequency.value = getVal('sl-windcut');
                filt.Q.value = 0.5;

                const lfo = actx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = getVal('sl-gustrate');

                const lfoGain = actx.createGain();
                lfoGain.gain.value = getVal('sl-gust') * getVal('sl-wind') * 0.25;

                lfo.connect(lfoGain);
                lfoGain.connect(gain.gain);
                src.connect(filt);
                filt.connect(gain);

                src.start();
                lfo.start();
                windNodes = { src, filt, gain, lfo, lfoGain };
            };

            const stopWind = () => {
                if (!windNodes) return;
                try {
                    windNodes.src.stop();
                    windNodes.lfo.stop();
                } catch (_) {}
                windNodes.gain.disconnect();
                windNodes = null;
            };

            const applyWind = () => {
                if (!windNodes) return;
                const t = actx.currentTime;
                const ws = getVal('sl-wind');
                windNodes.filt.frequency.setTargetAtTime(getVal('sl-windcut'), t, 0.08);
                windNodes.gain.gain.setTargetAtTime(ws * 0.45, t, 0.12);
                windNodes.lfo.frequency.setTargetAtTime(getVal('sl-gustrate'), t, 0.1);
                windNodes.lfoGain.gain.setTargetAtTime(getVal('sl-gust') * ws * 0.25, t, 0.1);
                document.getElementById('status-bar').textContent = `WIND  ·  Stärke ${Math.round(ws * 100)}%`;
            };

            // ── Vögel ─────────────────────────────────────────────────────────────────────
            let birdsRunning = false;
            let birdTimer = null;

            const fireBirdChirp = () => {
                if (!actx) return;
                const basePitch = getVal('sl-birdpitch');
                const isGull = document.getElementById('chk-gull').checked;
                const syllables = isGull ? (Math.random() < 0.5 ? 3 : 2) : 1;
                const t = actx.currentTime;

                for (let s = 0; s < syllables; s++) {
                    const off = s * (isGull ? 0.18 : 0.13);
                    const startF = basePitch * (0.75 + Math.random() * 0.5);
                    const endF = isGull ? startF * (0.35 + Math.random() * 0.2) : startF * (0.7 + Math.random() * 0.2);
                    const dur = isGull ? 0.22 : 0.1;

                    const osc = actx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(startF, t + off);
                    osc.frequency.exponentialRampToValueAtTime(Math.max(20, endF), t + off + dur);

                    const env = actx.createGain();
                    env.gain.setValueAtTime(0, t + off);
                    env.gain.linearRampToValueAtTime(0.22, t + off + 0.015);
                    env.gain.exponentialRampToValueAtTime(0.001, t + off + dur + 0.02);

                    osc.connect(env);
                    env.connect(analyser);
                    osc.start(t + off);
                    osc.stop(t + off + dur + 0.05);
                }
                document.getElementById('status-bar').textContent =
                    `VÖGEL  ·  ${isGull ? 'Möwe' : 'Singvogel'}  ·  ${Math.round(basePitch)} Hz`;
            };

            const scheduleBird = () => {
                if (!birdsRunning) return;
                fireBirdChirp();
                birdTimer = setTimeout(scheduleBird, (1000 / getVal('sl-birdrate')) * (0.4 + Math.random() * 1.2));
            };

            const startBirds = () => {
                ensureCtx();
                birdsRunning = true;
                scheduleBird();
            };

            const stopBirds = () => {
                birdsRunning = false;
                if (birdTimer) {
                    clearTimeout(birdTimer);
                    birdTimer = null;
                }
            };

            // ── Play-Toggle ───────────────────────────────────────────────────────────────
            const makeToggle = (btnId, start, stop) => {
                const btn = document.getElementById(btnId);
                let on = false;
                btn.addEventListener('click', () => {
                    if (!on) {
                        start();
                        btn.textContent = '■ STOP';
                        btn.classList.add('on');
                    } else {
                        stop();
                        btn.textContent = '▶ PLAY';
                        btn.classList.remove('on');
                    }
                    on = !on;
                });
            };

            makeToggle('btn-rotor', startRotor, stopRotor);
            makeToggle('btn-wind', startWind, stopWind);
            makeToggle('btn-birds', startBirds, stopBirds);

            // ── Slider-Wiring ─────────────────────────────────────────────────────────────
            [
                ['sl-throttle', 'vl-throttle', v => Math.round(v * 100) + '%', applyRotor],
                ['sl-rpm', 'vl-rpm', v => Math.round(v), applyRotor],
                ['sl-clip', 'vl-clip', v => (+v).toFixed(2), applyRotor],
                ['sl-cut', 'vl-cut', v => Math.round(v), applyRotor],
                ['sl-q', 'vl-q', v => (+v).toFixed(1), applyRotor],
                ['sl-pitchdepth', 'vl-pitchdepth', v => (+v).toFixed(2), applyRotor],
                ['sl-voldepth', 'vl-voldepth', v => (+v).toFixed(2), applyRotor],
                ['sl-wind', 'vl-wind', v => (+v).toFixed(2), applyWind],
                ['sl-gust', 'vl-gust', v => (+v).toFixed(2), applyWind],
                ['sl-gustrate', 'vl-gustrate', v => (+v).toFixed(2), applyWind],
                ['sl-windcut', 'vl-windcut', v => Math.round(v), applyWind],
                ['sl-birdrate', 'vl-birdrate', v => (+v).toFixed(1), null],
                ['sl-birdpitch', 'vl-birdpitch', v => Math.round(v), null],
            ].forEach(([sid, vid, fmt, cb]) => {
                const sl = document.getElementById(sid);
                const vl = document.getElementById(vid);
                sl.addEventListener('input', () => {
                    vl.textContent = fmt(sl.value);
                    if (cb) cb();
                });
            });

            document.getElementById('sel-type').addEventListener('change', applyRotor);

            // ── Visualiser ────────────────────────────────────────────────────────────────
            const cvW = document.getElementById('cv-wave');
            const cvF = document.getElementById('cv-freq');
            const ctxW = cvW.getContext('2d');
            const ctxF = cvF.getContext('2d');

            const resizeCanvases = () => {
                const area = document.getElementById('vis-area');
                const h = Math.floor((area.clientHeight - 60) / 2);
                cvW.width = area.clientWidth;
                cvW.height = h;
                cvF.width = area.clientWidth;
                cvF.height = h;
            };
            new ResizeObserver(resizeCanvases).observe(document.getElementById('vis-area'));
            resizeCanvases();

            const drawVis = () => {
                requestAnimationFrame(drawVis);
                if (!analyser) return;

                const bufLen = analyser.frequencyBinCount;
                const timeBuf = new Uint8Array(bufLen);
                const freqBuf = new Uint8Array(bufLen);
                analyser.getByteTimeDomainData(timeBuf);
                analyser.getByteFrequencyData(freqBuf);

                ctxW.fillStyle = '#0d0d0d';
                ctxW.fillRect(0, 0, cvW.width, cvW.height);
                ctxW.strokeStyle = '#ff6600';
                ctxW.lineWidth = 1.5;
                ctxW.beginPath();
                for (let i = 0; i < bufLen; i++) {
                    const y = ((timeBuf[i] / 128 - 1) * cvW.height) / 2 + cvW.height / 2;
                    i === 0 ? ctxW.moveTo(0, y) : ctxW.lineTo((i * cvW.width) / bufLen, y);
                }
                ctxW.stroke();

                const showBins = Math.min(512, bufLen);
                ctxF.fillStyle = '#0d0d0d';
                ctxF.fillRect(0, 0, cvF.width, cvF.height);
                const bw = cvF.width / showBins;
                for (let i = 0; i < showBins; i++) {
                    const norm = freqBuf[i] / 255;
                    ctxF.fillStyle = `hsl(${20 + norm * 30},100%,${30 + norm * 35}%)`;
                    ctxF.fillRect(i * bw, cvF.height - norm * cvF.height, Math.max(1, bw - 0.5), norm * cvF.height);
                }
            };
            drawVis();
        </script>
    </body>
</html>
