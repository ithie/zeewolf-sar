<!doctype html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script type="module">
import ZsynthPlayer from '/src/tracker/ZsynthPlayer';

const mods = import.meta.glob('/src/game/music/*.zsong');
const songs = {};
for (const [path, load] of Object.entries(mods)) {
    const stem = path.replace('/src/game/music/', '').replace('.json', '');
    songs[stem] = (await load()).default;
}
ZsynthPlayer.init(songs);

window.previewPlay = stem => { ZsynthPlayer.stop(); ZsynthPlayer.play(stem, 0); };
window.previewStop = ()   => ZsynthPlayer.stop();
</script>
</body>
</html>
