                }
            };

            const edH = s =>
                String(s ?? '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;');

            // ── Song key list (loaded from src/game/music/ directory) ─────────────────
            let wbSongKeys = ['main', 'tutorial', 'final'];
            const wbSongOptions = selected => {
                const opts = ['', ...wbSongKeys];
                return opts
                    .map(
                        k => `<option value="${k}"${selected === k ? ' selected' : ''}>${k || '— kein Song —'}</option>`
                    )
                    .join('');
            };
            (async () => {
                try {
                    const entries = await window.workbench.readDir('src/game/music');
                    const keys = entries
                        .filter(e => !e.isDir && e.name.endsWith('.zsong'))
                        .map(e => e.name.replace(/\.zsong$/, ''))
                        .sort();
                    if (keys.length) wbSongKeys = keys;
                } catch {}
            })();

            // ── Music preview (ZsynthPlayer — exposed by module script below) ─────────
            let wbPreviewPlaying = null;
            const wbPreviewPlay = stem => {
                if (!stem) return;
                if (wbPreviewPlaying === stem) {
                    window._wbZsynthStop?.();
                    wbPreviewPlaying = null;
                    return;
                }
                window._wbZsynthPlay?.(stem);
                wbPreviewPlaying = stem;
            };
            const wbPreviewStop = () => {
                window._wbZsynthStop?.();
                wbPreviewPlaying = null;
            };

            const edRefreshPanel = () => {
                const controls = document.getElementById('editor-controls');
                if (controls && controls.contains(document.activeElement)) return;
                const w = edIframe.contentWindow;
                if (!w || !w.editorGetState) return;
                edRenderPanel(w.editorGetState());
            };

            const ED_TOOLS = [
                { v: 'move', l: '✋ Drag & Pan' },
                { v: 'terrain', l: '⛰️ Berge' },
                { v: 'flatten', l: '🧽 Einebnen' },
                { v: 'pad', l: '🚁 Landepad' },
                { v: 'lighthouse', l: '🗼 Turm' },
                { v: 'carrier', l: '🚢 Träger' },
                { v: 'boat', l: '⛵ Boot' },
                { v: 'submarine', l: '🤿 U-Boot' },
                { v: 'person', l: '🟡 Person' },
                { v: 'crate', l: '🟠 Crate' },
                { v: 'foliage', l: '🌲 Bäume' },
            ];
            const OBJ_ICONS = { pad: '🟩', carrier: '🚢', boat: '⛵', submarine: '🤿', lighthouse: '🔦' };

            let _edLang = 'de';
            const edSetLang = lang => {
                _edLang = lang;
                if (edLastState) edRenderPanel(edLastState);
            };
            const edTabs = () => `<div style="display:flex;gap:4px;margin-bottom:4px">
    <button class="ed-btn-sm${_edLang === 'de' ? ' active' : ''}" onclick="edSetLang('de')" style="${_edLang === 'de' ? 'background:var(--accent);color:#fff' : ''}">DE</button>
    <button class="ed-btn-sm${_edLang === 'en' ? ' active' : ''}" onclick="edSetLang('en')" style="${_edLang === 'en' ? 'background:var(--accent);color:#fff' : ''}">EN</button>
  </div>`;
            const edLs = (ls, lang) => (!ls ? '' : typeof ls === 'string' ? ls : ls[lang] || '');
            let edLastState = null;

            const edRenderPanel = st => {
                edLastState = st;
                const controls = document.getElementById('editor-controls');
                if (!st) {
                    controls.innerHTML = '<div class="ed-section"><div class="ed-empty">Lade Editor…</div></div>';
                    return;
                }

                const cm = st.currentMission;

                controls.innerHTML = `
      <div class="ed-section">
        <div class="ed-section-title">Kampagne</div>
        <label style="font-size:10px;color:var(--text-dim)">Titel</label>
        ${edTabs()}
        <input type="text" value="${edH(edLs(st.campaignTitle, _edLang))}"
          oninput="edDispatch('set-campaign-title',{lang:'${_edLang}',value:this.value})">
        <label style="font-size:10px;color:var(--text-dim);margin-top:4px">Sublines (1 pro Zeile)</label>
        ${edTabs()}
        <textarea rows="2" oninput="edDispatch('set-campaign-sublines',{lang:'${_edLang}',value:this.value})">${edH(edLs(st.campaignSublines, _edLang))}</textarea>
        <label style="font-size:10px;color:var(--text-dim);margin-top:6px">Typ</label>
        <select onchange="edDispatch('set-campaign-type',{value:this.value})">
          <option value="ZEEWOLF_CAMPAIGN"${st.campaignType === 'ZEEWOLF_CAMPAIGN' ? ' selected' : ''}>Kampagne</option>
          <option value="tutorial"${st.campaignType === 'tutorial' ? ' selected' : ''}>Tutorial</option>
          <option value="free-flight"${st.campaignType === 'free-flight' ? ' selected' : ''}>Free Flight</option>
        </select>
        <label style="font-size:10px;color:var(--text-dim);margin-top:6px">Musik – Briefing</label>
        <div style="display:flex;gap:4px;align-items:center">
          <select style="flex:1" onchange="edDispatch('set-campaign-music-briefing',{value:this.value})">
            ${wbSongOptions(st.musicBriefing)}
          </select>
          <button class="ed-btn" style="padding:2px 6px;flex-shrink:0" onclick="${st.musicBriefing ? `wbPreviewPlay('${st.musicBriefing}')` : ''}">▶</button>
        </div>
        <label style="font-size:10px;color:var(--text-dim);margin-top:4px">Musik – In-Game</label>
        <div style="display:flex;gap:4px;align-items:center">
          <select style="flex:1" onchange="edDispatch('set-campaign-music-ingame',{value:this.value})">
            ${wbSongOptions(st.musicIngame)}
          </select>
          <button class="ed-btn" style="padding:2px 6px;flex-shrink:0" onclick="${st.musicIngame ? `wbPreviewPlay('${st.musicIngame}')` : ''}">▶</button>
        </div>
        <button class="ed-btn" style="margin-top:4px" onclick="wbPreviewStop()">■ Stop</button>
      </div>

      <div class="ed-section">
        <div class="ed-section-title">Missionen</div>
        ${st.missions
            .map(
                m => `
          <div class="ed-mission-item${m.active ? ' active' : ''}" onclick="edDispatch('select-mission',{idx:${m.idx}})">
            <span>${m.idx + 1}. ${edH(edLs(m.headline, 'de').substring(0, 20))}</span>
            <div class="ed-mission-controls">
              <button onclick="event.stopPropagation();edDispatch('move-mission',{idx:${m.idx},dir:-1})">↑</button>
              <button onclick="event.stopPropagation();edDispatch('move-mission',{idx:${m.idx},dir:1})">↓</button>
              <button class="ed-del" onclick="event.stopPropagation();edDispatch('delete-mission',{idx:${m.idx}})">✕</button>
            </div>
          </div>`
            )
            .join('')}
        <button class="ed-btn" onclick="edDispatch('add-mission')">+ Mission hinzufügen</button>
        <button class="ed-btn" onclick="edDispatch('copy-mission')">📋 Duplizieren</button>
      </div>

      <div class="ed-section">
        <div class="ed-section-title">Werkzeuge</div>
        <div class="ed-radio-grid">
          ${ED_TOOLS.map(
              t => `<label class="ed-radio">
            <input type="radio" name="ed-tool" value="${t.v}" ${st.tool === t.v ? 'checked' : ''}
              onchange="edDispatch('set-tool',{tool:'${t.v}'})"> ${t.l}
          </label>`
          ).join('')}
        </div>
        ${
            st.tool === 'foliage'
                ? `<div style="margin-top:6px">
          <div class="ed-row" style="margin-bottom:4px">
            <label style="color:var(--text-dim)">Typ</label>
            <select style="flex:1" onchange="edDispatch('set-foliage-type',{value:this.value})">
              ${['pine', 'oak', 'bush', 'dead'].map(t => `<option value="${t}" ${st.foliageType === t ? 'selected' : ''}>${{ pine: '🌲 Nadel', oak: '🌳 Laub', bush: '🌿 Busch', dead: '🪵 Kahl' }[t]}</option>`).join('')}
            </select>
          </div>
          <label style="color:var(--text-dim)">Scale: ${st.foliageScale}</label>
          <input type="range" min="0.5" max="2.0" step="0.1" value="${st.foliageScale}"
            oninput="edDispatch('set-foliage-scale',{value:this.value})">
        </div>`
                : ''
        }
      </div>

      <div class="ed-section">
        <div class="ed-section-title">Pinsel</div>
        ${[
            { v: '0', l: '1px' },
            { v: '1.5', l: '3 (Normal)' },
            { v: '5.0', l: '10 (Groß)' },
            { v: '15.0', l: '30 (Massiv)' },
        ]
            .map(
                b => `
          <label class="ed-radio"><input type="radio" name="ed-brush" value="${b.v}"
            ${!st.isCustomBrush && st.brushRadius == b.v ? 'checked' : ''}
            onchange="edDispatch('set-brush',{value:'${b.v}'})"> ${b.l}</label>`
            )
            .join('')}
        <div class="ed-row" style="margin-top:4px">
          <label class="ed-radio"><input type="radio" name="ed-brush" value="custom"
            ${st.isCustomBrush ? 'checked' : ''}
            onchange="edDispatch('set-brush',{value:document.getElementById('ed-custom-brush').value})"> Frei:</label>
          <input type="number" id="ed-custom-brush" value="${edH(st.customBrushValue)}"
            min="1" max="50" style="width:50px"
            oninput="if(document.querySelector('input[name=ed-brush][value=custom]').checked) edDispatch('set-brush',{value:this.value})">
        </div>
      </div>

      <div class="ed-section">
        <div class="ed-section-title">Karte</div>
        <div class="ed-row">
          <label style="color:var(--text-dim)">Größe</label>
          <input type="number" id="ed-map-size" value="${cm ? cm.gridSize : 100}" min="40" max="400" step="10" style="width:60px">
          <button class="ed-btn-sm" onclick="edDispatch('resize-map',{size:document.getElementById('ed-map-size').value})">Resize</button>
        </div>
        <div class="ed-row" style="margin-top:6px">
          <label style="color:var(--text-dim)">Zoom</label>
          <button class="ed-btn-sm" onclick="edDispatch('zoom-in')">+</button>
          <button class="ed-btn-sm" onclick="edDispatch('zoom-out')">−</button>
        </div>
      </div>

      ${
          cm
              ? `
      <div class="ed-section">
        <div class="ed-section-title">Mission: ${edH(edLs(cm.headline, 'de'))}</div>
        <label style="font-size:10px;color:var(--text-dim)">Name</label>
        ${edTabs()}
        <input type="text" value="${edH(edLs(cm.headline, _edLang))}" oninput="edDispatch('set-headline',{lang:'${_edLang}',value:this.value})">
        <label style="font-size:10px;color:var(--text-dim);margin-top:4px">Ziele</label>
        ${edTabs()}
        <textarea rows="2" placeholder="Eine Zeile pro Ziel…" oninput="edDispatch('set-sublines',{lang:'${_edLang}',value:this.value})">${edH((cm.sublines || []).map(s => edLs(s, _edLang)).join('\n'))}</textarea>
        <label style="font-size:10px;color:var(--text-dim);margin-top:4px">Briefing</label>
        ${edTabs()}
        <textarea rows="3" oninput="edDispatch('set-briefing',{lang:'${_edLang}',value:this.value})">${edH(edLs(cm.briefing, _edLang))}</textarea>
        <div style="margin-top:6px">
          <label><input type="checkbox" ${cm.rain ? 'checked' : ''} onchange="edDispatch('set-rain',{value:this.checked})"> 🌧️ Regen / Sturm</label>
          <label><input type="checkbox" ${cm.night ? 'checked' : ''} onchange="edDispatch('set-night',{value:this.checked})"> 🌙 Nacht</label>
        </div>
        <div class="ed-row" style="margin-top:6px">
          <label style="color:var(--text-dim)">Wind °</label>
          <input type="number" value="${cm.windDir}" min="0" max="359" style="width:52px" oninput="edDispatch('set-wind-dir',{value:this.value})">
          <label style="color:var(--text-dim)">Stärke</label>
          <input type="number" value="${cm.windStr}" step="0.1" min="0" max="10" style="width:52px" oninput="edDispatch('set-wind-str',{value:this.value})">
        </div>
        <label style="margin-top:4px"><input type="checkbox" ${cm.windVar ? 'checked' : ''} onchange="edDispatch('set-wind-var',{value:this.checked})"> Dyn. Windvarianz</label>
        <div class="ed-row" style="margin-top:6px">
          <label style="color:var(--text-dim)">NPC-Helis</label>
          <input type="number" value="${cm.npcHeliCount}" min="0" max="3" style="width:40px" oninput="edDispatch('set-npc-count',{value:this.value})">
          <select onchange="edDispatch('set-npc-type',{value:this.value})" style="flex:1">
            ${['random', 'dolphin', 'coasthawk', 'atlas'].map(t => `<option value="${t}" ${cm.npcHeliType === t || (!cm.npcHeliType && t === 'random') ? 'selected' : ''}>${{ random: 'Zufällig', dolphin: 'Dolphin', coasthawk: 'Coast-Hawk', atlas: 'Atlas' }[t]}</option>`).join('')}
          </select>
        </div>
      </div>

      <div class="ed-section">
        <div class="ed-section-title">Objekte</div>
        ${
            cm.objects.length
                ? cm.objects
                      .map(
                          o => `
          <div class="ed-list-row">
            <span>${OBJ_ICONS[o.type] || '?'} ${o.type} @ (${o.x}, ${o.y})</span>
            <button class="ed-btn-sm ed-del" onclick="edDispatch('delete-object',{idx:${o.idx}})">✕</button>
          </div>`
                      )
                      .join('')
                : '<div class="ed-empty">Keine Objekte</div>'
        }
      </div>

      <div class="ed-section">
        <div class="ed-section-title">Ziele</div>
        ${
            cm.objectives.length
                ? cm.objectives
                      .map(
                          o => `
          <div class="ed-list-row">
            <span>${o.type === 'rescue_all' ? '🚁 Alle retten' : `🎯 Landen: ${o.target}`}</span>
            <button class="ed-btn-sm ed-del" onclick="edDispatch('delete-objective',{idx:${o.idx}})">✕</button>
          </div>`
                      )
                      .join('')
                : '<div class="ed-empty">Keine Ziele</div>'
        }
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">
          <button class="ed-btn" onclick="edDispatch('add-objective',{type:'rescue_all'})">+ Alle retten</button>
          <button class="ed-btn" onclick="edDispatch('add-objective',{type:'land_at',target:'pad'})">+ Landen: Pad</button>
          <button class="ed-btn" onclick="edDispatch('add-objective',{type:'land_at',target:'carrier'})">+ Landen: Carrier</button>
        </div>
      </div>

      <div class="ed-section">
        <div class="ed-section-title">Payloads</div>
        ${
            cm.payloads.length
                ? cm.payloads
                      .map(
                          p => `
          <div class="ed-list-row">
            <span>${p.type === 'person' ? '🟡' : '🟠'} ${p.type} @ (${p.x}, ${p.y})</span>
            <label style="font-size:10px;color:#8af;white-space:nowrap">
              <input type="checkbox" ${p.npcTarget ? 'checked' : ''} onchange="edDispatch('set-payload-npc',{idx:${p.idx},value:this.checked})"> NPC
            </label>
            <button class="ed-btn-sm ed-del" onclick="edDispatch('delete-payload',{idx:${p.idx}})">✕</button>
          </div>`
                      )
                      .join('')
                : '<div class="ed-empty">Keine Payloads</div>'
        }
      </div>

      <div class="ed-section">
        <div class="ed-section-title">Beflockung <span style="font-weight:400">(${cm.foliageCount})</span></div>
        ${
            cm.foliageCount
                ? `<div style="font-size:10px;color:var(--text-dim);margin-bottom:4px">${edH(cm.foliageSummary)}</div>
          <button class="ed-btn ed-btn-danger" onclick="edDispatch('clear-foliage')">Alle löschen</button>`
                : '<div class="ed-empty">Keine Bäume</div>'
        }
      </div>
      `
              : ''
      }
    `;
            };

            // ── Preview sync ────────────────────────────────────────────────────────────
            const gameFrame = document.getElementById('iframe-game');

            const previewHeliSelect = document.getElementById('preview-heli-select');

            const edSendPreview = () => {
                const w = edIframe.contentWindow;
                if (!w || !w.editorGetPreviewMission) return;
                const mission = w.editorGetPreviewMission();
                if (!mission) return;
                const heliType = previewHeliSelect.value;
                gameFrame.contentWindow?.postMessage({ type: 'preview-mission', mission, heliType }, '*');
            };

            previewHeliSelect.addEventListener('change', () => edSendPreview());

            document.getElementById('btn-preview-reset').addEventListener('click', () => {
                const heliType = previewHeliSelect.value;
                gameFrame.contentWindow?.postMessage({ type: 'preview-reset', heliType }, '*');
            });

            // Listen for state changes from editor iframe
            window.addEventListener('message', e => {
                if (e.data?.type === 'editor-state-changed') {
                    edRefreshPanel();
                    edSendPreview();
                }
            });

            // Send preview when game iframe finishes loading
            gameFrame.addEventListener('load', () => {
                setTimeout(edSendPreview, 600);
            });

            // Restore open files after Vite HMR reloads — each iframe re-initialises from scratch
            edIframe.addEventListener('load', async () => {
                await new Promise(r => setTimeout(r, 500));
                edRefreshPanel();
                const savedEdFile = sessionStorage.getItem('wb-ed-file');
                if (savedEdFile && !edCurrentFile) {
                    try {
                        const content = await wb.readFile('src/game/campaigns/' + savedEdFile);
                        edSetFile(savedEdFile);
                        edImport(content);
                    } catch {
                        /* file removed since last session */
                    }
                }
            });

            trIframe.addEventListener('load', async () => {
                await new Promise(r => setTimeout(r, 500));
                const savedTrPath = sessionStorage.getItem('wb-tr-path');
                const savedTrName = sessionStorage.getItem('wb-tr-name');
                if (savedTrPath && !trCurrentPath) {
                    try {
                        const content = await wb.readFile(savedTrPath);
                        trSetFile(savedTrName, savedTrPath);
                        trImport(content);
                    } catch {
                        /* file removed */
                    }
                }
            });

            moIframe.addEventListener('load', async () => {
                await new Promise(r => setTimeout(r, 500));
                const savedMoFile = sessionStorage.getItem('wb-mo-file');
                const savedMoPath = sessionStorage.getItem('wb-mo-path');
                if (savedMoFile && !moCurrentFile) {
                    try {
                        const content = await wb.readFile('src/game/models/' + savedMoFile);
                        moImport(content);
                        moSetFile(savedMoFile, savedMoPath || null);
                    } catch {
                        /* file removed */
                    }
                }
            });

            // Refresh when Editor tab is clicked
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (btn.dataset.tab === 'editor') setTimeout(edRefreshPanel, 100);
                });
            });

            // ── Console panel ─────────────────────────────────────────────────────────
            {
                const panel = document.getElementById('console-panel');
                const header = document.getElementById('console-header');
                const body = document.getElementById('console-body');
                const empty = document.getElementById('console-empty');
                const chevron = document.getElementById('console-chevron');
                const badgeErr = document.getElementById('con-badge-err');
                const badgeWarn = document.getElementById('con-badge-warn');
                const resizeHnd = document.getElementById('console-resize-handle');

                let conOpen = false;
                let conFilter = 'all';
                let errCount = 0;
                let warnCount = 0;
                let openHeight = 220;
                const entries = []; // { level, message, line, sourceId }

                const ICONS = { 0: '·', 1: '·', 2: '⚠', 3: '✕' };

                const shortSrc = (src, line) => {
                    if (!src) return '';
                    const file = src.split('/').pop().split('?')[0];
                    return line ? `${file}:${line}` : file;
                };

                const applyHeight = () => {
                    const h = conOpen ? openHeight : 28;
                    document.documentElement.style.setProperty('--console-h', h + 'px');
                    document.documentElement.style.setProperty('--console-open-h', openHeight + 'px');
                    panel.classList.toggle('open', conOpen);
                    chevron.textContent = conOpen ? '▼' : '▶';
                };

                const renderEntries = () => {
                    const visible = conFilter === 'all' ? entries : entries.filter(e => e.level === +conFilter);
                    body.innerHTML = '';
                    if (visible.length === 0) {
                        body.appendChild(empty);
                        empty.textContent =
                            entries.length === 0 ? 'Keine Ausgaben.' : 'Kein Treffer für diesen Filter.';
                        return;
                    }
                    const frag = document.createDocumentFragment();
                    visible.forEach(e => {
                        const row = document.createElement('div');
                        row.className = `con-entry level-${e.level}`;
                        row.innerHTML =
                            `<span class="con-icon">${ICONS[e.level] ?? '·'}</span>` +
                            `<span class="con-msg">${e.message.replace(/</g, '&lt;')}</span>` +
                            `<span class="con-src">${shortSrc(e.sourceId, e.line)}</span>`;
                        frag.appendChild(row);
                    });
                    body.appendChild(frag);
                    body.scrollTop = body.scrollHeight;
                };

                const updateBadges = () => {
                    badgeErr.textContent = String(errCount);
                    badgeWarn.textContent = String(warnCount);
                    badgeErr.className = 'con-badge' + (errCount > 0 ? ' has-err' : '');
                    badgeWarn.className = 'con-badge' + (warnCount > 0 ? ' has-warn' : '');
                };

                // Toggle open/close on header click
                header.addEventListener('click', e => {
                    if (e.target.closest('.con-filter, #con-clear')) return;
                    conOpen = !conOpen;
                    applyHeight();
                });

                // Filter buttons
                document.getElementById('con-filters').addEventListener('click', e => {
                    const btn = e.target.closest('.con-filter');
                    if (!btn) return;
                    e.stopPropagation();
                    conFilter = btn.dataset.level;
                    document.querySelectorAll('.con-filter').forEach(b => b.classList.toggle('active', b === btn));
                    if (!conOpen) {
                        conOpen = true;
                        applyHeight();
                    }
                    renderEntries();
                });

                // Clear
                document.getElementById('con-clear').addEventListener('click', e => {
                    e.stopPropagation();
                    entries.length = 0;
                    errCount = warnCount = 0;
                    updateBadges();
                    renderEntries();
                });

                // Resize handle drag
                let dragY = 0,
                    dragH = 0;
                resizeHnd.addEventListener('mousedown', e => {
                    e.preventDefault();
                    dragY = e.clientY;
                    dragH = openHeight;
                    const blocker = document.getElementById('iframe-blocker');
                    blocker.classList.add('active');
                    const onMove = ev => {
                        const delta = dragY - ev.clientY;
                        openHeight = Math.max(80, Math.min(window.innerHeight - 100, dragH + delta));
                        if (conOpen) applyHeight();
                    };
                    const onUp = () => {
                        blocker.classList.remove('active');
                        window.removeEventListener('mousemove', onMove);
                        window.removeEventListener('mouseup', onUp);
                    };
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('mouseup', onUp);
                });

                // Receive messages from main process
                wb.onConsoleMessage(msg => {
                    entries.push(msg);
                    if (msg.level === 3) {
                        errCount++;
                        updateBadges();
                    }
                    if (msg.level === 2) {
                        warnCount++;
                        updateBadges();
                    }
                    // Auto-open on errors
                    if (msg.level === 3 && !conOpen) {
                        conOpen = true;
                        applyHeight();
                    }
                    if (conFilter === 'all' || +conFilter === msg.level) {
                        empty.remove();
                        const row = document.createElement('div');
                        row.className = `con-entry level-${msg.level}`;
                        row.innerHTML =
                            `<span class="con-icon">${ICONS[msg.level] ?? '·'}</span>` +
                            `<span class="con-msg">${msg.message.replace(/</g, '&lt;')}</span>` +
                            `<span class="con-src">${shortSrc(msg.sourceId, msg.line)}</span>`;
                        body.appendChild(row);
                        body.scrollTop = body.scrollHeight;
                    }
                });

                applyHeight();
            }
        </script>

        <script type="module">
            import ZsynthPlayer from '/src/shared/ZsynthPlayer';
            const mods = import.meta.glob('/src/game/music/*.zsong');
            const songs = {};
            for (const [path, load] of Object.entries(mods)) {
                const stem = path.replace('/src/game/music/', '').replace('.zsong', '');
                songs[stem] = (await load()).default;
            }
            ZsynthPlayer.init(songs);
            window._wbZsynthPlay = stem => {
                ZsynthPlayer.stop();
                ZsynthPlayer.play(stem, 0);
            };
            window._wbZsynthStop = () => ZsynthPlayer.stop();
        </script>
    </body>
</html>
