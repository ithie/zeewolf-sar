<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SAR: Callsign WOLF — Workbench</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #1e1e1e;
                --bg2: #252526;
                --bg3: #2d2d2d;
                --bg4: #3c3c3c;
                --accent: #0e639c;
                --accent2: #1177bb;
                --text: #cccccc;
                --text-dim: #858585;
                --text-bright: #ffffff;
                --border: #3c3c3c;
                --tab-active: #1e1e1e;
                --tab-inactive: #2d2d2d;
                --tree-hover: #2a2d2e;
                --tree-active: #094771;
                --success: #4ec9b0;
                --warning: #ce9178;
                --error: #f44747;
                --handle: 4px;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                font-size: 13px;
                overflow: hidden;
                user-select: none;
            }

            /* ── Toolbar ─────────────────────────────────────────────────────────── */
            #toolbar {
                display: flex;
                align-items: center;
                gap: 6px;
                height: 36px;
                padding: 0 10px;
                background: var(--bg2);
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
            }

            #git-branch {
                font-weight: 600;
                color: var(--success);
                min-width: 100px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .toolbar-sep {
                width: 1px;
                height: 18px;
                background: var(--border);
                margin: 0 2px;
            }

            #toolbar button {
                background: var(--bg4);
                color: var(--text);
                border: 1px solid var(--border);
                border-radius: 3px;
                padding: 3px 10px;
                font-size: 12px;
                cursor: pointer;
                white-space: nowrap;
            }
            #toolbar button:hover {
                background: var(--accent);
                border-color: var(--accent2);
                color: #fff;
            }
            #toolbar button:active {
                background: var(--accent2);
            }
            #toolbar button:disabled {
                opacity: 0.4;
                cursor: default;
            }

            #commit-msg {
                flex: 1;
                min-width: 0;
                max-width: 360px;
                background: var(--bg3);
                border: 1px solid var(--border);
                border-radius: 3px;
                color: var(--text);
                padding: 3px 8px;
                font-size: 12px;
                outline: none;
            }
            #commit-msg:focus {
                border-color: var(--accent2);
            }
            #commit-msg::placeholder {
                color: var(--text-dim);
            }

            #git-status {
                flex: 1;
                color: var(--text-dim);
                font-size: 11px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            #git-status.ok {
                color: var(--success);
            }
            #git-status.err {
                color: var(--error);
            }

            /* ── Root layout ─────────────────────────────────────────────────────── */
            #root {
                display: flex;
                width: 100%;
                height: calc(100vh - 36px - var(--console-h, 28px));
                overflow: hidden;
            }

            /* ── Left panel ──────────────────────────────────────────────────────── */
            #left-panel {
                display: flex;
                flex-direction: column;
                width: 55%;
                min-width: 300px;
                overflow: hidden;
                flex-shrink: 0;
            }

            /* ── Tab bar ─────────────────────────────────────────────────────────── */
            #tab-bar {
                display: flex;
                background: var(--bg3);
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
            }
            .tab-btn {
                padding: 6px 18px;
                background: var(--tab-inactive);
                color: var(--text-dim);
                border: none;
                border-right: 1px solid var(--border);
                cursor: pointer;
                font-size: 12px;
                font-weight: 500;
                transition: color 0.1s;
            }
            .tab-btn:hover {
                color: var(--text);
                background: var(--bg4);
            }
            .tab-btn.active {
                background: var(--tab-active);
                color: var(--text-bright);
                border-bottom: 2px solid var(--accent2);
            }

            /* ── Tab panes ───────────────────────────────────────────────────────── */
            #tab-content {
                flex: 1;
                overflow: hidden;
                position: relative;
            }

            .tab-pane {
                display: none;
                width: 100%;
                height: 100%;
            }
            .tab-pane.active {
                display: flex;
            }

            /* Code tab: file-tree + editor side by side */
            #tab-code {
                flex-direction: row;
            }

            #file-tree-panel {
                width: 220px;
                min-width: 120px;
                max-width: 420px;
                background: var(--bg2);
                border-right: 1px solid var(--border);
                overflow-y: auto;
                overflow-x: hidden;
                flex-shrink: 0;
            }
            #file-tree-panel::-webkit-scrollbar {
                width: 6px;
            }
            #file-tree-panel::-webkit-scrollbar-thumb {
                background: var(--bg4);
                border-radius: 3px;
            }

            .tree-header {
                padding: 6px 10px;
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--text-dim);
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .tree-refresh {
                background: none;
                border: none;
                color: var(--text-dim);
                cursor: pointer;
                font-size: 13px;
                padding: 0 2px;
            }
            .tree-refresh:hover {
                color: var(--text);
            }

            .tree-item {
                display: flex;
                align-items: center;
                gap: 4px;
                padding: 2px 4px;
                cursor: pointer;
                white-space: nowrap;
                overflow: hidden;
                border-radius: 2px;
            }
            .tree-item:hover {
                background: var(--tree-hover);
            }
            .tree-item.active {
                background: var(--tree-active);
                color: #fff;
            }

            .tree-icon {
                font-size: 12px;
                flex-shrink: 0;
            }
            .tree-name {
                overflow: hidden;
                text-overflow: ellipsis;
                font-size: 12px;
            }
            .tree-children {
            }

            #editor-container {
                flex: 1;
                min-width: 0;
                height: 100%;
                overflow: hidden;
            }

            /* Tracker tab */
            #tab-tracker {
                width: 100%;
                height: 100%;
            }
            #tab-tracker iframe {
                width: 100%;
                height: 100%;
                border: none;
            }

            /* Editor tab */
            #tab-editor {
                flex-direction: column;
            }
            #editor-body {
                flex: 1;
                display: flex;
                overflow: hidden;
                min-height: 0;
            }

            /* Shared file-nav bar (editor + tracker + models) */
            #editor-nav,
            #tracker-nav,
            #models-nav {
                display: flex;
                align-items: center;
                gap: 6px;
                height: 32px;
                padding: 0 10px;
                background: var(--bg2);
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
            }
            #editor-nav button,
            #tracker-nav button,
            #models-nav button {
                background: var(--bg4);
                color: var(--text);
                border: 1px solid var(--border);
                border-radius: 3px;
                padding: 2px 10px;
                font-size: 11px;
                cursor: pointer;
                white-space: nowrap;
            }
            #editor-nav button:hover,
            #tracker-nav button:hover,
            #models-nav button:hover {
                background: var(--accent);
                border-color: var(--accent2);
                color: #fff;
            }
            #editor-current-file,
            #tracker-current-file,
            #models-current-file {
                flex: 1;
                font-size: 11px;
                color: var(--text-dim);
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            /* Tracker tab layout */
            #tab-tracker {
                flex-direction: column;
            }
            #tab-tracker iframe {
                flex: 1;
                border: none;
                min-height: 0;
            }

            /* Models tab layout */
            #tab-models {
                flex-direction: column;
            }
            #tab-models iframe {
                flex: 1;
                border: none;
                min-height: 0;
            }

            /* Sound tab layout */
            #tab-sound {
                flex-direction: column;
            }
            #tab-sound iframe {
                flex: 1;
                border: none;
                min-height: 0;
            }

            /* Viewer tab layout */
            #tab-viewer {
                flex-direction: column;
            }
            #tab-viewer iframe {
                flex: 1;
                border: none;
                min-height: 0;
            }

            /* Controls panel */
            #editor-controls {
                width: 280px;
                min-width: 200px;
                flex-shrink: 0;
                overflow-y: auto;
                overflow-x: hidden;
                background: var(--bg2);
                border-right: 1px solid var(--border);
                font-size: 12px;
            }
            #editor-controls::-webkit-scrollbar {
                width: 6px;
            }
            #editor-controls::-webkit-scrollbar-thumb {
                background: var(--bg4);
                border-radius: 3px;
            }

            .ed-section {
                border-bottom: 1px solid var(--border);
                padding: 8px 10px;
            }
            .ed-section-title {
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--text-dim);
                margin-bottom: 6px;
            }
            .ed-section label {
                display: block;
                margin: 3px 0;
                color: var(--text);
                cursor: pointer;
            }
            .ed-section input[type='text'],
            .ed-section input[type='number'],
            .ed-section textarea,
            .ed-section select {
                background: var(--bg3);
                color: var(--text);
                border: 1px solid var(--border);
                border-radius: 2px;
                padding: 3px 6px;
                font-size: 11px;
                font-family: inherit;
                width: 100%;
                box-sizing: border-box;
            }
            .ed-section textarea {
                resize: vertical;
                min-height: 44px;
            }
            .ed-section input[type='text']:focus,
            .ed-section input[type='number']:focus,
            .ed-section textarea:focus,
            .ed-section select:focus {
                outline: none;
                border-color: var(--accent2);
            }
            .ed-section input[type='range'] {
                width: 100%;
                cursor: pointer;
            }

            .ed-row {
                display: flex;
                gap: 6px;
                align-items: center;
                flex-wrap: wrap;
            }
            .ed-row label {
                margin: 0;
            }
            .ed-row input[type='number'] {
                width: 52px;
            }

            .ed-radio-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 2px;
            }
            .ed-radio {
                cursor: pointer;
            }

            .ed-mission-item {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 4px 6px;
                border-radius: 3px;
                cursor: pointer;
                border: 1px solid transparent;
                margin-bottom: 3px;
            }
            .ed-mission-item:hover {
                background: var(--tree-hover);
            }
            .ed-mission-item.active {
                background: var(--tree-active);
                border-color: var(--accent);
                color: #fff;
            }
            .ed-mission-item span {
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                font-size: 11px;
            }
            .ed-mission-controls {
                display: flex;
                gap: 2px;
                flex-shrink: 0;
            }
            .ed-mission-controls button,
            .ed-btn-sm {
                background: var(--bg4);
                color: var(--text);
                border: 1px solid var(--border);
                border-radius: 2px;
                padding: 1px 5px;
                font-size: 10px;
                cursor: pointer;
            }
            .ed-mission-controls button:hover,
            .ed-btn-sm:hover {
                background: var(--accent2);
                color: #fff;
            }
            .ed-mission-controls .ed-del:hover {
                background: #7a2020;
            }

            .ed-btn {
                display: block;
                width: 100%;
                background: var(--bg4);
                color: var(--text);
                border: 1px solid var(--border);
                border-radius: 2px;
                padding: 4px 8px;
                font-size: 11px;
                cursor: pointer;
                text-align: left;
                margin-top: 4px;
            }
            .ed-btn:hover {
                background: var(--accent);
                border-color: var(--accent2);
                color: #fff;
            }
            .ed-btn-danger:hover {
                background: #7a2020 !important;
                border-color: #a33 !important;
            }

            .ed-list-row {
                display: flex;
                align-items: center;
                gap: 4px;
                padding: 2px 0;
                font-size: 11px;
                color: var(--text-dim);
            }
            .ed-list-row span {
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .ed-empty {
                color: var(--text-dim);
                font-size: 11px;
                font-style: italic;
            }

            /* Canvas iframe pane */
            #editor-canvas-pane {
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: auto;
            }
            #iframe-preview {
                width: 100%;
                height: 320px;
                border: none;
                border-bottom: 2px solid #333;
                flex-shrink: 0;
            }
            #iframe-editor {
                width: 100%;
                flex: 1;
                border: none;
                min-width: 640px;
                min-height: 640px;
            }

            /* ── Horizontal resize handle (left / right) ─────────────────────────── */
            #resize-h {
                width: var(--handle);
                cursor: col-resize;
                background: var(--border);
                flex-shrink: 0;
                transition: background 0.15s;
                z-index: 10;
            }
            #resize-h:hover,
            #resize-h.dragging {
                background: var(--accent2);
            }

            /* ── Right panel ─────────────────────────────────────────────────────── */
            #right-panel {
                flex: 1;
                display: flex;
                flex-direction: column;
                min-width: 200px;
                overflow: hidden;
            }

            .view-pane {
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .pane-label {
                padding: 2px 8px;
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--text-dim);
                background: var(--bg2);
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .pane-label span {
                flex: 1;
            }
            #btn-preview-reset {
                font-size: 10px;
                padding: 1px 7px;
                background: rgba(255, 102, 0, 0.12);
                border: 1px solid rgba(255, 102, 0, 0.35);
                border-radius: 4px;
                color: rgba(255, 102, 0, 0.75);
                cursor: pointer;
                font-family: monospace;
                letter-spacing: 0.05em;
            }
            #btn-preview-reset:hover {
                background: rgba(255, 102, 0, 0.22);
                color: #ff6600;
            }
            #preview-heli-select {
                font-size: 10px;
                font-family: monospace;
                background: var(--bg3);
                border: 1px solid var(--border);
                border-radius: 4px;
                color: var(--text-dim);
                padding: 1px 4px;
                cursor: pointer;
            }

            .view-pane iframe {
                flex: 1;
                width: 100%;
                border: none;
                background: #000;
            }

            #game-pane,
            #model-pane {
                flex: 1;
            }

            /* ── Vertical resize handle (game / modelviewer) ─────────────────────── */
            #resize-v {
                height: var(--handle);
                cursor: row-resize;
                background: var(--border);
                flex-shrink: 0;
                transition: background 0.15s;
                z-index: 10;
            }
            #resize-v:hover,
            #resize-v.dragging {
                background: var(--accent2);
            }

            /* ── Auto-save indicator ─────────────────────────────────────────────── */
            #autosave-dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: transparent;
                flex-shrink: 0;
                transition: background 0.3s;
            }
            #autosave-dot.dirty {
                background: var(--warning);
            }
            #autosave-dot.saving {
                background: var(--accent2);
            }
            #autosave-dot.saved {
                background: var(--success);
            }

            /* ── Coverage badges in file tree ───────────────────────────────────── */
            .tree-cov {
                flex-shrink: 0;
                margin-left: auto;
                font-size: 10px;
                font-family: 'Fira Code', Consolas, monospace;
                padding: 0 4px;
                border-radius: 2px;
                opacity: 0.9;
            }
            .cov-hi {
                color: #4ec9b0;
            }
            .cov-mid {
                color: #ce9178;
            }
            .cov-lo {
                color: #f44747;
            }

            /* Monaco glyph margin coverage ──────────────────────────────────────── */
            .cov-glyph-hit {
                background: rgba(78, 201, 176, 0.75);
                width: 3px !important;
                margin-left: 4px;
                border-radius: 1px;
            }
            .cov-glyph-miss {
                background: rgba(244, 71, 71, 0.85);
                width: 3px !important;
                margin-left: 4px;
                border-radius: 1px;
            }

            /* ── Tests tab ───────────────────────────────────────────────────────── */
            #tab-tests {
                flex-direction: column;
                overflow: hidden;
            }

            #tests-toolbar {
                display: flex;
                align-items: center;
                gap: 8px;
                height: 36px;
                padding: 0 10px;
                background: var(--bg2);
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
            }
            #tests-toolbar button {
                background: var(--bg4);
                color: var(--text);
                border: 1px solid var(--border);
                border-radius: 3px;
                padding: 3px 12px;
                font-size: 12px;
                cursor: pointer;
            }
            #tests-toolbar button:hover {
                background: var(--accent);
                border-color: var(--accent2);
                color: #fff;
            }
            #tests-toolbar button:disabled {
                opacity: 0.4;
                cursor: default;
            }
            #tests-status {
                font-size: 12px;
                color: var(--text-dim);
            }
            #tests-status.ok {
                color: var(--success);
            }
            #tests-status.err {
                color: var(--error);
            }

            #tests-body {
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                min-height: 0;
            }

            #tests-results {
                flex: 1;
                overflow-y: auto;
                min-height: 0;
                padding-bottom: 4px;
            }
            #tests-results::-webkit-scrollbar {
                width: 6px;
            }
            #tests-results::-webkit-scrollbar-thumb {
                background: var(--bg4);
                border-radius: 3px;
            }

            #tests-coverage {
                height: 210px;
                border-top: 2px solid var(--border);
                overflow-y: auto;
                flex-shrink: 0;
            }
            #tests-coverage::-webkit-scrollbar {
                width: 6px;
            }
            #tests-coverage::-webkit-scrollbar-thumb {
                background: var(--bg4);
                border-radius: 3px;
            }

            .tests-cov-header {
                position: sticky;
                top: 0;
                padding: 4px 10px;
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--text-dim);
                background: var(--bg2);
                border-bottom: 1px solid var(--border);
            }

            .cov-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 11px;
            }
            .cov-table td {
                padding: 2px 10px;
            }
            .cov-table tr:hover {
                background: var(--tree-hover);
            }
            .cov-file {
                color: var(--text);
                font-family: 'Fira Code', Consolas, monospace;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 260px;
            }
            .cov-pct {
                font-family: monospace;
                font-size: 11px;
                text-align: right;
                white-space: nowrap;
            }
            .cov-bar-cell {
                width: 80px;
                padding-right: 8px;
            }
            .cov-bar {
                height: 4px;
                background: var(--bg4);
                border-radius: 2px;
                overflow: hidden;
            }
            .cov-bar-fill {
                height: 100%;
                border-radius: 2px;
                transition: width 0.3s;
            }

            .test-file-row {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 5px 10px;
                cursor: pointer;
                border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            }
            .test-file-row:hover {
                background: var(--tree-hover);
            }
            .test-file-toggle {
                font-size: 10px;
                color: var(--text-dim);
                flex-shrink: 0;
            }
            .test-file-icon {
                flex-shrink: 0;
            }
            .test-file-name {
                flex: 1;
                font-size: 12px;
                font-family: 'Fira Code', Consolas, monospace;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .test-file-meta {
                font-size: 11px;
                color: var(--text-dim);
                flex-shrink: 0;
                white-space: nowrap;
            }

            .test-cases {
                background: rgba(0, 0, 0, 0.15);
            }
            .test-describe {
                padding: 3px 10px 1px 32px;
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                color: var(--text-dim);
            }
            .test-case-row {
                display: flex;
                align-items: baseline;
                gap: 6px;
                padding: 2px 10px 2px 40px;
                font-size: 11px;
                color: var(--text-dim);
            }
            .test-passed {
                color: #4ec9b0;
            }
            .test-failed {
                color: #f44747;
            }
            .test-skipped {
                color: #858585;
            }
            .test-err-msg {
                padding: 3px 10px 4px 52px;
                font-size: 11px;
                color: #f44747;
                font-family: 'Fira Code', Consolas, monospace;
                white-space: pre-wrap;
                word-break: break-word;
            }
            .test-empty {
                padding: 20px 10px;
                font-size: 12px;
                color: var(--text-dim);
                font-style: italic;
            }

            /* ── Console panel ───────────────────────────────────────────────────── */
            #console-panel {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                height: 28px;
                background: var(--bg2);
                border-top: 2px solid var(--border);
                z-index: 200;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            #console-panel.open {
                height: var(--console-open-h, 220px);
            }

            #console-resize-handle {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 4px;
                cursor: ns-resize;
                z-index: 1;
            }
            #console-resize-handle:hover {
                background: var(--accent);
                opacity: 0.5;
            }

            #console-header {
                display: flex;
                align-items: center;
                gap: 6px;
                height: 28px;
                padding: 0 8px;
                flex-shrink: 0;
                cursor: pointer;
                user-select: none;
            }
            #console-toggle-label {
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 0.08em;
                color: var(--text-dim);
                white-space: nowrap;

            #console-panel.open #console-toggle-label {
                color: var(--text);
            }
            #console-chevron {
                font-size: 9px;
                color: var(--text-dim);
            }
            .console-filters {
                display: flex;
                gap: 2px;
                margin-left: 6px;
            }
            .con-filter {
                background: none;
                border: 1px solid transparent;
                border-radius: 2px;
                color: var(--text-dim);
                font-size: 11px;
                padding: 1px 6px;
                cursor: pointer;
            }
            .con-filter:hover {
                color: var(--text);
                background: var(--bg4);
            }
            .con-filter.active {
                border-color: var(--border);
                color: var(--text);
                background: var(--bg3);
            }
            .con-badge {
                display: inline-block;
                background: var(--bg4);
                border-radius: 8px;
                padding: 0 4px;
                font-size: 10px;
                min-width: 14px;
                text-align: center;
            }
            .con-badge.has-err {
                background: var(--error);

            }
            .con-badge.has-warn {
                background: #a07030;
                color: #fff;
            }
            #con-clear {
                margin-left: auto;
                background: none;
                border: none;
                color: var(--text-dim);
                font-size: 11px;
                cursor: pointer;
                padding: 1px 6px;
                border-radius: 2px;
            }
            #con-clear:hover {
                background: var(--bg4);
                color: var(--text);
            }

            #console-body {
                flex: 1;
                overflow-y: auto;
                overflow-x: hidden;
                font-family: 'Fira Code', Consolas, monospace;
                font-size: 11px;
            }
            #console-body::-webkit-scrollbar {
                width: 6px;
            }
            #console-body::-webkit-scrollbar-thumb {
                background: var(--bg4);
                border-radius: 3px;
            }

            .con-entry {
                display: flex;
                align-items: baseline;
                gap: 6px;
                padding: 1px 8px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.03);
                line-height: 1.5;
            }
            .con-entry:hover {
                background: var(--tree-hover);
            }
            .con-icon {
                flex-shrink: 0;

            .con-msg {
                flex: 1;

            .con-src {

                color: var(--text-dim);

                white-space: nowrap;

            .con-entry.level-2 .con-msg {
                color: #ce9178;

            .con-entry.level-2 .con-icon {
                color: #ce9178;
            }
            .con-entry.level-3 .con-msg {

            #console-empty {

            /* ── Overlay blocker during resize ──────────────────────────────────── */

                inset: 0;
                z-index: 999;
                cursor: inherit;

            #iframe-blocker.active {
                display: block;

        </style>

        <!-- Monaco AMD loader (served locally from port 3001) -->

        <script>
            // ── Globals ──────────────────────────────────────────────────────────────
            const wb = window.workbench;
            let editor = null;
            let currentFilePath = null;
            let isDirty = false;
            let autoSaveTimer = null;
            let coverageDecorationIds = [];

            // ── Auto-save dot ─────────────────────────────────────────────────────────
            const setDot = state => {
                document.getElementById('autosave-dot').className = state;
            };

            // ── Git status display ────────────────────────────────────────────────────
            let statusTimer = null;
            const showStatus = (msg, type = '') => {
                const el = document.getElementById('git-status');
                el.textContent = msg;
                el.className = type;
                clearTimeout(statusTimer);
                if (msg)
                    statusTimer = setTimeout(() => {
                        el.textContent = '';
                        el.className = '';
                    }, 6000);
            };

            const setButtonsBusy = busy => {
                ['btn-pull', 'btn-commit', 'btn-push'].forEach(id => {
                    document.getElementById(id).disabled = busy;
                });
            };

            // ── Git toolbar ───────────────────────────────────────────────────────────
            const refreshBranch = async () => {
                try {
                    const branch = await wb.git.getBranch();
                    document.getElementById('git-branch').textContent = '⎇ ' + branch;
                } catch (e) {
                    document.getElementById('git-branch').textContent = '⎇ ?';
                }
            };

            document.getElementById('btn-pull').addEventListener('click', async () => {
                setButtonsBusy(true);
                showStatus('Pulling…');
                try {
                    const out = await wb.git.pull();
                    showStatus(out || 'Already up to date.', 'ok');
                    await refreshBranch();
                } catch (e) {
                    showStatus(String(e), 'err');
                }
                setButtonsBusy(false);
            });

            document.getElementById('btn-commit').addEventListener('click', async () => {
                const msg = document.getElementById('commit-msg').value.trim();
                if (!msg) {
                    showStatus('Enter a commit message first.', 'err');
                    return;
                }
                await saveCurrentFile();
                setButtonsBusy(true);
                showStatus('Committing…');
                try {
                    const out = await wb.git.commit(msg);
                    showStatus(out, 'ok');
                    document.getElementById('commit-msg').value = '';
                } catch (e) {
                    showStatus(String(e), 'err');
                }
                setButtonsBusy(false);
            });

            document.getElementById('btn-push').addEventListener('click', async () => {
                setButtonsBusy(true);
                showStatus('Pushing…');
                try {
                    const out = await wb.git.push();
                    showStatus(out || 'Pushed.', 'ok');
                } catch (e) {
                    showStatus(String(e), 'err');
                }
                setButtonsBusy(false);
            });

            // ── File save ─────────────────────────────────────────────────────────────
            const saveCurrentFile = async () => {
                if (!currentFilePath || !editor || !isDirty) return;
                setDot('saving');
                try {
                    await wb.writeFile(currentFilePath, editor.getValue());
                    isDirty = false;
                    setDot('saved');
                    setTimeout(() => setDot(''), 1500);
                } catch (e) {
                    showStatus('Save failed: ' + e, 'err');
                    setDot('');
                }
            };

            const scheduleAutoSave = () => {
                clearTimeout(autoSaveTimer);
                autoSaveTimer = setTimeout(() => saveCurrentFile(), 2000);
            };

            // ── Language detection ────────────────────────────────────────────────────
            const LANG_MAP = {
                ts: 'typescript',
                tsx: 'typescript',
                js: 'javascript',
                jsx: 'javascript',
                html: 'html',
                css: 'css',
                json: 'json',
                md: 'markdown',
                txt: 'plaintext',
                mjs: 'javascript',
                cjs: 'javascript',
            };

            const langForPath = filePath => LANG_MAP[filePath.split('.').pop() || ''] || 'plaintext';

            // ── Open file ─────────────────────────────────────────────────────────────
            const openFile = async filePath => {
                if (editor && currentFilePath === filePath) return;
                await saveCurrentFile();

                // Highlight active item
                document.querySelectorAll('.tree-item').forEach(el => {
                    el.classList.toggle('active', el.dataset.path === filePath);
                });

                try {
                    const content = await wb.readFile(filePath);
                    currentFilePath = filePath;
                    const model = monaco.editor.createModel(content, langForPath(filePath), monaco.Uri.file(filePath));
                    // Dispose old model if different
                    const old = editor.getModel();
                    editor.setModel(model);
                    if (old && old !== model) old.dispose();
                    isDirty = false;
                    setDot('');
                    coverageDecorationIds = [];
                    applyEditorCoverage(filePath);
                } catch (e) {
                    showStatus('Could not open ' + filePath + ': ' + e, 'err');
                }
            };

            // ── File tree ─────────────────────────────────────────────────────────────
            const buildTree = async (container, dirPath, depth) => {
                let entries;
                try {
                    entries = await wb.readDir(dirPath);
                } catch (e) {
                    return;
                }

                for (const entry of entries) {
                    const fullPath = dirPath ? dirPath + '/' + entry.name : entry.name;
                    const item = document.createElement('div');
                    item.className = 'tree-item';
                    item.dataset.path = fullPath;
                    item.style.paddingLeft = 8 + depth * 14 + 'px';

                    const icon = document.createElement('span');
                    icon.className = 'tree-icon';

                    const name = document.createElement('span');
                    name.className = 'tree-name';
                    name.textContent = entry.name;

                    item.appendChild(icon);
                    item.appendChild(name);
                    const cov = entry.isDir ? getFolderCoverage(fullPath) : getFileCoverage(fullPath);
                    if (cov !== null) {
                        const badge = document.createElement('span');
                        badge.className = 'tree-cov ' + covClass(cov);
                        badge.textContent = cov + '%';
                        item.appendChild(badge);
                    }
                    container.appendChild(item);

                    if (entry.isDir) {
                        icon.textContent = '▶';
                        const children = document.createElement('div');
                        children.className = 'tree-children';
                        children.style.display = 'none';
                        container.appendChild(children);

                        item.addEventListener('click', async e => {
                            e.stopPropagation();
                            const expanded = children.style.display !== 'none';
                            if (expanded) {
                                children.style.display = 'none';
                                icon.textContent = '▶';
                            } else {
                                if (!children.hasChildNodes()) {
                                    await buildTree(children, fullPath, depth + 1);
                                }
                                children.style.display = '';
                                icon.textContent = '▼';
                            }
                        });
                    } else {
                        icon.textContent = '·';
                        item.addEventListener('click', e => {
                            e.stopPropagation();
                            openFile(fullPath);
                        });
                    }
                }
            };

            const refreshTree = async () => {
                const tree = document.getElementById('file-tree');
                tree.innerHTML = '';
                await buildTree(tree, '', 0);
            };

            document.getElementById('btn-refresh-tree').addEventListener('click', refreshTree);

            // ── Tab switching ─────────────────────────────────────────────────────────
            const switchTab = tab => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                const btn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
                const pane = document.getElementById('tab-' + tab);
                if (btn) btn.classList.add('active');
                if (pane) pane.classList.add('active');
                sessionStorage.setItem('wb-active-tab', tab);
                if (tab === 'code' && editor) editor.layout();
                if (tab === 'music') wbLoadMusicConfig();

                // Right panel: only visible for 'code' (game) and 'editor' (mission preview)
                const showRight = tab === 'code' || tab === 'editor';
                document.getElementById('right-panel').style.display = showRight ? '' : 'none';
                document.getElementById('resize-h').style.display = showRight ? '' : 'none';
                document.getElementById('left-panel').style.width = showRight ? '' : '100%';

                // Switch game iframe src based on tab
                const gameFrame = document.getElementById('iframe-game');
                if (tab === 'editor' && !gameFrame.src.includes('preview=1')) {
                    gameFrame.src = 'http://localhost:5173/?preview=1';
                } else if (tab === 'code' && gameFrame.src.includes('preview=1')) {
                    gameFrame.src = 'http://localhost:5173/';
                }

                document.getElementById('game-pane').style.display = 'flex';
                document.getElementById('model-pane').style.display = 'none';
                document.getElementById('resize-v').style.display = 'none';
                const isPreviewTab = tab === 'editor';
                document.getElementById('btn-preview-reset').style.display = isPreviewTab ? '' : 'none';
                document.getElementById('preview-heli-select').style.display = isPreviewTab ? '' : 'none';
                document.querySelector('#game-pane .pane-label span').textContent = isPreviewTab ? 'Vorschau' : 'Game';
            };

            // Restore last active tab on load (survives Vite HMR reloads)
            const _savedTab = sessionStorage.getItem('wb-active-tab');
            if (_savedTab && document.getElementById('tab-' + _savedTab)) switchTab(_savedTab);

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    // Auto-save before leaving Code tab
                    if (document.querySelector('.tab-btn.active')?.dataset.tab === 'code') {
                        await saveCurrentFile();
                    }
                    switchTab(btn.dataset.tab);
                });
            });

            // ── Horizontal resize (left / right panels) ───────────────────────────────
            (() => {
                const handle = document.getElementById('resize-h');
                const left = document.getElementById('left-panel');
                const root = document.getElementById('root');
                const blocker = document.getElementById('iframe-blocker');
                let dragging = false,
                    startX = 0,
                    startW = 0;

                handle.addEventListener('mousedown', e => {
                    dragging = true;
                    startX = e.clientX;
                    startW = left.offsetWidth;
                    handle.classList.add('dragging');
                    blocker.classList.add('active');
                    blocker.style.cursor = 'col-resize';
                    e.preventDefault();
                });

                document.addEventListener('mousemove', e => {
                    if (!dragging) return;
                    const newW = Math.max(300, Math.min(root.offsetWidth - 300, startW + (e.clientX - startX)));
                    left.style.width = newW + 'px';
                    if (editor) editor.layout();
                });

                document.addEventListener('mouseup', () => {
                    if (!dragging) return;
                    dragging = false;
                    handle.classList.remove('dragging');
                    blocker.classList.remove('active');
                });
            })();

            // ── Vertical resize (game / modelviewer) ──────────────────────────────────
            (() => {
                const handle = document.getElementById('resize-v');
                const gamePan = document.getElementById('game-pane');
                const modPan = document.getElementById('model-pane');
                const right = document.getElementById('right-panel');
                const blocker = document.getElementById('iframe-blocker');
                let dragging = false,
                    startY = 0,
                    startH = 0;

                handle.addEventListener('mousedown', e => {
                    dragging = true;
                    startY = e.clientY;
                    startH = gamePan.offsetHeight;
                    handle.classList.add('dragging');
                    blocker.classList.add('active');
                    blocker.style.cursor = 'row-resize';
                    e.preventDefault();
                });

                document.addEventListener('mousemove', e => {
                    if (!dragging) return;
                    const totalH = right.offsetHeight;
                    const handleH = handle.offsetHeight;
                    const newH = Math.max(80, Math.min(totalH - handleH - 80, startH + (e.clientY - startY)));
                    gamePan.style.height = newH + 'px';
                    modPan.style.height = totalH - handleH - newH + 'px';
                });

                document.addEventListener('mouseup', () => {
                    if (!dragging) return;
                    dragging = false;
                    handle.classList.remove('dragging');
                    blocker.classList.remove('active');
                });
            })();

            // ── Campaign editor ───────────────────────────────────────────────────────

            // ── Tests / Coverage ─────────────────────────────────────────────────────
            let coverageData = null;
            let coverageRoot = null;

            const covClass = pct => (pct >= 80 ? 'cov-hi' : pct >= 50 ? 'cov-mid' : 'cov-lo');

            const getFileCoverage = relPath => {
                if (!coverageData || !coverageRoot) return null;
                const d = coverageData[coverageRoot + '/' + relPath];
                if (!d) return null;
                const stmts = Object.values(d.s);
                if (!stmts.length) return null;
                return Math.round((stmts.filter(n => n > 0).length / stmts.length) * 100);
            };

            const getFolderCoverage = relPath => {
                if (!coverageData || !coverageRoot) return null;
                const prefix = coverageRoot + '/' + relPath + '/';
                let total = 0,
                    covered = 0;
                for (const [absPath, d] of Object.entries(coverageData)) {
                    if (!absPath.startsWith(prefix)) continue;
                    const stmts = Object.values(d.s);
                    total += stmts.length;
                    covered += stmts.filter(n => n > 0).length;
                }
                return total ? Math.round((covered / total) * 100) : null;
            };

            const applyCoverageToTree = () => {
                document.querySelectorAll('.tree-item').forEach(item => {
                    const relPath = item.dataset.path;
                    if (!relPath) return;
                    item.querySelector('.tree-cov')?.remove();
                    const isDir = item.nextElementSibling?.classList.contains('tree-children');
                    const pct = isDir ? getFolderCoverage(relPath) : getFileCoverage(relPath);
                    if (pct !== null) {
                        const badge = document.createElement('span');
                        badge.className = 'tree-cov ' + covClass(pct);
                        badge.textContent = pct + '%';
                        item.appendChild(badge);
                    }
                });
            };

            const applyEditorCoverage = filePath => {
                if (!editor) return;
                const clearDecos = () => {
                    if (coverageDecorationIds.length)
                        coverageDecorationIds = editor.deltaDecorations(coverageDecorationIds, []);
                };
                if (!coverageData || !coverageRoot) {
                    clearDecos();
                    return;
                }
                const d = coverageData[coverageRoot + '/' + filePath];
                if (!d) {
                    clearDecos();
                    return;
                }
                const lineMap = {};
                for (const [id, count] of Object.entries(d.s)) {
                    const range = d.statementMap[id];
                    if (!range) continue;
                    for (let l = range.start.line; l <= range.end.line; l++) {
                        if (!(l in lineMap)) lineMap[l] = count > 0;
                        else if (count === 0) lineMap[l] = false;
                    }
                }
                const decorations = Object.entries(lineMap).map(([line, hit]) => ({
                    range: new monaco.Range(+line, 1, +line, 1),
                    options: {
                        glyphMarginClassName: hit ? 'cov-glyph-hit' : 'cov-glyph-miss',
                        overviewRulerColor: hit ? '#4ec9b050' : '#f4474760',
                        overviewRulerLane: monaco.editor.OverviewRulerLane.Left,
                    },
                }));
                coverageDecorationIds = editor.deltaDecorations(coverageDecorationIds, decorations);
            };

            const renderTestResults = data => {
                const el = document.getElementById('tests-results');
                const statusEl = document.getElementById('tests-status');
                if (!data || !data.testResults) {
                    el.innerHTML = '<div class="test-empty">Test-Ausführung fehlgeschlagen oder keine Daten.</div>';
                    statusEl.textContent = '✗ Fehler';
                    statusEl.className = 'err';
                    return;
                }
                const passed = data.numPassedTests || 0;
                const failed = data.numFailedTests || 0;
                const dur = data.endTime && data.startTime ? Math.round(data.endTime - data.startTime) : 0;
                if (failed > 0) {
                    statusEl.textContent = `✗ ${failed} fehlgeschlagen  ·  ${passed} bestanden  ·  ${dur}ms`;
                    statusEl.className = 'err';
                } else {
                    statusEl.textContent = `✓ ${passed} bestanden  ·  ${dur}ms`;
                    statusEl.className = 'ok';
                }
                let html = '';
                for (const suite of data.testResults) {
                    const testPath = suite.name || suite.testFilePath || '';
                    const relPath =
                        coverageRoot && testPath.startsWith(coverageRoot)
                            ? testPath.slice(coverageRoot.length + 1)
                            : testPath;
                    const ok = suite.status === 'passed';
                    const count = (suite.assertionResults || []).length;
                    const sdur = suite.endTime - suite.startTime;
                    const rowId = 'tr-' + Math.random().toString(36).slice(2);
                    html += `<div class="test-file-row" onclick="const c=document.getElementById('${rowId}');c.style.display=c.style.display==='none'?'':'none';this.querySelector('.test-file-toggle').textContent=c.style.display==='none'?'▶':'▼'">`;
                    html += `<span class="test-file-toggle">▼</span>`;
                    html += `<span class="${ok ? 'test-passed' : 'test-failed'}">${ok ? '✓' : '✗'}</span>`;
                    html += `<span class="test-file-name">${relPath}</span>`;
                    html += `<span class="test-file-meta">${count} tests&nbsp;&nbsp;${sdur}ms</span>`;
                    html += `</div>`;
                    html += `<div class="test-cases" id="${rowId}">`;
                    const byDescribe = {};
                    for (const t of suite.assertionResults || []) {
                        const key = (t.ancestorTitles || []).join(' › ') || '';
                        if (!byDescribe[key]) byDescribe[key] = [];
                        byDescribe[key].push(t);
                    }
                    for (const [desc, tests] of Object.entries(byDescribe)) {
                        if (desc) html += `<div class="test-describe">${desc}</div>`;
                        for (const t of tests) {
                            const icon = t.status === 'passed' ? '✓' : t.status === 'failed' ? '✗' : '⊘';
                            const cls =
                                t.status === 'passed'
                                    ? 'test-passed'
                                    : t.status === 'failed'
                                      ? 'test-failed'
                                      : 'test-skipped';
                            html += `<div class="test-case-row"><span class="${cls}">${icon}</span><span>${t.title}</span></div>`;
                            if (t.failureMessages?.length) {
                                for (const msg of t.failureMessages) {
                                    html += `<div class="test-err-msg">${msg.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').slice(0, 400)}</div>`;
                                }
                            }
                        }
                    }
                    html += `</div>`;
                }
                el.innerHTML = html;
            };

            const renderCoverageSummary = (data, root) => {
                const el = document.getElementById('tests-coverage');
                if (!data || !root) {
                    el.innerHTML =
                        '<div class="tests-cov-header">Coverage</div><div class="test-empty">Keine Daten.</div>';
                    return;
                }
                let html = '<div class="tests-cov-header">Coverage</div><table class="cov-table">';
                const entries = Object.entries(data)
                    .map(([absPath, d]) => {
                        const relPath = absPath.startsWith(root + '/') ? absPath.slice(root.length + 1) : absPath;
                        const stmts = Object.values(d.s);
                        const stmtPct = stmts.length
                            ? Math.round((stmts.filter(n => n > 0).length / stmts.length) * 100)
                            : 100;
                        const funcs = Object.values(d.f || {});
                        const funcPct = funcs.length
                            ? Math.round((funcs.filter(n => n > 0).length / funcs.length) * 100)
                            : 100;
                        return { relPath, stmtPct, funcPct };
                    })
                    .sort((a, b) => a.relPath.localeCompare(b.relPath));
                for (const { relPath, stmtPct, funcPct } of entries) {
                    const sc = covClass(stmtPct);
                    const barColor = stmtPct >= 80 ? '#4ec9b0' : stmtPct >= 50 ? '#ce9178' : '#f44747';
                    html += `<tr>
        <td class="cov-file">${relPath}</td>
        <td class="cov-bar-cell"><div class="cov-bar"><div class="cov-bar-fill" style="width:${stmtPct}%;background:${barColor}"></div></div></td>
        <td class="cov-pct ${sc}">${stmtPct}%</td>
        <td class="cov-pct ${covClass(funcPct)}" style="color:var(--text-dim);font-size:10px">fn:${funcPct}%</td>
      </tr>`;
                }
                html += '</table>';

            document.getElementById('btn-run-tests').addEventListener('click', async () => {
                const btn = document.getElementById('btn-run-tests');

            // ── Musik-Tab ─────────────────────────────────────────────────────────────
            const MUSIC_SCREENS = [
                { key: 'mainMenu', label: 'Hauptmenü', color: '#1a2a3a', textColor: '#88ccff' },
                { key: 'credits', label: 'Credits', color: '#1a1a2a', textColor: '#aa88ff' },
                { key: 'success', label: 'Erfolg', color: '#1a2a1a', textColor: '#88ff88' },
                { key: 'defeat', label: 'Niederlage', color: '#2a1a1a', textColor: '#ff8888' },
            ];
            let wbMusicConfig = { mainMenu: 'main', credits: '', success: 'final', defeat: 'final' };

            const wbDrawScreenPreview = (canvas, label, color, textColor) => {
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = color;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = textColor;
                ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);
                ctx.fillStyle = textColor;
                ctx.font = 'bold 13px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(label, canvas.width / 2, canvas.height / 2);
            };

            const wbRenderMusicTab = () => {

            const wbLoadMusicConfig = async () => {

            // ── Editor controls panel rendering ──────────────────────────────────────
            const edDispatch = (action, data) => {
